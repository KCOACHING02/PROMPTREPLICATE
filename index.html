<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur Stories Mono-Slide (7 Jours - 100 Combinaisons)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0c0c10;
      --panel-bg: #14141d;
      --card-bg: #1a1a26;
      --accent: #FF8C42;
      --text: #f5f0e8;
      --text-muted: #8a8aa3;
      --border: #2a2a3a;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    h1 { text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    .tab-btn { background: var(--panel-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .panel { display: none; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
    .panel.active { display: block; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input { width: 100%; padding: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-sizing: border-box; font-size: 1rem; }
    .btn-large { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    .daytabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; }
    .dtab { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-weight: bold; }
    .dayinfo { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
    .dayinfo-t { font-weight: bold; font-size: 1.2rem; }
    .clayout { display: flex; gap: 30px; flex-wrap: wrap; }
    .phonewrap { flex: 1; min-width: 280px; max-width: 320px; }
    .phone { background: #111; border: 12px solid #222; border-radius: 36px; height: 520px; padding: 25px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; justify-content: center; text-align: center; }
    .phone-ct { font-size: 1.1rem; line-height: 1.6; white-space: pre-line; overflow-y: auto; }
    .cpanel { flex: 2; min-width: 300px; display: flex; flex-direction: column; justify-content: space-between; }
    .cbox { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border); min-height: 150px; white-space: pre-line; margin-bottom: 20px; font-size: 1.1rem; }
    .arow { display: flex; gap: 10px; flex-wrap: wrap; }
    .abtn { flex: 1; min-width: 150px; padding: 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; cursor: pointer; }
    .abtn.pdf { background: #10B981; color: white; border-color: #10B981; }
    
    /* Zone PDF - Masquée hors écran mais capturable par html2pdf */
    #pdf-content { 
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 700px;
      color: #333; 
      padding: 30px;
      background: #fff;
    }
    .pdf-day { margin-bottom: 25px; border: 1px solid #ddd; padding: 15px; border-radius: 6px; }
    .pdf-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎯 Générateur Stories Mono-Slide</h1>
  <div class="subtitle">1 Story = 1 Slide de vente psychologique (7 jours sur 7 !)</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">⚙️ Paramètres</button>
    <button class="tab-btn" id="tab-result" onclick="switchTab('result')">📱 Mes Stories</button>
  </div>

  <div class="panel active" id="panel-config">
    <div class="form-group">
      <label>Nom de ton produit ou service</label>
      <input type="text" id="f-product" value="mon programme">
    </div>
    <div class="form-group">
      <label>Ton appel à l'action (CTA)</label>
      <input type="text" id="f-cta" value="écris-moi 'GO' en DM">
    </div>
    <button class="btn-large" onclick="handleGenerate()">🚀 CRÉER MA SEMAINE DE STORIES</button>
  </div>

  <div class="panel" id="panel-result"></div>
</div>

<div id="pdf-content"></div>

    ]

    ],
    B: [
      "Elles ont toutes commencé au même point que toi avant d'intégrer {product}. Tu attends quoi ? {cta}.", "La méthode fonctionne pour tout le monde, pourquoi pas pour toi ? Rejoins {product} ! Pour postuler : {cta}.", "C'est ça la puissance d'un groupe soudé. Viens vivre l'expérience dans {product}. Curieuse ? {cta}.", "Le succès laisse des indices, suis le chemin tracé par les élèves de {product}. Pour avoir les détails : {cta}.", "Ne reste pas isolée alors que des dizaines d'autres avancent ensemble dans {product}. Rejoins-les : {cta}.", "Tu as le droit toi aussi de faire partie des success stories. Ta place t'attend dans {product}. Écris-moi : {cta}.", "C'est fou ce qu'on peut accomplir quand on a le bon entourage. Trouve le tien dans {product}. Pour me joindre : {cta}.", "La preuve est sous tes yeux tous les jours. Saute le pas et rejoins {product}. Une seule chose à faire : {cta}.", "Fais confiance au process qui a déjà changé la vie de tant de femmes. Intègre {product} ! Dis-le moi ici : {cta}.", "Prête à écrire ta propre histoire à succès aux côtés des autres ? Tout commence dans {product}. {cta}."
    ]
  },
  vendredi: {
    theme: "VENDREDI — Le Contraste (Avant / Après)", color: "#6A4C93",
    A: [
      "Imagine passer d'un agenda saturé à seulement 4h de focus par jour... 🧘‍♀️ ", "Imagine ne plus jamais avoir à prospecter dans le vide... 🎯 ", "Passer de 0 à tes premiers 5k€ par mois, c'est possible. 📈 ", "De la peur de vendre à l'excitation de closer des contrats premium... 🤝 ", "Fini le stress des fins de mois, place à la sérénité financière. 💸 ", "Imagine avoir une file d'attente de clients qui veulent bosser avec toi... 🚶‍♂️🚶‍♀️ ", "Passer du statut de 'freelance épuisée' à 'chef d'entreprise libre'... 👑 ", "Oublie la création de contenu épuisante, place à la stratégie minimaliste. 🧠 ", "Imagine te réveiller chaque matin avec une vision claire et précise... 🌅 ", "Passer d'une offre que personne ne comprend à un best-seller évident... 📦 "
    ],
    B: [
      "C'est exactement la transformation qu'on opère à l'intérieur de {product}. Tu veux la tienne ? {cta}.", "Ce n'est pas de la magie, c'est de la pure stratégie appliquée dans {product}. Envie de voir le plan ? {cta}.", "Le pont entre ta situation actuelle et ta vie de rêve s'appelle {product}. Prête à traverser ? {cta}.", "Tu es à une seule décision de faire basculer ton quotidien. Saute le pas avec {product}. Contacte-moi : {cta}.", "Arrête de rêver ta vie et commence à la bâtir sérieusement grâce à {product}. Pour voir si tu es éligible : {cta}.", "C'est le virage à 180 degrés que prennent toutes les participantes de {product}. Tu montes avec nous ? {cta}.", "Pourquoi continuer de subir alors que la solution existe juste ici dans {product} ? Fais le bon choix : {cta}.", "La liberté ne s'attend pas, elle se crée avec les bons outils. Trouve-les dans {product}. Écris-moi : {cta}.", "Passe de l'autre côté de la barrière dès cette semaine. Rejoins {product} ! Pour en parler tranquillement : {cta}.", "C'est possible pour toi aussi, il te suffit de suivre la méthode pas à pas dans {product}. On y va ? {cta}."
    ]
  },
  samedi: {
    theme: "SAMEDI — Le Storytelling (L'Héroïne)", color: "#FF9F1C",
    A: [
      "Il y a un an jour pour jour, j'étais en larmes devant mon écran... 😢 ", "J'ai failli tout envoyer valser pour reprendre un job salarié... 💼 ", "Si on m'avait dit que je vivrais de ma passion aujourd'hui, je n'y aurais pas cru. ✨ ", "J'ai fait une erreur de débutante qui m'a coûté très cher... 📉 ", "Le jour où j'ai compris que je faisais fausse route... 💡 ", "Mon entourage m'a dit que j'étais folle de me lancer. 🗣️ ", "J'ai passé des nuits blanches à essayer de tout comprendre toute seule. 🌙 ", "La vérité sur mes débuts que je n'ai jamais racontée... 🤫 ", "J'ai cru que la réussite n'était réservée qu'aux autres. 🏆 ", "Voici l'histoire de la plus grosse claque de ma vie d'entrepreneure. 💥 "
    ],
    B: [
      "Mais j'ai trouvé la clé. Elle est dans {product}. Ne fais pas les mêmes erreurs que moi : {cta}.", "C'est de cet échec qu'est né {product}. Épargne-toi ces mois de souffrance : {cta}.", "Le secret c'est que j'ai fini par me faire accompagner. Fais de même avec {product} : {cta}.", "Aujourd'hui, j'utilise cette expérience pour t'aider dans {product}. Dis-moi si tu veux ton plan : {cta}.", "C'est possible pour toi aussi d'inverser la tendance grâce à {product}. Viens m'en parler : {cta}.", "Ne laisse personne te dire que c'est impossible. Prouve-leur le contraire avec {product} ! {cta}.", "J'aurais aimé avoir un guide comme {product} à l'époque. Écris-moi pour l'obtenir : {cta}.", "Cette histoire m'a appris à valoriser mon temps. C'est ce qu'on fait dans {product}. Fais le pas : {cta}.", "La vulnérabilité c'est une force. On reconstruit tout plus solide dans {product}. Parle-moi : {cta}.", "La solution n'est pas de travailler plus dur, mais mieux. Découvre {product} en m'envoyant : {cta}."
    ]
  },
  dimanche: {
    theme: "DIMANCHE — La Clarté (FAQ / Objections)", color: "#2EC4B6",
    A: [
      "Non, tu n'as pas besoin d'avoir 10k abonnés pour réussir ! ❌ ", "On me demande souvent s'il faut déjà avoir une offre prête... 🤔 ", "Est-ce que c'est trop tard pour te lancer cette année ? 📅 ", "Tu as peur de ne pas avoir assez de temps à y consacrer ? ⏳ ", "Tu penses que le marché est déjà trop saturé ? 🌊 ", "La question qui revient 10 fois par jour dans mes DM : 📥 ", "C'est quoi la différence entre ma méthode et les autres ? 🔍 ", "Tu penses que ce n'est pas pour toi parce que tu débutes ? 👶 ", "Est-ce que l'investissement en vaut vraiment la peine ? 💰 ", "Brisons un énorme mythe sur l'entrepreneuriat aujourd'hui. 🔨 "
    ],
    B: [
      "La réponse est non. Dans {product}, on s'adapte à ton niveau. Tu as encore des doutes ? Viens me les poser : {cta}.", "On reprend tout à zéro ensemble. C'est le but de {product}. Si tu veux la vérité : {cta}.", "Il n'y a pas de meilleur moment. Saute le pas avec {product} dès aujourd'hui ! Dis-moi : {cta}.", "On a conçu {product} pour les femmes pressées. 2h par semaine suffisent ! Vérifie par toi-même : {cta}.", "Ton unicité fera la différence. On la trouve ensemble dans {product}. Envoie-moi un DM : {cta}.", "Je t'explique tout de A à Z à l'intérieur de {product}. Envie d'en savoir plus ? Simple : {cta}.", "La différence c'est l'humain et le sur-mesure de {product}. Tu veux le programme ? {cta}.", "Au contraire, c'est le moment idéal pour ne pas prendre de mauvaises habitudes ! Rejoins {product} : {cta}.", "Ton business te rapportera ce que tu y investis. {product} est un accélérateur. Viens me parler : {cta}.", "Faisons le tri entre le vrai et le faux. Je t'attends pour échanger sur {product} : {cta}."

const pick = a => a[Math.floor(Math.random() * a.length)];
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML};

function fill(s, c) {
  return s
    .replace(/\{product\}/g, c.productName || 'mon programme')
    .replace(/\{cta\}/g, c.cta || 'Écris-moi en DM');
}

let strategy = null;
let activeDay = "lundi";

function switchTab(tab) {
  document.getElementById('tab-config').classList.toggle('active', tab === 'config');
  document.getElementById('tab-result').classList.toggle('active', tab === 'result');
  document.getElementById('panel-config').classList.toggle('active', tab === 'config');
  document.getElementById('panel-result').classList.toggle('active', tab === 'result');
  if (tab === 'result') renderResult();
}

function handleGenerate() {
  const cfg = { 
    productName: document.getElementById('f-product').value.trim(), 
    cta: document.getElementById('f-cta').value.trim() 
  };
  
  strategy = {};
  const jours = Object.keys(BIBLE);
  
  jours.forEach(j => {
    const data = BIBLE[j];
    strategy[j] = {
      theme: data.theme,
      color: data.color,
      text: fill(pick(data.A) + pick(data.B), cfg)
    };
  });

  activeDay = "lundi";
  switchTab('result');
}

function regenDay(j) {
  if (!strategy) return;
  const cfg = { 
    productName: document.getElementById('f-product').value.trim(), 
    cta: document.getElementById('f-cta').value.trim() 
  };
  
  const data = BIBLE[j];
  strategy[j].text = fill(pick(data.A) + pick(data.B), cfg);
  renderResult();
}

function setDay(j) { activeDay = j; renderResult(); }

function renderResult() {
  const p = document.getElementById('panel-result');
  if (!strategy) return;
  
  const jours = Object.keys(strategy);
  const d = strategy[activeDay];
  const ac = d.color;
  
  p.innerHTML = `
    <div class="daytabs">
      ${jours.map(j => `
        <button class="dtab" onclick="setDay('${j}')" style="${activeDay === j ? `border-color:${ac}; background:${ac}15; color:${ac};` : ''}">
          ${j.charAt(0).toUpperCase() + j.slice(1)}
        </button>
      `).join('')}
    </div>
    <div class="dayinfo"><span class="dayinfo-t" style="color:${ac}">${d.theme}</span></div>
    <div class="clayout">
      <div class="phonewrap">
        <div class="phone">
          <div class="phone-ct">${esc(d.text)}</div>
        </div>
      </div>
      <div class="cpanel">
        <div>
          <div class="cbox">${esc(d.text)}</div>
        </div>
        <div class="arow">
          <button class="abtn" onclick="regenDay('${activeDay}')" style="border-color:${ac}; color:${ac};">🔄 Recalculer ce jour (100 options)</button>
          <button class="abtn pdf" onclick="exportToPDF()">📄 Exporter en PDF</button>
        </div>
      </div>
    </div>
  `;
}

function exportToPDF() {
  if (!strategy) return;
  const pdfArea = document.getElementById('pdf-content');
  
  let html = `<h1 style="text-align: center; color: #111; font-family: sans-serif; margin-bottom: 20px;">Mes Stories de Vente Hebdomadaires</h1>`;
  
  Object.keys(strategy).forEach(j => {
    const dayData = strategy[j];
    html += `
      <div class="pdf-day" style="border-left: 5px solid ${dayData.color}; font-family: sans-serif;">
        <div class="pdf-title" style="color:${dayData.color}; font-size: 14px; margin-bottom: 5px;">${dayData.theme.toUpperCase()}</div>
        <div style="white-space: pre-line; font-size: 13px; line-height: 1.6; color: #333;">${dayData.text}</div>
      </div>
    `;
  });
  
  pdfArea.innerHTML = html;
  
  const opt = {
    margin:       10,
    filename:     'Mes_Stories_Persuasion_7_Jours.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2 },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  
  // Exécution de l'export
  html2pdf().set(opt).from(pdfArea).save();
}
</script>

</body>
</html>
