<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Studio Stories Mono-Slide Pro</title>
<style>
:root{--bg:#0c0c10;--panel:#14141d;--card:#1a1a26;--accent:#FF8C42;--text:#f5f0e8;--muted:#8a8aa3;--border:#2a2a3a;--success:#10B981;--star:#FFD700;--font:'Segoe UI',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:12px;display:flex;justify-content:center}
.container{max-width:1100px;width:100%}
h1{text-align:center;margin-bottom:4px;font-size:1.5rem}
.subtitle{text-align:center;color:var(--muted);margin-bottom:18px;font-size:.85rem}
.tabs{display:flex;gap:6px;margin-bottom:14px;justify-content:center;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0}
.tab-btn{background:var(--panel);color:var(--muted);border:1px solid var(--border);padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;font-family:var(--font);transition:.2s}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.panel.active{display:block}
.fg{margin-bottom:16px}
.fg label{display:block;margin-bottom:6px;font-weight:600;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border .2s}
.fg input:focus{border-color:var(--accent)}
.fg .hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-large{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#FF6B2B);color:var(--bg);border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:.2s}
.btn-large:hover{filter:brightness(1.1)}.btn-large:active{transform:scale(.98)}
.daytabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.dtab{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;white-space:nowrap;font-size:12px;font-family:var(--font);flex-shrink:0;transition:.2s}
.dtab:hover{color:var(--text)}.dtab.active{background:rgba(255,140,66,.1);color:var(--accent);border-color:var(--accent)}
.dayinfo{margin-bottom:16px;background:rgba(255,255,255,.03);padding:12px;border-radius:8px;border-left:3px solid var(--accent)}
.dayinfo-t{font-weight:700;font-size:14px}.dayinfo-s{font-size:11px;color:var(--muted);margin-top:3px}
.clayout{display:flex;gap:24px;align-items:flex-start}
.phonewrap{width:280px;min-width:280px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px}
.phone{background:#111;border:10px solid #222;border-radius:32px;width:100%;height:520px;position:relative;overflow:hidden;background-size:cover;background-position:center;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column}
.phone-header{padding:12px 14px 0;flex-shrink:0}
.phone-prof{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.phone-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#FF6B2B);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff}
.phone-un{font-size:11px;color:#bbb;font-weight:600}
.phone-scroll{flex:1;overflow-y:auto;padding:8px 14px 16px;-webkit-overflow-scrolling:touch}
.phone-scroll::-webkit-scrollbar{width:3px}.phone-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.phone-ct{font-size:13px;line-height:1.6;white-space:pre-line;margin:0}
.phone-controls{width:100%;display:flex;flex-direction:column;gap:8px}
.control-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.cbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;font-family:var(--font);transition:.2s}
.cbtn:hover{background:var(--panel)}.cbtn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.file-input{display:none}
.cpanel{flex:1;min-width:0;display:flex;flex-direction:column}
.editable-box{background:var(--card);padding:18px;border-radius:10px;border:1.5px solid var(--border);min-height:180px;margin-bottom:14px;font-size:14px;line-height:1.65;color:var(--text);width:100%;resize:vertical;font-family:var(--font);outline:none;transition:border .2s}
.editable-box:focus{border-color:var(--accent)}
.cbox-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cbox-left{font-size:11px;color:var(--muted)}.cbox-right{display:flex;gap:6px}
.cb-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;font-family:var(--font);transition:.2s}
.cb-btn:hover{background:rgba(255,255,255,.1)}.cb-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}.cb-btn.starred{background:rgba(255,215,0,.1);color:var(--star);border-color:var(--star)}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.abtn{flex:1;min-width:100px;padding:11px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:700;cursor:pointer;font-size:12px;font-family:var(--font);text-align:center;transition:.2s}
.abtn:hover{background:var(--panel)}
#pepites-list{display:flex;flex-direction:column;gap:12px}
.pepite-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}
.pepite-text{font-size:13px;line-height:1.6;white-space:pre-line;color:var(--text);padding-right:60px}
.pepite-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px}
.save-alert{text-align:center;color:var(--success);font-size:.8rem;margin-bottom:12px;opacity:0;transition:opacity .5s;pointer-events:none}
.save-alert.visible{opacity:1}
.err-box{background:#ff000030;border:1px solid #ff4444;border-radius:8px;padding:12px;margin:12px 0;font-size:12px;color:#ff6666;display:none}
@media(max-width:750px){.clayout{flex-direction:column;align-items:stretch}.phonewrap{width:100%;min-width:0}.phone{width:260px;min-width:260px;height:480px;margin:0 auto}.cpanel{width:100%}}
@media(max-width:480px){body{padding:8px}h1{font-size:1.3rem}.phone{width:240px;min-width:240px;height:450px}.phone-ct{font-size:12px}.tab-btn{padding:8px 10px;font-size:11px}.panel{padding:14px}.dtab{padding:7px 10px;font-size:11px}}
@media(max-width:360px){.phone{width:210px;min-width:210px;height:400px}}
@media print{
  body{background:#fff!important;color:#333!important;padding:0!important}
  .tabs,.phone,.phone-controls,.action-row,.cbox-header,.save-alert,.err-box,.tab-btn,button{display:none!important}
  .container{max-width:100%}
  .panel{display:block!important;background:#fff!important;border:none!important;padding:0!important;margin:0!important;page-break-inside:avoid}
  #panel-config{display:none!important}
  #panel-pepites{display:none!important}
  .print-week{display:block!important}
  .print-day{margin-bottom:20px;padding:15px;border:1px solid #ddd;border-radius:8px;page-break-inside:avoid}
  .print-day h3{margin:0 0 10px;font-size:14px}
  .print-day pre{white-space:pre-line;font-family:sans-serif;font-size:12px;line-height:1.7;margin:0}
}
.print-week{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Studio Stories Mono-Slide</h1>
<div class="subtitle">Stories strategiques - Simulateur - Pepites</div>
<div id="save-status" class="save-alert"></div>
<div id="err" class="err-box"></div>
<div class="tabs">
  <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">Config</button>
  <button class="tab-btn" id="tab-result" onclick="switchTab('result')">Studio</button>
  <button class="tab-btn" id="tab-pepites" onclick="switchTab('pepites')">Pepites (<span id="pepites-count">0</span>)</button>
</div>
<div class="panel active" id="panel-config">
  <div class="fg"><label>Nom de ta formation / offre</label><input type="text" id="f-product" placeholder="Ex : Code Liberte"></div>
  <div class="fg"><label>Ton appel a l'action (CTA)</label><input type="text" id="f-cta" placeholder="Ex : Envoie-moi le mot CODE en message prive"><div class="hint">La phrase qui termine chaque story.</div></div>
  <button class="btn-large" onclick="handleGenerate()">CREER MA SEMAINE DE STORIES</button>
</div>
<div class="panel" id="panel-result"></div>
<div class="panel" id="panel-pepites"><div id="pepites-list"></div></div>
<div class="print-week" id="print-week"></div>
</div>

<script>
// Stories Machine - 303 stories 100% uniques
// Chaque story est ecrite individuellement avec un angle unique
var S = {"lundi": ["Ce matin j'ai emmene mon fils a l'ecole. A pied. Tranquillement.\n\nAvant, je le deposais en speed a 7h30 pour pas etre en retard.\n\nMaintenant c'est moi qui decide de mon emploi du temps.\n\nUne eleve m'a dit : le premier matin ou j'ai pu emmener ma fille sans courir, j'ai pleure.\n\nC'est ca que {product} permet de construire.\n\n{cta}", "Un truc que j'ai compris tard : le probleme c'est pas toi. C'est que personne ne t'a montre comment faire.\n\nAvant je testais des trucs dans tous les sens. Rien marchait.\n\nLe jour ou j'ai suivi un vrai plan, tout a bouge. En quelques semaines.\n\nUne eleve a vecu la meme chose. Premieres ventes en 3 semaines avec {product}.\n\n{cta}", "Tu te leves. Tu bosses. Tu rentres. Tu recommences.\n\nEt un jour tu te demandes : c'est ca ma vie ?\n\nAvant je vivais pour le week-end. Maintenant chaque jour me plait.\n\nUne eleve m'a ecrit : je pensais pas que c'etait possible pour quelqu'un comme moi. Et pourtant.\n\n{cta}", "Si tu attends d'etre prete, je vais te dire un secret : tu ne le seras jamais.\n\nJ'ai attendu des mois. J'avais peur de me planter.\n\nAvant j'avais peur. Maintenant j'ai des resultats.\n\nUne eleve aussi avait peur. Premiere vente en 10 jours.\n\n{cta}", "On m'a dit : t'as de la chance.\n\nNon. J'ai un systeme.\n\nAvant je ne savais meme pas ce que je pouvais vendre. Maintenant j'ai un plan clair.\n\nCe plan il est dans {product}. C'est le meme que mes eleves suivent.\n\n{cta}", "Ce matin, notification de paiement en prenant mon cafe.\n\nQuelqu'un a achete pendant que je dormais.\n\nAvant je troquais mes heures contre un salaire. Maintenant mon business tourne meme quand je dors.\n\nUne eleve a recu sa premiere vente la nuit. Son message : je croyais que c'etait une erreur.\n\n{cta}", "La difference entre celles qui avancent et celles qui restent bloquees ? C'est pas le talent. C'est la decision.\n\nAvant j'avais des excuses pour tout. Maintenant j'ai des resultats.\n\nLes femmes dans {product} ont juste decide de ne plus attendre.\n\n{cta}", "Arrete de chercher la motivation. Cherche un plan.\n\nLa motivation va et vient. Un plan ca reste.\n\nAvant je me boostais avec des podcasts. A fond le lundi, plus rien le mercredi.\n\nMaintenant j'ai un systeme. Les resultats suivent. Ce systeme est dans {product}.\n\n{cta}", "J'ai longtemps cru que je devais tout comprendre avant de commencer.\n\n6 mois a apprendre sans rien faire.\n\nLe jour ou j'ai juste suivi une methode, premiere vente en 2 semaines.\n\nAvant je voulais etre prete. Maintenant je suis lancee.\n\n{cta}", "Petite question honnete : dans un an, tu veux etre au meme endroit ?\n\nAvant je me disais un jour. Maintenant c'est mon quotidien.\n\nUne eleve : il y a 6 mois je scrollais tes stories en revant. Maintenant c'est moi qui vends.\n\n{cta}", "J'ai recu un message ce matin qui m'a fait sourire.\n\nUne eleve : j'ai fait ma premiere vente et j'ai hurle dans ma cuisine.\n\nAvant elle pensait que c'etait pas pour elle. Maintenant elle vend.\n\nC'est ca {product}. Pas des promesses. Des resultats.\n\n{cta}", "J'ai une copine qui bosse 50h par semaine. Elle me dit : j'aimerais tellement faire comme toi.\n\nJe lui reponds toujours : tu peux.\n\nAvant j'etais exactement comme elle. Maintenant j'ai construit autre chose.\n\nPas par chance. Par methode. Celle de {product}.\n\n{cta}", "Un declic un soir devant mon ordi. Je gagnais le meme salaire depuis 3 ans malgre les efforts.\n\nLe probleme c'etait pas moi. C'etait le systeme dans lequel j'etais.\n\nAvant j'essayais de progresser dans un cadre qui me limitait. Maintenant j'ai cree le mien.\n\n{product} t'aide a faire pareil.\n\n{cta}", "J'ai pas de talent particulier. Je suis pas plus intelligente que toi.\n\nJ'ai juste trouve un plan qui marche. Et je l'ai suivi.\n\nAvant je cherchais LE truc magique. Maintenant je sais que c'est une methode.\n\nElle est dans {product}.\n\n{cta}", "Ce qui m'a debloquee c'est pas le courage. C'est un cadre.\n\nQuelqu'un qui m'a dit : fais ca, puis ca, puis ca.\n\nAvant je m'eparpillais. Rien fonctionnait.\n\n{product} c'est ce cadre. Celui que j'aurais voulu avoir des le debut.\n\n{cta}", "Un matin j'ai ouvert mon appli bancaire et j'ai vu un chiffre que j'avais jamais vu.\n\nPas un heritage. Mes ventes.\n\nAvant mon compte me faisait peur. Maintenant il me rassure.\n\nC'est pas de la magie. C'est {product}.\n\n{cta}", "J'ai achete un truc sans regarder le prix l'autre jour. Un resto. Rien de fou.\n\nMais avant chaque depense etait un calcul.\n\nMaintenant je choisis. Pas parce que je suis riche. Parce que je gagne assez.\n\n{product} m'a donne ca.\n\n{cta}", "Ce matin j'ai ferme mon ordi a 14h. Parce que j'avais fini.\n\nAvant je remplissais mes journees pour avoir l'air occupee. Maintenant je bosse sur ce qui compte.\n\nLe reste du temps je vis.\n\n{product} t'apprend ca.\n\n{cta}", "Un truc qui a change ma vie : comprendre que l'argent n'est pas lie au temps.\n\nAvant je vendais mon temps. Maintenant je vends une solution.\n\nC'est ce shift qu'on fait dans {product}.\n\n{cta}", "Si tu lis ca c'est que quelque chose te travaille.\n\nPeut-etre l'envie de plus. Peut-etre la fatigue du quotidien.\n\nC'est le meme signal que j'ai eu avant de commencer.\n\nAvant j'ignorais ce signal. Maintenant je suis contente de l'avoir ecoute.\n\n{cta}", "Le meilleur investissement de ma vie ? Me faire accompagner.\n\nAvant je perdais du temps a chercher seule. Maintenant j'avance vite.\n\nC'est ca {product}. Le raccourci que j'aurais aime prendre plus tot.\n\n{cta}", "Mon fils m'a demande de jouer cet apres-midi. J'ai dit oui. Sans culpabiliser.\n\nAvant je culpabilisais toujours. Soit de pas bosser. Soit de pas etre assez presente.\n\nMaintenant j'ai trouve l'equilibre. {product} c'est aussi ca. Du temps.\n\n{cta}", "J'ai recu un vocal d'une eleve ce matin. Elle pleurait. De joie.\n\nSa premiere vente. Apres des mois a douter.\n\nAvant elle pensait qu'elle n'y arriverait jamais.\n\nC'est le moment le plus beau de mon metier.\n\n{cta}", "Tu merites mieux que ce que tu as en ce moment.\n\nPas parce que ta vie est nulle. Parce que tu es capable de plus.\n\nAvant j'avais du mal a me dire ca. Maintenant j'en suis convaincue.\n\nSi tu veux voir ce qui est possible, regarde {product}.\n\n{cta}", "Mon alarme a sonne ce matin. Je l'ai eteinte. Et je me suis rendormie.\n\nPas par flemme. Parce que je peux.\n\nAvant mon reveil c'etait une obligation. Maintenant c'est un choix.\n\nUne eleve : la premiere fois que j'ai eteint mon reveil un mardi sans stress, j'ai compris.\n\n{cta}", "Je suis en train de bosser depuis mon canape en pyjama. Pas de dress code. Pas de trajet.\n\nAvant je passais 1h30 dans les transports par jour. Ca fait 30h par mois. Recuperees.\n\nMaintenant ces heures sont a moi.\n\n{cta}", "Petit plaisir du jour : un bain a 14h.\n\nAvant un bain a 14h c'etait impossible. Horaires fixes. Zero flexibilite.\n\nMaintenant c'est un mardi normal.\n\nUne eleve : le jour ou j'ai pris mon premier cafe sans rush, j'ai su que ca valait le coup.\n\n{cta}", "J'ai dit non a un truc qui me plaisait pas cette semaine. Sans culpabiliser.\n\nAvant je disais oui a tout par peur de deplaire.\n\nMaintenant je choisis. C'est ce que {product} m'a appris : la liberte de dire non.\n\n{cta}", "Une ancienne collegue m'a ecrit : t'as trop de chance.\n\nLa chance ca n'existe pas dans ce contexte. J'ai un plan et je l'applique.\n\nAvant j'etais a sa place. Maintenant j'ai construit autre chose.\n\n{product} c'est ce plan.\n\n{cta}", "Mon mec m'a dit : t'es plus la meme depuis que t'as lance ton truc.\n\nIl a raison. Je suis plus sereine. Plus sure de moi.\n\nAvant je stressais pour tout. Maintenant j'ai un cap.\n\n{cta}", "Journee pluie. Plaid. Ordi. Ventes.\n\nAvant les jours de pluie c'etait le metro sous la flotte.\n\nMaintenant c'est cocooning et business.\n\nMes eleves dans {product} construisent exactement ca.\n\n{cta}", "Un cafe, du silence, rien a faire. Bonheur simple.\n\nAvant ce genre de moment n'existait que le dimanche soir.\n\nMaintenant c'est n'importe quel jour.\n\nC'est ca que {product} permet.\n\n{cta}", "Appel avec une copine. Elle m'a dit : mais comment tu fais ?\n\nJe lui ai dit la verite : j'ai une methode.\n\nAvant j'etais celle qui posait cette question aux autres.\n\nMaintenant c'est moi qui reponds. {product} c'est cette methode.\n\n{cta}", "J'ai cuisine un bon truc ce soir. Parce que j'avais le temps.\n\nAvant je cuisinais par obligation. Vite fait. Mal fait.\n\nMaintenant j'ai le luxe du temps.\n\n{product} m'a donne ca.\n\n{cta}", "Road trip impromptu. 4 jours. Zero impact sur mon chiffre d'affaires.\n\nAvant il fallait poser des conges. Demander la permission.\n\nMaintenant je fais mes valises et je pars.\n\n{cta}", "Ce soir diner en famille. Pas un diner vite fait entre le boulot et le dodo.\n\nUn vrai diner. Pose. Tranquille.\n\nAvant j'avais jamais le temps de profiter.\n\nMaintenant si. Grace a {product}.\n\n{cta}", "J'ai passe 2h a lire aujourd'hui. Pas le week-end. Un lundi.\n\nAvant lire c'etait un luxe du dimanche soir si j'etais pas trop crevee.\n\nMaintenant c'est quand je veux.\n\nLes eleves de {product} construisent cette liberte.\n\n{cta}", "Week-end prolonge. Mon business tourne sans moi.\n\nAvant le week-end c'etait 2 jours max. Et encore.\n\nMaintenant je peux prendre 4 jours sans que rien s'ecroule.\n\n{cta}", "J'ai refuse une reunion cette semaine. Parce que j'avais mieux a faire.\n\nAvant on decidait pour moi. Maintenant c'est l'inverse.\n\n{cta}", "Mon fils m'a demande : maman pourquoi tu pars pas au bureau ?\n\nJe lui ai dit : parce que mon bureau c'est ici. Ou je veux.\n\nAvant je partais avant qu'il se reveille. Maintenant je suis la.\n\n{product} c'est aussi ca.\n\n{cta}", "J'ai regarde mon compte ce matin. Et j'ai souri.\n\nAvant c'etait l'angoisse. Le calcul. Est-ce que ca va passer.\n\nMaintenant c'est la serenite.\n\nLa difference ? Un systeme qui fonctionne. Celui de {product}.\n\n{cta}", "Notification a 6h47. Quelqu'un a achete pendant que je dormais.\n\nAvant mes revenus dependaient de ma presence. Maintenant de mon systeme.\n\n{cta}", "La plupart ne se lancent pas par peur du regard des autres. Pas de l'echec.\n\nJ'ai eu la meme peur. Puis j'ai compris que ceux qui me jugeaient n'avaient pas la vie que je voulais.\n\nAvant j'avais peur du jugement. Maintenant je m'en fiche. Parce que j'ai des resultats.\n\n{cta}", "Le plus dur c'est pas de se lancer. C'est de croire que c'est possible pour soi.\n\nMais les femmes qui reussissent dans {product} ne sont pas celles sans doutes. Ce sont celles qui avancent avec.\n\nAvant je doutais de tout. Maintenant j'ai des preuves.\n\n{cta}"], "mardi": ["Tu n'as pas besoin de plus de contenu. Tu as besoin d'une offre claire.\n\nQuand ton audience comprend en 5 secondes ce que tu proposes, elle achete.\n\nUne eleve avait 300 abonnes et zero vente. On a clarifie son offre. Premiere vente en 10 jours.\n\nC'est ce qu'on fait dans {product}.\n\n{cta}", "Erreur numero 1 que je vois tout le temps : vouloir plaire a tout le monde.\n\nTu parles a tout le monde ? Tu parles a personne.\n\nLe jour ou j'ai choisi UNE cible et UN probleme, tout a change.\n\nDans {product}, c'est la premiere chose qu'on fait. Et c'est ce qui debloque tout.\n\n{cta}", "Pourquoi tes stories ne vendent pas ?\n\nC'est pas parce qu'elles sont moches. C'est parce qu'elles racontent ta vie sans montrer ce que ca change.\n\nMon cafe = sympa.\nMon cafe parce que je choisis mes horaires = ca vend.\n\nC'est la charniere. On apprend ca dans {product}.\n\n{cta}", "On me demande souvent : combien d'abonnes pour vendre ?\n\nUne eleve a fait sa premiere vente avec 180 abonnes.\n\nLe nombre c'est pas le sujet. Le sujet c'est : est-ce que les bonnes personnes comprennent ce que tu proposes.\n\n{product} travaille sur ca.\n\n{cta}", "Vendre c'est pas un don. C'est une competence. On peut l'apprendre. Comme la cuisine.\n\nAvant je pensais que celles qui vendaient avaient un truc en plus. Non. Elles ont appris une methode.\n\nCette methode est dans {product}.\n\n{cta}", "Tu procrastines ? C'est pas la faineantise. C'est que tu sais pas quoi faire en premier.\n\nQuand t'as un plan — etape 1, 2, 3 — tu avances. Sans reflechir 3 heures.\n\nAvant je reflechissais a ma strategie. En vrai je tournais en rond.\n\n{product} te donne ce plan.\n\n{cta}", "Le jour ou j'ai compris que poster n'est pas vendre, tout a change.\n\nLa question c'est pas qu'est-ce que je poste. C'est qu'est-ce que je vends, a qui, et pourquoi.\n\nUne eleve postait tous les jours sans resultat. Avec la bonne offre : 4 ventes le premier mois.\n\n{cta}", "Il faut etre experte pour vendre. Mythe.\n\nIl faut avoir de l'avance sur ta cliente. C'est tout.\n\nSi tu as resolu un probleme que d'autres ont encore, tu peux les aider.\n\nC'est ce qu'on met en place dans {product}. Meme si tu pars de zero.\n\n{cta}", "La charniere c'est la difference entre une story jolie et une story qui vend.\n\nC'est le pont entre ta vie et ton offre.\n\nSans elle ta story est sympa. Avec elle ta story fait comprendre quelque chose.\n\nDans {product}, chaque story a une charniere.\n\n{cta}", "Conseil gratuit qui vaut cher : arrete le contenu educatif sans fin.\n\nTa cliente ne veut pas un cours. Elle veut un resultat.\n\nMontre le resultat. Montre que c'est possible pour elle. Et dis-lui comment commencer.\n\nC'est la base de {product}.\n\n{cta}", "Par quoi commencer ? Ton offre. Pas ton feed. Pas ton logo. Pas ton site.\n\nSi tu sais pas ce que tu vends et a qui, le reste c'est du vent.\n\nDans {product}, semaine 1 = clarifier ton offre. Souvent ca suffit pour debloquer.\n\n{cta}", "Le piege numero 1 des debutantes : vouloir etre parfaite avant de se lancer.\n\nLe feed parfait. La bio parfaite. Le logo parfait.\n\nPendant ce temps : zero vente.\n\nLe jour ou j'ai lance un truc imparfait, j'ai fait mes premieres ventes.\n\n{product} t'apprend a avancer vite. Pas a etre parfaite.\n\n{cta}", "Vendre c'est aider. Si ton offre resout un vrai probleme, la vendre c'est rendre service.\n\nArrete de culpabiliser. Tu aides des gens. C'est normal d'etre payee.\n\nAvant j'avais honte de vendre. Maintenant chaque vente c'est quelqu'un que j'aide.\n\nDans {product}, on change ce rapport. Et ca change tout.\n\n{cta}", "Le meilleur investissement que j'ai fait ? Me faire accompagner.\n\nPas un livre. Pas un podcast. Un vrai programme.\n\nAvant je cherchais des reponses gratuites partout. Resultat : des mois perdus.\n\nMaintenant je transmets ce raccourci. C'est ca {product}.\n\n{cta}", "{product} t'apprend pas a devenir influenceuse.\n\nA creer une offre qui se vend. Trouver les bonnes personnes. Leur parler simplement.\n\nPas de jargon. Juste ce qui marche.\n\nUne eleve avait zero competence technique. En 4 semaines elle vendait.\n\n{cta}", "Un truc appris a la dure : tu peux avoir le meilleur produit du monde. Si personne sait qu'il existe, tu vendras rien.\n\nLe marketing c'est pas manipuler. C'est faire savoir que tu existes a ceux qui ont besoin de toi.\n\nDans {product}, on apprend a faire ca. Simplement.\n\n{cta}", "La peur de vendre trop. Tu connais ?\n\nJ'ai peur de souler les gens. J'ai peur qu'on me voie comme une vendeuse.\n\nMais reflechis : est-ce que ton medecin a peur de te prescrire un medicament ? Non. Parce qu'il sait que ca aide.\n\nPareil pour toi. C'est ce qu'on apprend dans {product}.\n\n{cta}", "3 questions a te poser avant de poster quoi que ce soit :\n\n1. Qu'est-ce que je vends ?\n2. A qui ?\n3. Pourquoi elle en a besoin maintenant ?\n\nSi tu sais pas repondre, ton audience non plus.\n\nDans {product}, on commence par la.\n\n{cta}", "La difference entre un hobby et un business ? Le business a un systeme de vente.\n\nTu peux etre passionnee par ton sujet. C'est genial. Mais sans systeme, c'est un hobby.\n\nDans {product}, on transforme ta passion en business. Avec un vrai plan.\n\n{cta}", "Un truc contre-intuitif : moins t'as d'abonnes, plus c'est facile de vendre.\n\nAvec 200 abonnes tu connais tes gens. Tu peux leur parler en DM. Directement.\n\nPas besoin de pub. Pas besoin de viralite. Juste de la connexion humaine.\n\nC'est ce qu'on fait dans {product}.\n\n{cta}", "Le contenu qui vend le mieux ? Celui qui parle d'un probleme que ta cliente a en ce moment.\n\nPas tes diplomes. Pas ton parcours. Pas tes valeurs.\n\nSon probleme. Sa douleur. Et ce que tu proposes pour le resoudre.\n\nDans {product}, on apprend a identifier ce probleme.\n\n{cta}", "Les filles qui vendent bien ne parlent pas de leur offre tout le temps. Elles parlent du resultat de leur offre.\n\nPas achete ma formation. Mais voila ce que ca change de suivre ma formation.\n\nC'est la nuance. Celle de {product}.\n\n{cta}", "Tu postes tous les jours mais personne n'achete ? Normal.\n\nParce que poster n'est pas vendre. Poster c'est etre visible. Vendre c'est donner envie d'agir.\n\nDans {product}, tu apprends la difference. Et surtout comment passer de l'un a l'autre.\n\n{cta}", "Un piege courant : copier ce que font les autres.\n\nLeur contenu marche pour elles. Pas forcement pour toi. Parce que ton audience est differente.\n\nDans {product}, on trouve TA voix. Celle qui fait que les bonnes personnes se reconnaissent.\n\n{cta}", "L'offre parfaite n'existe pas. Mais une offre qui se vend, oui.\n\nElle repond a un vrai probleme. Clairement. Simplement.\n\nDans {product}, on construit cette offre ensemble. Pas parfaite. Efficace.\n\n{cta}", "Les stories marchent mieux que les posts pour vendre.\n\nParce que c'est de l'intime. C'est toi qui parles a une personne. Pas a une foule.\n\nEt les gens achetent a des personnes. Pas a des marques.\n\nDans {product}, on utilise les stories pour vendre. Naturellement.\n\n{cta}", "Regarde tes 5 dernieres stories. Est-ce qu'une seule donne envie de t'ecrire en DM ?\n\nSi la reponse est non, t'as pas un probleme de contenu. T'as un probleme de direction.\n\nDans {product}, chaque story a un but. Et ca change tout.\n\n{cta}", "Tu n'as pas besoin de plus d'information. Tu as besoin de plus d'action.\n\nTu sais deja plein de choses. Mais tu les appliques pas.\n\n{product} c'est pas un cours de plus. C'est un cadre pour FAIRE. Enfin.\n\n{cta}", "Le secret le mieux garde du business en ligne ? C'est simple. Tellement simple que les gens n'y croient pas.\n\nUne offre. Une cible. Un message. De la constance.\n\nC'est tout. Vraiment.\n\nDans {product}, on met ca en place. Et ca marche.\n\n{cta}", "Ce qui bloque la plupart des femmes ? C'est pas le manque de temps. C'est le manque de clarte.\n\nQuand tu sais exactement quoi faire, tu trouves le temps. Toujours.\n\n{product} te donne cette clarte. Le reste suit.\n\n{cta}", "Les gens n'achetent pas parce qu'ils comprennent ton produit. Ils achetent parce qu'ils se sentent compris.\n\nTon boulot c'est pas d'expliquer ton offre. C'est de montrer que tu comprends leur probleme.\n\n{product} t'apprend exactement ca.\n\n{cta}", "Tu veux savoir comment j'ai fait ma premiere vente ? En DM. Une conversation. Pas un tunnel de vente.\n\nJe lui ai pose des questions. Elle m'a dit son probleme. Je lui ai montre que {product} etait la solution.\n\nC'est aussi simple que ca.\n\n{cta}", "Ne confonds pas visibilite et credibilite.\n\nT'as pas besoin que tout le monde te voie. T'as besoin que les bonnes personnes te fassent confiance.\n\nLa confiance se construit avec de la constance et de la clarte. Pas avec des followers.\n\n{cta}", "Le contenu gratuit sert a une seule chose : montrer que tu sais de quoi tu parles.\n\nPas a tout donner. Pas a tout expliquer.\n\nJuste assez pour que ta cliente se dise : si le gratuit est aussi bien, le payant doit etre incroyable.\n\n{cta}", "Le jour ou j'ai arrete de me comparer aux autres, j'ai commence a vendre.\n\nParce que je me suis concentree sur MA cliente. Pas sur ce que faisaient les autres.\n\nDans {product}, on se concentre sur toi. Pas sur la concurrence.\n\n{cta}", "Tu sais quel contenu convertit le mieux ? Les temoignages.\n\nPas tes arguments. Les resultats de tes clientes.\n\nQuand quelqu'un dit ca a marche pour moi, c'est 10 fois plus puissant que n'importe quelle explication.\n\n{cta}", "La regularite bat le talent. Toujours.\n\nUne eleve me l'a prouve : elle postait pas le meilleur contenu du monde. Mais elle postait tous les jours. Et elle a vendu.\n\n{product} te donne un plan pour etre reguliere sans t'epuiser.\n\n{cta}", "Le prix de ton offre n'est jamais le vrai probleme.\n\nSi ta cliente dit c'est trop cher, ca veut dire je ne vois pas la valeur.\n\nQuand elle voit la valeur, le prix n'est plus un obstacle.\n\n{product} t'apprend a montrer la valeur.\n\n{cta}", "Un truc tout bete mais puissant : pose des questions en story.\n\nPas des sondages. Des vraies questions. Celles qui font reflechir.\n\nQuand ta cliente reflechit a son probleme, elle est plus prete a acheter ta solution.\n\n{cta}", "Si tu pouvais changer une seule chose dans ton business demain, change ton offre.\n\nPas ton feed. Pas ta bio. Ton offre.\n\nRends-la claire. Simple. Desirable.\n\nC'est ce qu'on fait dans {product}.\n\n{cta}", "Un exercice simple : ecris le probleme numero 1 de ta cliente en une phrase.\n\nSi tu n'y arrives pas, c'est normal. Mais c'est la que tout commence.\n\nDans {product}, on clarifie ca ensemble.\n\n{cta}", "Un dernier truc pour aujourd'hui : arrete de sur-reflechir et commence a tester.\n\nLe marche te donnera les reponses. Pas ta tete.\n\n{product} t'accompagne dans ces tests.\n\n{cta}", "Ta cliente ne veut pas ta formation. Elle veut le resultat.\n\nElle veut pas apprendre le marketing. Elle veut des ventes.\n\nQuand tu vends le resultat au lieu du contenu, tout change.\n\n{cta}", "Tu passes combien de temps par semaine a creer du contenu ? Et combien a vendre ?\n\nSi c'est 90% contenu et 10% vente, c'est pour ca que tu vends pas.\n\n{product} t'aide a inverser ca.\n\n{cta}"], "mercredi": ["Il y a un an, je regardais mon compte en fin de mois avec la boule au ventre.\n\nJ'avais un salaire. Mais il suffisait jamais.\n\nAvant je comptais chaque euro. Maintenant je choisis comment je les depense.\n\nC'est pas de la magie. C'est {product}.\n\n{cta}", "Ma copine m'a appelee l'autre jour. Elle m'a dit : comment tu fais pour etre aussi tranquille ?\n\nLa verite : j'ai un business qui tourne. Je sais ce que j'ai a faire.\n\nAvant j'etais celle qui stressait tout le temps. Maintenant c'est moi qu'on appelle.\n\nCe qui a change ? Ma methode. Celle de {product}.\n\n{cta}", "Petite histoire. Y'a 8 mois, une femme m'ecrit : je suis au RSA. Ton programme peut m'aider ?\n\nElle a rejoint {product}. Elle a applique. Sans excuses.\n\nLe mois dernier elle m'a envoye un screen de ses ventes.\n\nC'est pour des moments comme celui-la que je fais ce que je fais.\n\n{cta}", "Le jour ou j'ai arrete de bosser pour quelqu'un d'autre, j'avais la trouille. Vraiment.\n\nMais ce qui me faisait encore plus peur : etre au meme endroit dans 5 ans.\n\nAvant j'avais un CDI et zero temps. Maintenant j'ai un business et mes matinees.\n\n{cta}", "On m'a dit que j'etais folle de lacher mon job.\n\nMa famille. Mes collegues. Mes amis.\n\nPuis j'ai ecoute les femmes qui avaient reussi. Et j'ai compris que le vrai risque c'etait de ne rien faire.\n\nAvant j'ecoutais les gens qui avaient peur. Maintenant j'ecoute ceux qui avancent.\n\nC'est dans {product} que j'ai trouve ces femmes.\n\n{cta}", "J'ai fait une erreur pendant longtemps : tout faire seule.\n\nApprendre seule. Creer seule. Vendre seule.\n\nResultat : des mois de galere pour des resultats nuls.\n\nLe jour ou j'ai rejoint un programme avec un vrai plan, tout a debloque.\n\nAvant je galerais dans mon coin. Maintenant j'avance avec une communaute.\n\nC'est {product}.\n\n{cta}", "Je me souviens d'un moment precis. Ma voiture, garee devant le supermarche. Mon telephone vibre.\n\nUne vente. Ma deuxieme de la journee. Et j'avais rien fait de special.\n\nAvant mes revenus dependaient de mes heures. Maintenant ils dependent de mon systeme.\n\nCe systeme c'est {product}.\n\n{cta}", "Le plus dur c'est les 30 premiers jours.\n\nPas de resultats. Tu construis. Et tu doutes.\n\nC'est exactement la ou la plupart abandonnent.\n\nCelles qui tiennent voient les resultats arriver. Et apres, plus personne les arrete.\n\nAvant j'abandonnais a la premiere difficulte. Maintenant je sais que c'est normal et que ca passe.\n\n{product} t'accompagne dans ces 30 jours.\n\n{cta}", "Un matin, j'ai ouvert mon ordi et j'ai vu que j'avais gagne plus en une nuit qu'en une semaine de salariat.\n\nJe me suis assise. J'ai regarde l'ecran. Et je me suis dit : c'est vrai que c'est possible.\n\nDans {product}, l'objectif c'est que tu vives ce moment le plus vite possible.\n\n{cta}", "J'ai longtemps cru qu'il fallait un parcours parfait pour reussir. Un diplome. De l'experience. Un reseau.\n\nEn vrai ? Les femmes qui reussissent autour de moi sont des mamans, des ex-salariees, des femmes qui partaient de zero.\n\nLeur point commun ? Elles ont suivi un plan. Et elles se sont accrochees.\n\nAvant je croyais que c'etait pour les autres. {product} le prouve chaque semaine.\n\n{cta}", "Mes debuts ? Catastrophiques. Je vais etre honnete.\n\nJe postais n'importe quoi. Pas d'offre claire. Pas de cible.\n\nQuelqu'un m'a aidee a voir clair. En deux semaines, j'avais une direction.\n\nAvant je m'eparpillais. Maintenant j'ai un business structure.\n\nC'est ca {product}. Un raccourci.\n\n{cta}", "Le declic pour moi ca a pas ete un truc spectaculaire.\n\nC'etait un mardi soir. J'etais fatiguee. Les enfants dormaient. Et j'ai juste pense : je veux pas refaire ca encore 20 ans.\n\nPas de grande revelation. Juste la fatigue.\n\nAvant je subissais. Maintenant je construis.\n\nSi tu ressens la meme chose, {product} est fait pour toi.\n\n{cta}", "J'ai failli arreter apres 3 mois. Zero vente. Des stories dans le vide. J'avais l'impression de parler toute seule.\n\nEt puis une femme m'a achete ma premiere offre. Par message. En me disant : je te suis depuis le debut.\n\nAvant je voulais tout lacher. Maintenant je sais que la constance paie.\n\n{product} t'aide a tenir. Parce que c'est la que tout se joue.\n\n{cta}", "Quand j'ai annonce a ma mere que je vendais en ligne, elle a pas compris.\n\nVendre quoi ? A qui ? Sur Internet ?\n\nJe l'ai pas convaincue avec des mots. Avec mes resultats.\n\nAvant je devais me justifier. Maintenant mes resultats parlent pour moi.\n\n{cta}", "Un souvenir qui me revient souvent : le premier achat que j'ai fait sans regarder le prix.\n\nC'etait un resto. Rien de fou. Mais pour moi c'etait enorme.\n\nAvant chaque depense etait un calcul. Maintenant je me pose plus la question.\n\n{product} m'a donne ca.\n\n{cta}", "Le moment ou j'ai su que j'avais fait le bon choix : un mercredi apres-midi, a la maison avec mes enfants.\n\nPas en conge. Pas en arret. Juste disponible.\n\nAvant le mercredi c'etait boulot. Maintenant c'est famille.\n\nC'est ca que {product} construit.\n\n{cta}", "J'ai pleure un soir. Pas de tristesse. De soulagement.\n\nJe venais de realiser que j'allais pas passer ma vie a stresser pour l'argent.\n\nAvant je survivais. Maintenant je vis.\n\nEt cette transition, des dizaines de femmes l'ont faite avec {product}.\n\n{cta}", "Le truc le plus dur quand tu te lances ? Le silence.\n\nTu postes et personne ne reagit. Tu te sens seule.\n\nMais ce que tu vois pas, c'est que des gens lisent. En silence. Et un jour, l'un d'eux achete.\n\nAvant je voyais le silence comme un echec. Maintenant je sais que c'est la phase de construction.\n\n{product} t'aide a traverser cette phase.\n\n{cta}", "Un message que j'ai recu et que je relis souvent :\n\nGrace a toi, j'ai paye mon loyer avec mon business ce mois-ci. Pour la premiere fois.\n\nAvant elle ne savait meme pas quoi vendre. Maintenant elle vit de son activite.\n\nC'est ca la puissance d'un bon accompagnement. C'est ca {product}.\n\n{cta}", "Quand j'ai commence, j'avais honte de parler de mon business a mes proches.\n\nVendre sur internet ? C'est serieux ?\n\nMaintenant c'est eux qui me demandent des conseils.\n\nAvant j'avais honte. Maintenant j'inspire.\n\nC'est ce que vivent mes eleves dans {product}.\n\n{cta}", "Le premier virement que j'ai recu de mon business, je l'ai regarde 10 fois.\n\nPour etre sure. Vraiment sure.\n\nAvant l'argent venait d'un employeur. Maintenant il vient de quelque chose que j'ai cree.\n\nC'est un sentiment incroyable. Et {product} t'y amene.\n\n{cta}", "Ce que je dis a toutes mes eleves le premier jour :\n\nTu vas douter. Tu vas te demander si c'etait une bonne idee. Et puis un jour, tu vas vendre. Et tu vas comprendre.\n\nChacune a vecu ce cycle.\n\nSi t'es prete a le vivre aussi, {product} t'attend.\n\n{cta}", "Quand j'ai fait mes premieres ventes, j'ai rien dit a personne. Pendant 2 semaines.\n\nParce que j'avais peur que ca s'arrete. Que ce soit un coup de chance.\n\nMais ca s'est pas arrete. Parce que c'etait un systeme. Pas de la chance.\n\nAvant j'esperais. Maintenant je sais.\n\n{cta}", "Un truc que j'aurais aime savoir : l'echec fait partie du chemin.\n\nMes 3 premiers mois ont ete nuls. Vraiment nuls.\n\nMais sans ces 3 mois, j'aurais pas les resultats d'aujourd'hui.\n\nAvant j'avais peur d'echouer. Maintenant je sais que c'est comme ca qu'on apprend.\n\nDans {product}, on avance avec toi. Meme quand c'est dur.\n\n{cta}", "Ce matin j'ai pris mon cafe en regardant mes stats du mois. Et j'ai souri.\n\nPas parce que les chiffres sont enormes. Mais parce qu'ils sont MIENS.\n\nAvant mon salaire c'etait le resultat du travail de quelqu'un d'autre. Maintenant c'est le resultat du mien.\n\n{product} t'aide a creer tes propres resultats.\n\n{cta}", "Un truc bizarre : depuis que j'ai mon business, j'aime les lundis.\n\nAvant le lundi c'etait la corvee. Maintenant c'est le jour ou je demarre mes projets a moi.\n\n{cta}", "Le moment le plus surprenant de mon parcours : quand une inconnue m'a envoye un message pour me dire que j'avais change sa vie.\n\nUne inconnue. Sur internet. Grace a du contenu.\n\nAvant je pensais que je pouvais rien apporter. Maintenant je sais que si.\n\nToi aussi tu peux. C'est ce qu'on decouvre dans {product}.\n\n{cta}", "Confession : je fais encore des erreurs. Regulierement.\n\nMais la difference avec avant, c'est que maintenant je les corrige vite. Parce que j'ai un cadre.\n\nAvant une erreur me paralysait. Maintenant c'est juste un ajustement.\n\n{product} t'apprend cette mentalite.\n\n{cta}", "Si je devais tout recommencer a zero, je ferais une seule chose differemment :\n\nMe faire accompagner des le debut.\n\nChaque mois passe seule = un mois perdu.\n\nC'est pour ca que j'ai cree {product}. Pour que toi tu perdes pas ces mois.\n\n{cta}", "Tu n'as pas besoin d'une grande histoire pour reussir. Tu as juste besoin de commencer la tienne.\n\nAvant j'attendais d'avoir quelque chose a raconter. Maintenant j'ai une histoire. Et elle continue de s'ecrire.\n\n{cta}", "La premiere fois qu'une cliente m'a remerciee, j'ai pas su quoi dire.\n\nJe m'attendais pas a ce que mon travail ait autant d'impact.\n\nAvant je doutais de ma valeur. Maintenant mes clientes me la confirment chaque semaine.\n\n{cta}", "Un truc bizarre : depuis que j'ai lance mon business, je dors mieux.\n\nPas parce que je suis moins fatiguee. Parce que je suis moins stressee.\n\nAvant je m'endormais en pensant au boulot du lendemain. Maintenant je m'endors sereine.\n\n{cta}", "Le jour ou j'ai compris que je n'avais pas besoin de la validation de personne pour me lancer, tout a change.\n\nAvant j'attendais qu'on me dise que j'etais prete. Maintenant je me le dis moi-meme.\n\n{cta}", "J'ai pris un cafe avec une ancienne collegue. Elle m'a dit : tu as l'air tellement bien.\n\nJe suis bien. Parce que j'ai construit quelque chose qui me ressemble.\n\nAvant je m'adaptais a la vie des autres. Maintenant j'ai cree la mienne.\n\n{cta}", "Le truc le plus inattendu de mon parcours ? C'est pas l'argent.\n\nC'est la confiance en moi. Celle que j'ai gagnee en construisant quelque chose de mes propres mains.\n\nAvant je doutais de tout. Maintenant je me fais confiance.\n\n{product} m'a apporte ca.\n\n{cta}", "Un soir, mon fils m'a dit : maman, tu souris plus qu'avant.\n\nIl a raison. Je souris plus.\n\nPas parce que tout est parfait. Parce que j'ai un cap. Et ca change tout.\n\n{cta}", "J'ai garde mon premier screen de vente. Je le regarde parfois.\n\nPas pour le montant. Pour le souvenir.\n\nLe souvenir du moment ou j'ai compris que c'etait reel.\n\nC'est ce moment qu'on vise dans {product}.\n\n{cta}", "Si on m'avait dit il y a 2 ans que je vivrais de mon activite en ligne, j'aurais ri.\n\nEt pourtant.\n\nLa vie qu'on pense impossible est souvent juste a un plan de distance.\n\n{product} c'est ce plan.\n\n{cta}", "Le plus beau dans ce que je fais ? C'est pas le business.\n\nC'est les messages que je recois. Les merci. Les j'y suis arrivee.\n\nAvant je ne savais pas que je pouvais avoir cet impact.\n\nMaintenant je le vis chaque jour.\n\n{cta}", "Confession : y'a des jours ou j'ai la flemme.\n\nMais la difference avec avant, c'est que meme les jours de flemme, mon business tourne.\n\nParce qu'il est construit sur un systeme. Pas sur ma motivation.\n\nC'est ca {product}.\n\n{cta}", "Y'a un truc que je dis souvent : le plus dur c'est pas la methode. C'est de se donner le droit d'essayer.\n\nLe droit de vouloir plus. Le droit de se tromper. Le droit de recommencer.\n\nAvant je me donnais pas ce droit. Maintenant si.\n\nEt {product} est la pour t'accompagner.\n\n{cta}", "Le jour ou j'ai compris que mon salaire ne monterait jamais assez vite pour la vie que je voulais.\n\nPas une crise. Juste un constat.\n\nAvant j'attendais la prochaine augmentation. Maintenant je cree mes propres augmentations.\n\n{cta}", "Je me souviens du jour ou j'ai dit a mon patron : je pars.\n\nPas de la colere. Du calme. Parce que je savais ou j'allais.\n\nAvant je dependais de lui. Maintenant je depend de moi.\n\n{product} m'a permis d'arriver a ce moment.\n\n{cta}"], "jeudi": ["J'ai pas le temps.\n\nJe comprends. Mais soyons honnetes : tu as le temps de scroller. De regarder des stories.\n\nTu as le temps de commencer. Juste pas les memes priorites.\n\nLes femmes dans {product} ont des enfants, un job. Elles y arrivent. Parce que le programme est fait pour ca.\n\n{cta}", "C'est pas pour moi. Je suis pas assez...\n\nPas assez jeune. Pas assez technique. Pas assez visible.\n\nUne eleve disait ca mot pour mot il y a 4 mois. Aujourd'hui elle vend toutes les semaines.\n\nC'est pas toi qui n'es pas assez. C'est que personne ne t'a montre le chemin.\n\n{product} est la pour ca.\n\n{cta}", "Et si ca marche pas ?\n\nRetourne la question : et si ca marchait ?\n\nLes femmes qui reussissent dans {product} ne sont pas celles qui n'avaient pas peur. Ce sont celles qui ont avance avec.\n\n{cta}", "J'ai deja essaye et ca a pas marche.\n\nMais est-ce que tu avais une methode ? Un plan ? Quelqu'un pour te guider ?\n\nEssayer seule et essayer avec un cadre, c'est pas la meme chose.\n\n{product} c'est ce cadre.\n\n{cta}", "Mon entourage me dit que c'est risque.\n\nQuestion sincere : est-ce que ton entourage a la vie que tu veux ?\n\nSi oui, ecoute-les. Si non... ecoute quelqu'un d'autre.\n\nAvant j'ecoutais les gens qui avaient peur. Maintenant j'ecoute les femmes qui avancent.\n\n{cta}", "Je sais pas quoi vendre.\n\nNormal. Et c'est justement pour ca que {product} existe.\n\nLa plupart de mes eleves n'avaient pas d'idee claire au debut. On l'a trouvee ensemble.\n\nUne eleve ne savait pas non plus. En 2 semaines son offre. En 4, sa premiere cliente.\n\n{cta}", "J'ai pas d'argent pour investir dans un programme.\n\nJe comprends. J'ai ete la aussi.\n\nMais pose-toi cette question : combien ca te coute de rester ou tu es ?\n\nUn mois de plus sans revenus en ligne. Un mois de plus a stresser.\n\nParfois le plus cher c'est de ne rien faire.\n\n{cta}", "Le business en ligne c'est pour les influenceuses. Pas pour moi.\n\nSi tu savais le nombre de mes eleves qui avaient zero presence en ligne avant de commencer.\n\nT'as pas besoin de danser sur des reels. T'as juste besoin de savoir parler aux bonnes personnes.\n\n{cta}", "J'ai pas confiance en moi.\n\nPersonne n'a confiance en soi au debut. Personne.\n\nLa confiance vient avec les resultats. Pas avant.\n\nTu commences. Tu fais ta premiere vente. Tu te dis ah ok, je peux le faire.\n\nAvant j'attendais la confiance pour agir. Maintenant j'agis pour avoir confiance.\n\n{cta}", "Je vais y reflechir.\n\nReflechir c'est bien. Mais a un moment, il faut trancher.\n\nTu reflechis depuis combien de temps deja ? Des semaines ? Des mois ?\n\nLes femmes dans {product} ont toutes eu ce moment d'hesitation. Et elles sont contentes d'avoir saute.\n\n{cta}", "Je suis trop vieille pour me lancer.\n\nIl y a des femmes de 50 ans dans {product} qui vendent en ligne.\n\nL'age c'est une excuse. Pas un obstacle.\n\nCe qui compte c'est ta motivation. Et si tu lis ca, tu l'as deja.\n\n{cta}", "Y'a trop de concurrence.\n\nLe marche francophone est IMMENSE. Et sous-exploite.\n\nLe probleme c'est pas la concurrence. C'est de pas se differencier. Et ca, ca s'apprend.\n\nDans {product}, on trouve ta voix unique.\n\n{cta}", "Je commence lundi.\n\nLe lundi parfait n'existe pas. Le bon moment n'existe pas.\n\nCommence maintenant. Meme petit. Meme imparfait. Meme en ayant peur.\n\n{product} t'accompagne des le premier pas.\n\n{cta}", "Je ne suis pas a l'aise avec la vente.\n\nPersonne ne l'est au debut. Et c'est normal.\n\nMais vendre c'est pas manipuler. C'est aider quelqu'un a resoudre un probleme qu'il a deja.\n\nQuand tu comprends ca, vendre devient simple.\n\nC'est le premier declic dans {product}.\n\n{cta}", "J'ai peur de me planter devant tout le monde.\n\nAu debut, personne ne te regarde. C'est la bonne nouvelle.\n\nTu peux tester. Rater. Recommencer. En silence.\n\n{product} t'accompagne dans cette phase invisible. La plus importante.\n\n{cta}", "J'ai pas de reseau.\n\nMoi non plus au debut. Zero.\n\nMon reseau je l'ai construit en ligne. En parlant aux bonnes personnes.\n\nDans {product}, tu apprends a creer ces connexions.\n\n{cta}", "Ca prend combien de temps ?\n\nPremieres ventes possibles en 3-4 semaines si tu appliques.\n\nC'est pas une promesse magique. C'est ce qu'on constate chez les eleves qui suivent le plan de {product}.\n\n{cta}", "J'ai deja achete un programme et ca a rien donne.\n\nLe programme ou toi ?\n\nSi t'as pas applique, c'est pas le programme le probleme.\nSi t'as applique et rien, c'etait pas le bon programme.\n\n{product} marche parce qu'il est simple et qu'on t'accompagne.\n\n{cta}", "Mon produit est pas assez bien pour le vendre.\n\nTon produit n'a pas besoin d'etre parfait. Il a besoin de resoudre un probleme.\n\nSi une personne dit merci, ca m'a aidee, ton produit est assez bien.\n\nDans {product}, on construit des offres qui aident. Pas des offres parfaites.\n\n{cta}", "J'ai peur d'investir et que ca serve a rien.\n\nC'est la peur la plus normale du monde.\n\nMais regarde les resultats de mes eleves. Elles avaient la meme peur. Et elles ont saute.\n\nLa seule chose qui ne servira a rien, c'est de ne rien faire.\n\n{cta}", "C'est facile pour toi, t'as toujours ete comme ca.\n\nNon. J'ai appris. Comme tout le monde.\n\nY'a deux ans j'avais aucune idee de ce que je faisais. Zero competence en business.\n\nAujourd'hui j'accompagne des femmes dans {product}. Tout s'apprend.\n\n{cta}", "Et si les gens se moquent de moi ?\n\nLes gens qui se moquent ne sont pas tes clients. Tu t'en fiches.\n\nTes clients, eux, ils attendent que tu te montres.\n\nAvant j'avais peur du regard des autres. Maintenant je parle a ceux qui comptent.\n\n{cta}", "J'ai peur de l'echec.\n\nTu sais ce qui est pire que l'echec ? Le regret.\n\nDans 5 ans, tu preferes te dire j'ai essaye ou j'aurais du essayer ?\n\n{product} c'est essayer. Avec un filet.\n\n{cta}", "Mon mari, ma mere, ma soeur ne comprend pas.\n\nNormal. Ils ont pas ta vision.\n\nMais tu n'as pas besoin de leur permission. Tu as besoin de ta propre decision.\n\nLes femmes dans {product} ont souvent commence sans soutien. Maintenant leurs proches sont fans.\n\n{cta}", "Je prefere economiser plutot qu'investir.\n\nEconomiser c'est bien. Mais economiser sans construire de revenus, c'est survivre.\n\n{product} c'est pas une depense. C'est un outil pour creer de l'argent.\n\n{cta}", "J'ai pas d'idee originale.\n\nT'as pas besoin d'une idee originale. T'as besoin d'une solution a un probleme que des gens ont.\n\nL'originalite c'est surfait. L'utilite c'est tout.\n\nDans {product}, on part du probleme. Pas de l'idee.\n\n{cta}", "Je ferai ca quand ma situation sera plus stable.\n\nTa situation sera plus stable QUAND tu auras un business.\n\nPas l'inverse.\n\nAttendre la stabilite pour agir, c'est attendre d'avoir chaud pour allumer le chauffage.\n\n{product} c'est le chauffage.\n\n{cta}", "Je veux etre sure avant de me lancer.\n\nSure de quoi exactement ? Que ca marche a 100% ? Ca personne ne peut te le garantir.\n\nMais ce que je peux te montrer, c'est des dizaines de femmes qui ont pris le risque avec {product}. Et qui aujourd'hui vendent.\n\nLa certitude vient apres. Pas avant.\n\n{cta}", "Je suis pas creative.\n\nT'as pas besoin d'etre creative. T'as besoin d'etre claire.\n\nLa creativite c'est surfait. La clarte ca vend.\n\n{cta}", "J'habite dans un petit village, ca marchera pas.\n\nTon business est en ligne. Tes clients peuvent etre partout dans le monde.\n\nUne eleve vit dans un village de 500 habitants. Elle vend en ligne toutes les semaines.\n\n{cta}", "Je suis nulle en technologie.\n\nSi tu sais utiliser Instagram, tu sais faire ca.\n\nDans {product}, tout est explique simplement. Pas besoin d'etre technique.\n\n{cta}", "Je suis introvertie, je peux pas vendre.\n\nLes meilleures vendeuses que je connais sont introverties.\n\nParce qu'elles ecoutent. Et ecouter c'est la premiere competence pour vendre.\n\n{product} t'apprend a vendre a ta facon.\n\n{cta}", "C'est sature, y'a plus de place.\n\nLe nombre de femmes qui veulent se lancer augmente chaque jour. Le marche grossit. Pas l'inverse.\n\nDans {product}, on t'aide a te positionner.\n\n{cta}", "Et si personne achete ?\n\nAlors tu ajustes. Tu testes autre chose. Tu demandes du feedback.\n\nDans {product}, on t'aide a comprendre pourquoi ca marche pas et a corriger.\n\nC'est pas un echec. C'est un apprentissage.\n\n{cta}", "Je suis pas assez connue pour vendre.\n\nTu n'as pas besoin d'etre connue. Tu as besoin d'etre trouvee par les bonnes personnes.\n\n10 personnes qui te font confiance valent plus que 10000 qui te connaissent vaguement.\n\n{cta}", "J'ai pas les moyens de me tromper.\n\nJustement. C'est pour ca qu'il te faut un cadre.\n\nSe tromper seule coute cher. Se tromper accompagnee, ca s'appelle apprendre.\n\n{product} c'est cet accompagnement.\n\n{cta}", "Tout le monde vend des formations en ce moment.\n\nOui. Et ?\n\nTout le monde vend aussi du cafe, des vetements, de la nourriture. Ca empeche personne de reussir.\n\nCe qui compte c'est pas le marche. C'est ta facon d'y prendre ta place.\n\n{product} t'aide a trouver cette place.\n\n{cta}", "Mon ancien programme m'a decue.\n\nJe comprends. Mais tous les programmes ne se valent pas.\n\nRegarde les resultats de mes eleves. C'est ca la difference.\n\n{cta}", "Ca marche que pour certaines niches.\n\nNon. Ca marche pour tout probleme que des gens veulent resoudre.\n\nCoaching, artisanat, cuisine, bien-etre, education... les eleves de {product} sont dans plein de domaines.\n\n{cta}", "Mes amies vont me juger.\n\nTes amies te jugeront peut-etre. Tes clientes te remercieront.\n\nA toi de choisir qui tu ecoutes.\n\n{cta}", "J'ai pas de diplome dans ce domaine.\n\nMes meilleures eleves n'ont aucun diplome lie a leur activite.\n\nCe qui compte c'est ta capacite a aider. Pas un papier.\n\n{cta}", "J'ai deja une activite, j'ai pas le temps pour un side project.\n\nLes eleves de {product} consacrent 1 a 2h par jour. C'est tout.\n\nPas 8h. Juste 1 a 2h bien utilisees.\n\n{cta}", "J'ai pas de produit a vendre.\n\nOn n'a pas besoin d'un produit pour commencer. On a besoin d'une competence a partager.\n\nDans {product}, on t'aide a transformer ce que tu sais en offre.\n\n{cta}", "Je me dis que c'est trop beau pour etre vrai.\n\nJe comprends la mefiance. Y'a beaucoup de bruit en ligne.\n\nMais regarde les temoignages. Ce sont des vraies femmes. Des vrais resultats.\n\nLa seule facon de savoir, c'est d'essayer.\n\n{cta}"], "vendredi": ["Resultats de la semaine dans {product} :\n\nUne eleve, premiere vente. Zero technique. Zero experience.\nUne autre, 3 ventes ce mois. En plus de son job.\nUne autre, a quitte son CDI. Vit de son business depuis 2 mois.\n\nDes femmes normales. Pas des influenceuses.\n\nTu pourrais etre la prochaine.\n\n{cta}", "Message recu ce matin :\n\nJ'ai fait ma premiere vente cette nuit. Je tremblais en lisant la notification.\n\nC'est une eleve. Il y a 3 semaines elle me disait je suis nulle en business.\n\n3 semaines. C'est tout ce qu'il lui a fallu avec {product}.\n\n{cta}", "Je vais etre transparente : {product} ne marche pas pour tout le monde.\n\nCa ne marche pas pour celles qui veulent des resultats sans rien faire.\n\nMais pour celles qui suivent le plan ? Les resultats parlent d'eux-memes.\n\nUne eleve a fait ses premieres ventes en 3 semaines.\nUne autre a remplace son salaire en 5 mois.\n\n{cta}", "Le chiffre qui me rend la plus fiere ?\n\nC'est pas mon chiffre d'affaires. C'est le nombre de femmes qui m'ecrivent j'ai fait ma premiere vente.\n\nParce que la premiere vente, c'est le moment ou tu te dis c'est reel. Ca marche pour moi.\n\nAvant cette vente, c'est de la croyance. Apres, c'est de la certitude.\n\n{product} t'amene a ce moment.\n\n{cta}", "Capture d'ecran dans mes DM :\n\nJ'etais au RSA il y a 4 mois. Ce matin j'ai recu mon 8eme paiement.\n\nJe partage pas ca pour te vendre du reve. Je partage ca pour que tu comprennes que c'est reel.\n\nLes femmes dans {product} ont juste un plan. Et elles l'appliquent.\n\n{cta}", "Un truc qui me fait toujours sourire : quand une eleve me dit j'ai fait une vente et j'ai hurle dans ma cuisine.\n\nJe connais ce sentiment. La premiere vente. Le premier c'est reel.\n\nAvant, ces femmes doutaient. Comme toi peut-etre.\n\nMaintenant elles vendent. Grace a {product}.\n\n{cta}", "Une eleve m'a ecrit hier :\n\nY'a 2 mois je scrollais tes stories en me disant ca marchera jamais pour moi. Aujourd'hui j'ai fait 4 ventes ce mois.\n\nSi tu scrolles en te disant la meme chose... dans 2 mois c'est peut-etre toi qui m'enverras ce message.\n\n{cta}", "Ce que j'aime le plus dans mon boulot :\n\nC'est pas l'argent. C'est le vocal d'une eleve a 23h qui me dit : j'ai fait ma premiere vente et je sais pas a qui le dire a part toi.\n\nParce que souvent, leur entourage comprend pas. Mais nous on sait.\n\nC'est ca la communaute {product}.\n\n{cta}", "Je ne fais jamais de fausses promesses. Alors voila la verite :\n\n{product} ne va pas te rendre riche en une semaine. Ca c'est du mensonge.\n\nPar contre, si tu suis le plan, tu peux faire tes premieres ventes en 3-4 semaines. Et construire quelque chose de solide en quelques mois.\n\nC'est pas sexy comme promesse. Mais c'est honnete.\n\n{cta}", "Avant/apres d'une eleve :\n\nAvant : je postais tous les jours sans resultat. Je voulais tout lacher.\nApres : premiere vente en 12 jours. J'ai compris ce qui bloquait.\n\nCe qui a change ? Pas elle. Sa methode.\n\nCelle de {product}.\n\n{cta}", "Un truc que je constate chaque semaine :\n\nLes femmes qui reussissent le plus vite dans {product}, c'est pas les plus techniques. C'est pas les plus creatives.\n\nC'est celles qui appliquent sans chercher a tout comprendre d'abord.\n\nElles font. Elles ajustent. Elles avancent.\n\nEt les resultats suivent. Toujours.\n\n{cta}", "Une eleve m'a envoye un screen ce matin.\n\n3 ventes en une semaine. Avec 400 abonnes. Sans pub.\n\nCa prouve un truc simple : t'as pas besoin d'etre connue. T'as besoin d'etre claire.\n\nC'est ce qu'on travaille dans {product}.\n\n{cta}", "Les resultats de mes eleves sont ma meilleure publicite.\n\nDes femmes normales. Des mamans. Des salariees. Des femmes au chomage.\n\nQui ont suivi un plan. Et qui vendent maintenant.\n\nC'est ca {product}. Ni plus ni moins.\n\n{cta}", "Le plus beau feedback que j'ai recu cette semaine :\n\nAvant je me sentais nulle. Maintenant je me sens capable. Et en plus, je vends.\n\n{product} change pas juste les resultats. Il change le regard que tu portes sur toi.\n\n{cta}", "Un chiffre simple : sur les dernieres eleves qui ont applique le plan de {product}, la majorite a fait sa premiere vente en moins de 30 jours.\n\nPas toutes. Mais la majorite.\n\nPas parce qu'elles sont geniales. Parce que la methode est bonne.\n\n{cta}", "Message du jour :\n\nMerci. J'ai paye mon loyer avec mon business ce mois. Pour la premiere fois.\n\nAvant elle savait pas quoi vendre. Maintenant elle vit de son activite.\n\nC'est la puissance d'un bon accompagnement. C'est ca {product}.\n\n{cta}", "J'ai commence a compter les premieres ventes de mes eleves.\n\nJ'ai arrete de compter. Y'en a trop.\n\nEt chacune me touche autant que la premiere.\n\n{product} c'est ca. Des femmes qui passent de j'y arriverai jamais a j'ai vendu.\n\n{cta}", "Ce que disent mes eleves le plus souvent ?\n\nPas ta formation est geniale. Mais j'aurais du commencer plus tot.\n\nC'est le plus beau compliment. Et le meilleur conseil que je puisse te donner.\n\n{cta}", "Une eleve avait tout essaye seule. YouTube. Podcasts. Articles.\n\nEn 6 mois, zero vente.\n\nEn 3 semaines avec {product}, premiere vente.\n\nLa difference ? Un plan. Un cadre. Quelqu'un qui te dit fais ca.\n\n{cta}", "Je ne partage jamais de faux resultats. Chaque temoignage est reel. Chaque screen est authentique.\n\nParce que la verite suffit. Les resultats de {product} parlent d'eux-memes.\n\n{cta}", "Une chose que je constate : les resultats arrivent plus vite que ce que les eleves imaginent.\n\nElles s'attendent a 3 mois. Souvent c'est 3 semaines.\n\nPas par magie. Par methode.\n\n{cta}", "La question que je recois le plus : c'est quoi ton secret ?\n\nY'a pas de secret. Y'a une methode. De la constance. Et un accompagnement.\n\nC'est ca {product}.\n\n{cta}", "Une eleve timide, introvertie, qui osait pas montrer sa tete en story.\n\nElle a fait ses premieres ventes sans jamais montrer son visage.\n\nDans {product}, on s'adapte a toi. Pas l'inverse.\n\n{cta}", "Je ne mesure pas mon succes en chiffre d'affaires.\n\nJe le mesure en nombre de femmes qui me disent j'ai fait ma premiere vente.\n\nCet indicateur ne ment jamais.\n\n{cta}", "Un truc qui me rend fiere : mes eleves qui surpassent mes propres resultats.\n\nC'est le signe que la methode marche. Independamment de moi.\n\n{product} c'est un systeme. Pas une personne.\n\n{cta}", "La phrase de la semaine, par une eleve :\n\nJ'ai plus gagne ce mois-ci avec mon side business qu'avec mon salaire.\n\nElle est encore salariee. Mais plus pour longtemps.\n\n{cta}", "Ce matin une eleve m'envoie : j'ai fait 2 ventes en dormant.\n\nElle avait rejoint {product} il y a 6 semaines.\n\nAvant elle ne savait meme pas ce qu'etait un tunnel de vente.\n\n{cta}", "Screenshot partage avec autorisation :\n\nUne eleve, ex-salariee, maman solo.\n\nMois 1 : premiere vente.\nMois 3 : revenu complementaire stable.\nMois 6 : elle a demissionne.\n\nC'est ca {product}.\n\n{cta}", "Bilan honnete : dans {product}, y'a des femmes qui abandonnent.\n\nCelles qui n'appliquent pas. Celles qui veulent des resultats sans effort.\n\nMais celles qui restent et qui suivent le plan ? Elles vendent. Toutes.\n\nLa question c'est pas est-ce que ca marche. C'est est-ce que TU vas le faire.\n\n{cta}", "Une eleve m'a dit un truc qui m'a marquee :\n\nLe plus dur c'etait pas de vendre. C'etait de croire que je pouvais vendre.\n\nApres sa premiere vente, plus aucun doute.\n\nC'est ce moment qu'on vise dans {product}.\n\n{cta}", "Le mot qui revient le plus dans les retours de mes eleves ? Clarte.\n\nEnfin j'ai de la clarte. Je sais quoi faire. C'est clair.\n\nC'est ca que {product} apporte avant tout. La clarte.\n\n{cta}", "Si tu veux des preuves, regarde pas ce que je dis. Regarde ce que mes eleves font.\n\nElles vendent. Depuis chez elles. Avec des petites audiences. Sans pub.\n\nC'est pas un miracle. C'est {product}.\n\n{cta}", "J'ai une eleve qui m'a dit : si moi j'y arrive, n'importe qui peut y arriver.\n\nElle le disait pas pour se devaloriser. Elle le disait pour te montrer que c'est accessible.\n\nPas besoin d'etre speciale. Besoin d'un plan.\n\n{cta}", "Le vendredi c'est le jour ou je fais le bilan.\n\nEt cette semaine, comme les autres, des femmes dans {product} ont fait des ventes.\n\nCertaines pour la premiere fois. D'autres pour la dixieme.\n\nMais chacune avec le meme plan. Le meme cadre.\n\n{cta}", "Un dernier truc : les resultats ne mentent pas.\n\nLes avis peuvent etre faux. Le marketing peut etre trompeur.\n\nMais quand une femme te dit j'ai fait ma premiere vente et qu'elle te montre le screen... c'est reel.\n\nC'est ca {product}. Du reel.\n\n{cta}", "Si tu as besoin d'une seule raison pour commencer, la voici :\n\nDes femmes qui etaient exactement a ta place il y a quelques mois sont aujourd'hui en train de vendre.\n\nPas parce qu'elles sont meilleures. Parce qu'elles ont commence.\n\n{product} est le premier pas.\n\n{cta}", "Cette semaine une eleve m'a envoye un message : je voulais juste te dire merci. Tu m'as change la vie.\n\nJe l'ai lu 3 fois.\n\nC'est pour ca que je fais ce que je fais. Pas pour moi. Pour elle. Et pour toi.\n\n{cta}", "Dernier resultat de la semaine : une eleve, zero experience, maman de 3 enfants.\n\nElle a fait sa premiere vente en 18 jours avec {product}.\n\n18 jours. Maman de 3 enfants. Aucune experience.\n\nSi elle peut le faire...\n\n{cta}", "Le plus beau dans ce que je fais c'est pas les chiffres. C'est les transformations.\n\nDes femmes qui arrivent en doutant de tout. Et qui repartent en vendant.\n\nC'est ca {product}.\n\n{cta}", "Je partage pas souvent mes propres chiffres. Mais le mois dernier j'ai gagne plus que mon ancien salaire annuel.\n\nPas pour frimer. Pour te montrer que c'est reel.\n\nJ'etais salariee. Je savais rien du business en ligne. J'ai appris.\n\nToi aussi tu peux.\n\n{cta}", "Ce matin j'ai compte : cette semaine, 5 eleves m'ont ecrit pour me dire qu'elles avaient fait une vente.\n\n5 en une seule semaine.\n\nC'est pas de la chance. C'est une methode qui fonctionne.\n\n{cta}", "Une eleve qui me disait il y a 2 mois : je ne vendrai jamais rien.\n\nAujourd'hui elle a un revenu complementaire. Regulier. Previsible.\n\nTout ce qui a change : elle a suivi le plan de {product}.\n\n{cta}", "Un temoignage qui resume tout :\n\nAvant {product} je ne savais pas par ou commencer. Maintenant j'ai une offre, des clientes, et un business.\n\n{cta}"], "samedi": ["Samedi matin. Grasse mat. Cafe. Les enfants jouent.\n\nMon ordi est ferme. Et c'est un choix, pas un hasard.\n\nAvant, le samedi c'etait le seul jour ou je soufflais. Maintenant, je souffle quand je veux.\n\nUne de mes eleves m'a dit : le premier samedi ou j'ai pas stresse pour le lundi, j'ai compris que ca valait le coup.\n\n{cta}", "Aujourd'hui j'ai rien de prevu. Et c'est le plan.\n\nAvant, une journee vide me faisait culpabiliser. Je devrais bosser.\n\nMaintenant je sais que mon business tourne. Meme quand je fais rien.\n\nC'est ce systeme qu'on met en place dans {product}.\n\n{cta}", "Ce matin j'ai pris mon petit-dej en terrasse. Mon telephone a vibre. Notification de paiement.\n\nIl y a un an, j'aurais pas cru ca possible.\n\nAvant mes revenus dependaient de mes heures. Maintenant ils dependent de mon systeme.\n\nTu veux le meme ? Il est dans {product}.\n\n{cta}", "Mes coulisses d'aujourd'hui : pyjama, canape, un the.\n\nEt un business qui tourne en fond.\n\nC'est pas glamour. C'est pas un reel avec une musique epique. C'est juste la vraie vie.\n\nAvant je fantasmais ce genre de journee. Maintenant c'est normal.\n\n{cta}", "On me demande souvent : tu travailles combien d'heures par jour ?\n\nCa depend. Des fois 2h. Des fois 5h. Des fois zero.\n\nLa vraie reponse c'est pas le nombre d'heures. C'est que JE CHOISIS.\n\nAvant mon emploi du temps c'etait un patron qui le faisait. Maintenant c'est moi.\n\n{cta}", "Un truc que je fais souvent le samedi : rien.\n\nLitteralement rien de productif. Et mon business ne s'ecroule pas.\n\nAvant, une journee off = culpabilite. Maintenant, une journee off = preuve que le systeme marche.\n\n{cta}", "Ce qui me plait dans cette vie ? C'est pas le chiffre d'affaires. C'est les choix.\n\nChoisir de bosser le matin ou l'apres-midi. Choisir d'aller chercher les enfants. Choisir un mardi off.\n\nAvant j'avais zero choix. Juste un planning impose.\n\nC'est le vrai luxe. Celui qu'on construit dans {product}.\n\n{cta}", "Photo du jour : mon bureau. C'est-a-dire mon canape.\n\nPas de dress code. Pas de trajet. Pas de faut que j'y sois a 8h.\n\nAvant je passais 1h30 dans les transports par jour. Maintenant ces heures je les passe avec mes enfants.\n\n{cta}", "Mes eleves me demandent souvent si je regrette mon ancien job.\n\nPas une seconde.\n\nPas que c'etait nul. Mais parce que ce que j'ai maintenant est tellement mieux.\n\nC'est ca que {product} permet de construire. Pas un business. Une vie.\n\n{cta}", "Le moment le plus marquant de ma semaine ?\n\nEmmener mon fils a son activite. Un mercredi. A 14h.\n\nAvant c'etait impossible. Le mercredi c'etait boulot.\n\nMaintenant je travaille quand je veux. Et je suis la quand il faut.\n\nSi t'es maman et que ce genre de moment te manque, {product} est fait pour toi.\n\n{cta}", "Routine du samedi :\n1. Grasse mat\n2. Cafe\n3. Checker mes stats (2 min)\n4. Sourire\n5. Profiter de ma journee\n\nAvant ma routine du samedi c'etait : recuperer de la semaine.\n\n{cta}", "On me dit souvent : mais tu bosses quand exactement ?\n\nLe matin tot. Ou le soir tard. Ou entre midi et deux.\n\nLa verite c'est que je bosse quand je suis efficace. Pas quand un patron me dit.\n\nAvant j'avais des horaires. Maintenant j'ai des resultats.\n\n{cta}", "Backstage honnete : certains jours, je fais rien du tout.\n\nEt c'est OK. Parce que mon business est structure pour ca.\n\nAvant je confondais etre occupee et etre productive. Plus maintenant.\n\n{cta}", "Mon luxe perso : un apres-midi en semaine sans rien de prevu.\n\nPas de reunion. Pas de deadline. Juste du temps.\n\nSi t'as un job salarie, tu sais a quel point c'est rare.\n\nAvant j'avais du temps le dimanche. Seulement le dimanche.\n\nMaintenant j'ai du temps quand je veux.\n\n{cta}", "Petit aveu : au debut je me sentais coupable de gagner de l'argent facilement.\n\nFacilement entre guillemets. Parce qu'il y a eu des mois de boulot derriere.\n\nMais maintenant que le systeme est en place, les ventes tombent.\n\nAvant je croyais que gagner de l'argent devait etre difficile. Maintenant je sais que ca doit juste etre intelligent.\n\n{cta}", "Ce matin j'ai couru 30 minutes. A 10h. Un mardi.\n\nAvant, a 10h un mardi, j'etais au bureau. Pas le choix.\n\nMaintenant je fais du sport quand j'en ai envie.\n\n{cta}", "De vraies pauses maintenant. Pas 5 minutes devant la machine a cafe. Des vraies pauses. D'une heure. D'un apres-midi.\n\nAvant les pauses etaient chronometrees. Maintenant elles sont choisies.\n\n{product} m'a donne ca.\n\n{cta}", "Mon fils m'a dit un truc hier : maman, t'es toujours la maintenant.\n\nAvant j'etais jamais la. Ou j'etais la mais la tete ailleurs.\n\nMaintenant je suis presente. Vraiment.\n\nC'est ca que {product} permet. Pas juste de l'argent. De la presence.\n\n{cta}", "Week-end en famille. Mon telephone a vibre. Vente.\n\nMon mec m'a dit : encore ? en rigolant.\n\nAvant le week-end c'etait le seul moment sans boulot. Maintenant le boulot et la vie coexistent.\n\n{cta}", "Je suis allee chez le coiffeur en plein mardi matin.\n\nTruc bete. Mais pour moi c'est un symbole.\n\nAvant je prenais RDV le samedi. Comme tout le monde. Parce que j'avais pas le choix.\n\nMaintenant j'ai le choix.\n\n{cta}", "Ce matin j'ai cuisine un bon petit plat. Pour le plaisir.\n\nAvant je cuisinais par obligation. Vite fait. Mal fait.\n\nMaintenant j'ai le temps de faire les choses bien.\n\n{cta}", "J'ai une question : c'est quoi le premier truc que tu ferais si t'avais plus de temps ?\n\nDormir ? Voir tes enfants ? Te balader ?\n\nQuoi que ce soit, c'est possible. C'est ce qu'on construit dans {product}.\n\n{cta}", "Samedi soir. J'ecris cette story depuis mon lit. Mon business a tourne toute la semaine.\n\nAvant, le samedi soir j'etais epuisee de ma semaine.\n\nMaintenant je suis fatiguee de rien du tout. Et c'est le meilleur sentiment.\n\n{cta}", "La question qu'on me pose jamais mais qui est la plus importante : est-ce que t'es heureuse ?\n\nOui. Pas parce que tout est parfait. Parce que j'ai le choix.\n\nAvant j'avais pas le choix. Et ca, ca change tout.\n\n{product} c'est aussi ca.\n\n{cta}", "Mes amies salariees me regardent parfois avec envie. Pas pour l'argent. Pour le temps.\n\nElles voient que je suis dispo. Que je suis tranquille.\n\nAvant j'etais comme elles. Maintenant j'ai un business.\n\n{cta}", "Le plus beau cadeau que mon business m'a fait ? Pas l'argent.\n\nLe temps avec mes enfants. La serenite. Le droit de dire non.\n\nChaque femme dans {product} construit les siens.\n\n{cta}", "Ce soir j'ai regarde un film en pleine semaine. Un jeudi soir. Sans stress du lendemain.\n\nAvant le jeudi soir c'etait plus que demain avant le week-end.\n\nMaintenant tous les soirs sont tranquilles.\n\n{cta}", "Mon ancien collegue m'a appelee. Il m'a demande si j'etais toujours dans mon truc internet.\n\nJ'ai souri. Parce que mon truc internet me rapporte plus que son salaire.\n\nAvant je devais me justifier. Maintenant les resultats parlent.\n\n{cta}", "Je suis partie en week-end sans rien planifier. Juste comme ca. Un vendredi midi.\n\nAvant fallait poser des conges. Demander la permission.\n\nMaintenant je fais mes valises et je pars.\n\n{cta}", "J'ecris cette story depuis un hamac. Pas au bout du monde. Dans mon jardin.\n\nMais avec le sentiment que tout va bien. Parce que tout va bien.\n\nAvant j'avais toujours une angoisse en fond. Maintenant non.\n\nC'est ca que {product} m'a apporte.\n\n{cta}", "Un samedi ou j'ai rien fait. Litteralement rien.\n\nEt lundi matin, j'avais quand meme recu 2 paiements pendant le week-end.\n\nAvant mon revenu dependait de ma presence. Plus maintenant.\n\n{cta}", "Brunch avec des copines ce matin. Aucune d'elles ne travaille le samedi.\n\nMoi non plus. Sauf que moi, je travaille pas non plus le lundi si je veux.\n\nAvant on avait le meme rythme. Maintenant j'ai le mien.\n\n{cta}", "Mon fils m'a demande si on pouvait aller a la piscine. Un mercredi.\n\nJ'ai dit oui sans reflechir.\n\nAvant j'aurais dit on verra ce week-end.\n\n{product} m'a donne cette liberte.\n\n{cta}", "Le plus gros luxe dans ma vie actuelle ? Pas les voyages.\n\nC'est de n'avoir aucune alarme programmee.\n\nAvant mon reveil sonnait a 6h30 tous les jours.\n\nMaintenant je me reveille quand mon corps decide.\n\n{cta}", "Un truc dont je ne me lasserai jamais : ouvrir mon ordi le matin et voir des ventes de la veille.\n\nAvant je regardais mes mails en esperant que mon patron dise un truc positif.\n\nMaintenant mes clientes me le disent.\n\n{cta}", "La serenite c'est pas l'absence de problemes. C'est savoir que tu as les moyens de les gerer.\n\nAvant chaque imprevu etait une catastrophe. Maintenant c'est un ajustement.\n\n{product} m'a donne cette base.\n\n{cta}", "Mon moment prefere de la journee ? Quand je ferme mon ordi.\n\nPas parce que je deteste bosser. Parce que je sais que demain sera pareil. Tranquille.\n\nAvant je fermais mon ordi epuisee. Maintenant satisfaite.\n\n{cta}", "Le dimanche soir je ne stresse plus.\n\nAvant c'etait la boule au ventre pour le lundi.\n\nMaintenant le lundi c'est un jour comme les autres. En mieux.\n\nC'est ca que {product} construit. La paix du dimanche soir.\n\n{cta}", "J'ai passe le samedi a faire du tri dans ma maison. Tranquillement.\n\nAvant les samedis c'etait courses-menage-enfants en mode marathon.\n\nMaintenant j'ai le temps de faire les choses calmement.\n\n{cta}", "Je suis allee courir ce matin. A 9h. En pleine semaine.\n\nAvant a 9h j'etais deja stressee depuis 2h.\n\nMaintenant a 9h je prends soin de moi.\n\n{cta}", "Un truc que je fais maintenant : des vraies pauses. D'une heure. D'un apres-midi.\n\nAvant elles etaient chronometrees. Maintenant choisies.\n\n{cta}", "Le plus beau dans ce business ? C'est pas l'argent. C'est le temps.\n\nLe temps de vivre. Le temps de choisir. Le temps d'etre la.\n\nAvant j'avais de l'argent (un peu) mais pas de temps.\n\nMaintenant j'ai les deux.\n\n{cta}", "Mon ancien bureau : un open space bruyant. Mon bureau maintenant : ou je veux.\n\nAvant je revais de teletravail. Maintenant j'ai mieux : je travaille quand je veux, ou je veux.\n\nC'est ce qu'on construit dans {product}.\n\n{cta}"], "dimanche": ["Petit message du dimanche.\n\nSi tu lis ca en te disant il faudrait que je me lance un jour... c'est peut-etre le moment.\n\nPas demain. Pas lundi. Maintenant.\n\nLes femmes dans {product} ont toutes eu ce moment. Elles sont contentes d'avoir saute le pas.\n\nUne eleve a commence un dimanche soir. Sa premiere vente est tombee 12 jours apres.\n\n{cta}", "Je vais etre directe avec toi.\n\nSi tu veux des resultats differents, il faut faire quelque chose de different.\n\nScroller des stories ne changera rien. Lire des posts motivants ne changera rien.\n\nCe qui change les choses ? Un plan. De l'action. Un cadre.\n\nC'est exactement ce que {product} t'offre. Si tu es prete.\n\n{cta}", "Je ferme les inscriptions bientot. Pas pour faire du marketing. Parce que j'accompagne un petit nombre de femmes a la fois.\n\nEt je veux etre dispo pour chacune.\n\nSi tu hesites depuis un moment, c'est maintenant.\n\n{cta}", "Ce que {product} t'apporte concretement :\n\nUn plan clair. Pas vague. Clair.\nUne methode pour creer ton offre et la vendre.\nUn accompagnement pour ne pas etre seule.\n\nPas de jargon. Pas de techniques compliquees. Juste ce qui marche.\n\nUne eleve a suivi ce plan. Premieres ventes en 3 semaines. Avec zero experience.\n\n{cta}", "Tu sais ce qui coute le plus cher ? Pas un programme.\n\nC'est de rester ou tu es. Un mois de plus. Puis un an de plus.\n\nAvec le meme stress. Les memes doutes. Le meme compte en banque.\n\n{product} c'est un investissement. Et les resultats de mes eleves montrent qu'il rapporte.\n\n{cta}", "Si tu es encore la, c'est que quelque chose te parle.\n\nEcoute-le.\n\nTu n'as pas besoin d'etre sure a 100%. Tu as besoin d'etre prete a essayer.\n\n{cta}", "Derniere session avant un moment. Apres, je ne sais pas quand je rouvre.\n\nC'est pas une technique de vente. C'est la realite.\n\nSi tu veux faire partie de la prochaine session de {product}, c'est maintenant.\n\n{cta}", "Un rappel simple :\n\nTu n'as pas besoin d'etre parfaite.\nTu n'as pas besoin de tout savoir.\nTu n'as pas besoin de 10k abonnes.\n\nTu as besoin d'un plan. D'un cadre. Et de passer a l'action.\n\nC'est ce que {product} te donne.\n\n{cta}", "Je te pose une question sincere :\n\nDans 6 mois, tu veux etre ou ?\n\nAu meme endroit ? Ou en train de construire quelque chose qui te plait ?\n\nLes femmes dans {product} ont choisi la deuxieme option.\n\n{cta}", "On arrive a la fin du week-end. Demain c'est lundi.\n\nEst-ce que tu veux un lundi different ? Pas un lundi magique. Juste un lundi ou tu travailles sur TON projet.\n\n{product} t'aide a construire ca.\n\nUne eleve a commence un lundi. 4 semaines apres, sa premiere vente.\n\n{cta}", "Recap honnete de {product} :\n\nC'est pas un truc ou tu gagnes de l'argent en dormant des demain.\nC'est un programme ou tu apprends a creer une offre, a la vendre, et a construire un business qui tient.\n\nC'est du travail. Mais c'est un travail qui a du sens. Et qui paie.\n\n{cta}", "Si tu as lu mes stories toute la semaine et que tu hesites encore... c'est normal.\n\nL'hesitation c'est pas un defaut. C'est le signe que tu reflechis.\n\nMais a un moment, il faut trancher. Soit tu continues comme avant. Soit tu essaies autre chose.\n\n{product} c'est cet autre chose.\n\n{cta}", "Imagine : dans 3 mois, tu as ton offre. Tes premieres clientes. Un debut de revenus.\n\nC'est pas un reve. C'est ce qui arrive quand tu suis un plan.\n\nLe plan de {product}.\n\n{cta}", "Je ne fais pas de longues pages de vente. Je n'ai pas de webinaire de 2h.\n\nJe te dis juste la verite : {product} marche. Les resultats sont la.\n\nLe reste, on le fait ensemble.\n\n{cta}", "Dernier message de la semaine.\n\nMerci de me lire. Merci de me suivre. Mais surtout : passe a l'action.\n\nLes stories c'est bien. Les resultats c'est mieux.\n\n{product} t'attend. Et moi aussi.\n\n{cta}", "Tu as le droit de vouloir plus. Tu as le droit de construire quelque chose. Tu as le droit de reussir.\n\nPersonne ne viendra te donner la permission. Prends-la.\n\n{cta}", "Tu sais quel est le meilleur moment pour planter un arbre ? Il y a 20 ans.\n\nLe deuxieme meilleur moment ? Maintenant.\n\nC'est pareil pour ton business.\n\n{product} est pret quand tu l'es.\n\n{cta}", "Je te fais une promesse :\n\nSi tu rejoins {product} et que tu suis le plan, tu vas comprendre des choses sur toi-meme que tu soupconnais meme pas.\n\nPas juste sur le business. Sur ta capacite a construire quelque chose.\n\n{cta}", "Si tu lis mes stories depuis des semaines sans agir, pose-toi cette question :\n\nQu'est-ce qui va changer si tu fais rien ?\n\nRien. Exactement rien.\n\nMais si tu fais UN pas, juste un, tout peut bouger.\n\n{cta}", "On m'a demande hier : c'est quoi la pire chose qui peut arriver si quelqu'un rejoint {product} ?\n\nLa pire chose ? Qu'
