<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Studio Stories Mono-Slide Pro</title>
<style>
:root{--bg:#0c0c10;--panel:#14141d;--card:#1a1a26;--accent:#FF8C42;--text:#f5f0e8;--muted:#8a8aa3;--border:#2a2a3a;--success:#10B981;--star:#FFD700;--font:'Segoe UI',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:12px;display:flex;justify-content:center}
.container{max-width:1100px;width:100%}
h1{text-align:center;margin-bottom:4px;font-size:1.5rem}
.subtitle{text-align:center;color:var(--muted);margin-bottom:18px;font-size:.85rem}
.tabs{display:flex;gap:6px;margin-bottom:14px;justify-content:center;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0}
.tab-btn{background:var(--panel);color:var(--muted);border:1px solid var(--border);padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;font-family:var(--font);transition:.2s}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.panel.active{display:block}
.fg{margin-bottom:16px}
.fg label{display:block;margin-bottom:6px;font-weight:600;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border .2s}
.fg input:focus{border-color:var(--accent)}
.fg .hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-large{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#FF6B2B);color:var(--bg);border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:.2s}
.btn-large:hover{filter:brightness(1.1)}.btn-large:active{transform:scale(.98)}
.daytabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.dtab{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;white-space:nowrap;font-size:12px;font-family:var(--font);flex-shrink:0;transition:.2s}
.dtab:hover{color:var(--text)}.dtab.active{background:rgba(255,140,66,.1);color:var(--accent);border-color:var(--accent)}
.dayinfo{margin-bottom:16px;background:rgba(255,255,255,.03);padding:12px;border-radius:8px;border-left:3px solid var(--accent)}
.dayinfo-t{font-weight:700;font-size:14px}.dayinfo-s{font-size:11px;color:var(--muted);margin-top:3px}
.clayout{display:flex;gap:24px;align-items:flex-start}
.phonewrap{width:280px;min-width:280px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px}
.phone{background:#111;border:10px solid #222;border-radius:32px;width:100%;height:520px;position:relative;overflow:hidden;background-size:cover;background-position:center;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column}
.phone-header{padding:12px 14px 0;flex-shrink:0}
.phone-prof{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.phone-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#FF6B2B);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff}
.phone-un{font-size:11px;color:#bbb;font-weight:600}
.phone-scroll{flex:1;overflow-y:auto;padding:8px 14px 16px;-webkit-overflow-scrolling:touch}
.phone-scroll::-webkit-scrollbar{width:3px}.phone-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.phone-ct{font-size:13px;line-height:1.6;white-space:pre-line;margin:0}
.phone-controls{width:100%;display:flex;flex-direction:column;gap:8px}
.control-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.cbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;font-family:var(--font);transition:.2s}
.cbtn:hover{background:var(--panel)}.cbtn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.file-input{display:none}
.cpanel{flex:1;min-width:0;display:flex;flex-direction:column}
.editable-box{background:var(--card);padding:18px;border-radius:10px;border:1.5px solid var(--border);min-height:180px;margin-bottom:14px;font-size:14px;line-height:1.65;color:var(--text);width:100%;resize:vertical;font-family:var(--font);outline:none;transition:border .2s}
.editable-box:focus{border-color:var(--accent)}
.cbox-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cbox-left{font-size:11px;color:var(--muted)}.cbox-right{display:flex;gap:6px}
.cb-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;font-family:var(--font);transition:.2s}
.cb-btn:hover{background:rgba(255,255,255,.1)}.cb-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}.cb-btn.starred{background:rgba(255,215,0,.1);color:var(--star);border-color:var(--star)}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.abtn{flex:1;min-width:100px;padding:11px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:700;cursor:pointer;font-size:12px;font-family:var(--font);text-align:center;transition:.2s}
.abtn:hover{background:var(--panel)}
#pepites-list{display:flex;flex-direction:column;gap:12px}
.pepite-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}
.pepite-text{font-size:13px;line-height:1.6;white-space:pre-line;color:var(--text);padding-right:60px}
.pepite-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px}
.save-alert{text-align:center;color:var(--success);font-size:.8rem;margin-bottom:12px;opacity:0;transition:opacity .5s;pointer-events:none}
.save-alert.visible{opacity:1}
.err-box{background:#ff000030;border:1px solid #ff4444;border-radius:8px;padding:12px;margin:12px 0;font-size:12px;color:#ff6666;display:none}
@media(max-width:750px){.clayout{flex-direction:column;align-items:stretch}.phonewrap{width:100%;min-width:0}.phone{width:260px;min-width:260px;height:480px;margin:0 auto}.cpanel{width:100%}}
@media(max-width:480px){body{padding:8px}h1{font-size:1.3rem}.phone{width:240px;min-width:240px;height:450px}.phone-ct{font-size:12px}.tab-btn{padding:8px 10px;font-size:11px}.panel{padding:14px}.dtab{padding:7px 10px;font-size:11px}}
@media(max-width:360px){.phone{width:210px;min-width:210px;height:400px}}
@media print{
  body{background:#fff!important;color:#333!important;padding:0!important}
  .tabs,.phone,.phone-controls,.action-row,.cbox-header,.save-alert,.err-box,.tab-btn,button{display:none!important}
  .container{max-width:100%}
  .panel{display:block!important;background:#fff!important;border:none!important;padding:0!important;margin:0!important;page-break-inside:avoid}
  #panel-config{display:none!important}
  #panel-pepites{display:none!important}
  .print-week{display:block!important}
  .print-day{margin-bottom:20px;padding:15px;border:1px solid #ddd;border-radius:8px;page-break-inside:avoid}
  .print-day h3{margin:0 0 10px;font-size:14px}
  .print-day pre{white-space:pre-line;font-family:sans-serif;font-size:12px;line-height:1.7;margin:0}
}
.print-week{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Studio Stories Mono-Slide</h1>
<div class="subtitle">Stories strategiques - Simulateur - Pepites</div>
<div id="save-status" class="save-alert"></div>
<div id="err" class="err-box"></div>
<div class="tabs">
  <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">Config</button>
  <button class="tab-btn" id="tab-result" onclick="switchTab('result')">Studio</button>
  <button class="tab-btn" id="tab-pepites" onclick="switchTab('pepites')">Pepites (<span id="pepites-count">0</span>)</button>
</div>
<div class="panel active" id="panel-config">
  <div class="fg"><label>Nom de ta formation / offre</label><input type="text" id="f-product" placeholder="Ex : Code Liberte"></div>
  <div class="fg"><label>Ton appel a l'action (CTA)</label><input type="text" id="f-cta" placeholder="Ex : Envoie-moi le mot CODE en message prive"><div class="hint">La phrase qui termine chaque story.</div></div>
  <button class="btn-large" onclick="handleGenerate()">CREER MA SEMAINE DE STORIES</button>
</div>
<div class="panel" id="panel-result"></div>
<div class="panel" id="panel-pepites"><div id="pepites-list"></div></div>
<div class="print-week" id="print-week"></div>
</div>

<script>
// Stories Machine - 303 stories 100% uniques
// Chaque story est ecrite individuellement avec un angle unique
var S = {"lundi": ["Tu regardes ton compte avant de faire tes courses.\n\nTu te dis « non, ca je le prends pas ».\nTu repousses un achat que t'avais prevu.\n\nAvant je faisais pareil. Maintenant je choisis ce que je mets dans mon caddie sans calculer.\n\nPas par magie. Par methode. Une eleve a fait sa premiere vente en 12 jours avec {product}.\n\n{cta}", "Ton enfant te demande quelque chose.\nTu dis « plus tard ».\n\nEt tu sais que « plus tard » ca veut dire non.\n\nAvant je disais ca tout le temps. Maintenant je dis oui sans reflechir.\n\nUne eleve m'a ecrit : j'ai dit oui a ma fille pour la premiere fois sans checker mon compte.\n\n{cta}", "Tu passes des heures sur ton telephone.\nTu scrolles. Tu regardes les autres faire.\n\nEt rien ne change.\n\nAvant je faisais pareil. Maintenant ce telephone me rapporte de l'argent.\n\nC'est pas une question de chance. C'est une question de methode. Elle est dans {product}.\n\n{cta}", "Tu te dis qu'il faudrait trouver une solution.\nPouvoir faire de l'argent depuis chez toi. Respirer un peu.\n\nMais tu sais pas par ou commencer.\n\nMoi non plus je savais pas. Et puis j'ai trouve un cadre. Un plan.\n\nUne eleve a commence sans rien savoir. Premiere vente en 3 semaines avec {product}.\n\n{cta}", "Tu fais attention a tes trajets pour pas trop consommer d'essence.\nTu repousses un achat que t'avais prevu.\n\nAvant je comptais tout. Maintenant j'ai un revenu qui tombe sans que je sois dans une voiture ou un bureau.\n\nUne eleve gagne ses premiers euros depuis son canape. Avec {product}.\n\n{cta}", "Tu te demandes si c'est vraiment possible pour toi.\n\nSi t'es pas trop vieille. Pas assez douee. Pas assez connue.\n\nMoi aussi je pensais ca.\n\nEt puis j'ai compris : c'est pas une question de talent. C'est une question de methode.\n\nUne eleve avait les memes doutes. Elle a suivi {product}. Elle vend aujourd'hui.\n\n{cta}", "T'as vu une veste qui te plaisait.\nTu l'as reposee.\n\nPas parce que t'en voulais pas. Parce que c'etait pas raisonnable.\n\nAvant je reposais tout. Maintenant je m'offre ce qui me plait sans culpabiliser.\n\nUne eleve m'a dit : ma premiere vente, je l'ai utilisee pour m'acheter un truc juste pour moi.\n\n{cta}", "Tu continues comme ca...\nou tu decides de changer quelque chose ?\n\nC'est la seule question.\n\nAvant j'attendais. Maintenant j'agis. Et tout a change.\n\nLes femmes dans {product} ont pris cette decision. Et elles ont des resultats.\n\n{cta}", "Tu te leves. Tu bosses. Tu rentres. Tu recommences.\n\nEt un jour tu te demandes : c'est ca ma vie ?\n\nAvant je vivais pour le week-end. Maintenant chaque jour me plait.\n\nUne eleve m'a ecrit : je pensais pas que c'etait possible pour quelqu'un comme moi. Et pourtant. {product} a tout change.\n\n{cta}", "Tu regardes des stories de filles qui vendent en ligne.\nTu te dis « elles ont un truc que j'ai pas ».\n\nNon. Elles ont un plan. C'est tout.\n\nAvant je croyais que c'etait reserve a certaines. Maintenant je sais que c'est accessible a toutes.\n\nLe plan est dans {product}.\n\n{cta}"], "mardi": ["Le probleme c'est pas que t'es pas capable.\n\nC'est que personne t'a montre comment faire.\n\nAvant je testais tout. Rien marchait. Le jour ou j'ai suivi un vrai plan, tout a change.\n\nDans {product} y a ce plan. Etape par etape.\n\n{cta}", "Poster tous les jours et avoir zero vente.\nCa te parle ?\n\nLe souci c'est pas le nombre de posts. C'est ce que tu dis dedans.\n\nAvant je postais pour poster. Maintenant chaque story a un but precis.\n\nC'est ce qu'on apprend dans {product}.\n\n{cta}", "Tu crois qu'il faut des milliers d'abonnes pour vendre.\n\nC'est faux.\n\nUne eleve avait 200 abonnes quand elle a fait sa premiere vente.\n\nLe secret c'est pas la taille de ta communaute. C'est ce que tu leur dis. {product} t'apprend exactement ca.\n\n{cta}", "Tu sais pas quoi vendre. Tu sais pas quoi poster.\nTu sais pas par ou commencer.\n\nNormal. On t'a jamais appris.\n\nAvant j'etais pareil. Maintenant j'ai un systeme qui tourne.\n\nDans {product} on part de zero. Vraiment zero.\n\n{cta}", "Tout le monde dit « lance-toi ».\nPersonne dit comment.\n\nC'est pour ca que la plupart abandonnent.\n\nAvant je tournais en rond. Maintenant j'ai un chemin clair.\n\n{product} c'est le comment. Pas juste le pourquoi.\n\n{cta}", "Tu penses que vendre c'est forcer les gens.\n\nEn vrai vendre c'est aider quelqu'un a prendre une decision.\n\nAvant j'avais honte de proposer mes trucs. Maintenant je sais que ca aide vraiment.\n\nC'est le shift qu'on fait dans {product}.\n\n{cta}", "T'as pas besoin d'etre experte.\nT'as besoin d'un cadre.\n\nUn truc clair qui te dit : fais ca, puis ca, puis ca.\n\nAvant je cherchais partout. Maintenant j'ai un plan.\n\n{product} c'est ce cadre. Et il marche.\n\n{cta}", "Tu regardes des formations gratuites sur YouTube.\nTu prends des notes. Et apres... rien.\n\nLe probleme c'est pas l'information. C'est l'accompagnement.\n\nAvant j'accumulais des conseils. Maintenant j'applique un seul systeme.\n\nCelui de {product}.\n\n{cta}", "Tu crois que c'est complique de vendre en ligne.\n\nEn vrai c'est simple. Quand t'as la bonne methode.\n\nAvant je compliquais tout. Maintenant je fais simple et ca marche.\n\n{product} t'apprend a faire simple.\n\n{cta}", "Une story qui vend c'est pas une story qui parle de toi.\n\nC'est une story qui montre ce que ca change.\n\nAvant je racontais ma vie. Zero vente. Maintenant je montre la transformation.\n\nC'est la base de {product}.\n\n{cta}"], "mercredi": ["Ce matin j'ai pris mon cafe tranquillement.\n\nPas de reveil a 6h. Pas de metro. Pas de patron.\n\nAvant je courais partout. Maintenant je choisis mon rythme.\n\nUne eleve vit ca aussi depuis qu'elle a commence {product}. Premiere vente en 2 semaines.\n\n{cta}", "Hier soir j'ai ferme mon ordi a 15h.\nJ'ai ete chercher mes enfants. On a fait un gateau ensemble.\n\nAvant je rentrais a 19h. Trop fatiguee pour quoi que ce soit.\n\nMaintenant je travaille moins. Et je gagne plus.\n\nC'est ca que {product} m'a appris a construire.\n\n{cta}", "Notification de paiement en buvant mon cafe.\n\nQuelqu'un a achete pendant que je dormais.\n\nAvant je troquais mes heures contre un salaire. Maintenant mon business tourne meme la nuit.\n\nUne eleve a vecu ca. Son message : je croyais que c'etait une erreur.\n\n{cta}", "J'ai emmene ma fille a l'ecole a pied ce matin.\nSans courir. Sans stresser. Sans regarder l'heure.\n\nAvant je la deposais en speed pour pas etre en retard au boulot.\n\nUne eleve m'a dit : le jour ou j'ai pu faire ca, j'ai pleure.\n\nC'est ca que {product} permet.\n\n{cta}", "Aujourd'hui j'ai dit oui a un dejeuner avec une amie.\nEn pleine semaine. Sans demander a personne.\n\nAvant je demandais la permission pour tout. Maintenant c'est moi qui decide.\n\n{product} m'a donne cette liberte.\n\n{cta}", "J'ai recu un message d'une eleve ce matin.\n\nElle m'a dit : j'ai fait ma premiere vente hier. J'ai pleure.\n\nElle avait commence il y a 3 semaines. Sans audience. Sans experience.\n\nJuste un plan. Celui de {product}.\n\n{cta}", "Je me suis offert un truc aujourd'hui. Juste pour moi.\nSans calculer. Sans culpabiliser.\n\nAvant je reposais tout dans les rayons. Maintenant je m'autorise.\n\nC'est aussi ca que {product} change.\n\n{cta}", "Balade avec mes enfants cet apres-midi.\nMon telephone a sonne. Une vente.\n\nAvant je bossais pendant qu'ils jouaient seuls. Maintenant je suis la.\n\nUne eleve m'a ecrit : j'ai vendu en promenant mon fils au parc.\n\n{cta}", "Ce matin j'ai travaille une heure. Puis j'ai arrete.\n\nPas parce que j'avais rien a faire. Parce que j'avais le choix.\n\nAvant je bossais meme malade. Maintenant c'est moi qui decide quand.\n\nUne eleve a construit ca avec {product}. En partant de zero.\n\n{cta}", "On m'a dit : t'as de la chance.\n\nNon. J'ai un systeme.\n\nAvant je ne savais meme pas ce que je pouvais vendre. Maintenant j'ai un plan clair.\n\nCe plan il est dans {product}. C'est le meme que mes eleves suivent.\n\n{cta}"], "jeudi": ["« Je suis pas faite pour ca. »\n\nC'est ce que tu te dis.\n\nMoi aussi je me le suis dit. Pendant des mois.\n\nPersonne est « fait pour ca ». On apprend. On suit un plan. On avance.\n\nUne eleve pensait pareil. Elle vend aujourd'hui. Avec {product}.\n\n{cta}", "« J'ai pas le temps. »\n\nT'as le temps de scroller 2h par jour.\n\nJe dis pas ca mechamment. Je dis ca parce que c'etait moi.\n\nAvant je scrollais. Maintenant ces 2h me rapportent de l'argent.\n\nDans {product} on apprend a utiliser le temps qu'on a deja.\n\n{cta}", "« J'ai pas d'argent a investir. »\n\nJe comprends. J'etais la aussi.\n\nMais combien te coute de rester ou tu es ? Combien de « non » a tes enfants ?\n\nUne eleve a hesite longtemps. Premiere vente en 10 jours. Le retour etait la.\n\n{cta}", "« Ca marche pour les autres, pas pour moi. »\n\nT'as raison si tu fais comme avant. Sans plan. Sans methode.\n\nMais avec un cadre, c'est different.\n\nUne eleve pensait exactement ca. Aujourd'hui elle a des ventes regulieres avec {product}.\n\n{cta}", "« J'ai peur de me lancer pour rien. »\n\nEt si le vrai risque c'etait de ne rien faire ?\n\nAvant j'avais peur aussi. Maintenant je me dis : pourquoi j'ai attendu si longtemps ?\n\nLes eleves de {product} disent toutes la meme chose.\n\n{cta}", "« J'y connais rien en business. »\n\nMoi non plus au debut.\n\nJ'avais zero competence en vente. Zero audience. Zero idee de quoi faire.\n\nAvant je savais rien. Maintenant j'ai un business qui tourne.\n\n{product} t'apprend tout depuis le debut.\n\n{cta}", "« J'ai deja essaye et ca a pas marche. »\n\nLe probleme c'etait pas toi. C'etait la methode.\n\nAvant je testais des trucs au hasard. Maintenant je suis un plan precis.\n\nUne eleve avait echoue 3 fois avant. Avec {product} elle a vendu en 2 semaines.\n\n{cta}", "« Mon entourage va se moquer. »\n\nIls se moqueront moins quand tu auras des resultats.\n\nAvant j'avais peur du regard des autres. Maintenant ils me demandent comment j'ai fait.\n\nDans {product} t'es entouree de femmes qui comprennent.\n\n{cta}", "« Je suis trop vieille pour ca. »\n\nY a pas d'age pour decider de changer sa vie.\n\nUne eleve a commence a 47 ans. Premiere vente en 3 semaines.\n\nElle m'a dit : j'aurais du commencer avant. Mais l'important c'est que j'ai commence.\n\nAvec {product}.\n\n{cta}", "« Et si ca marche pas ? »\n\nEt si ca marche ?\n\nT'as deja essaye de rester ou tu es. Ca donne quoi ?\n\nAvant je me posais la meme question. Maintenant j'ai ma reponse.\n\nUne eleve aussi. Premiere vente en 10 jours avec {product}.\n\n{cta}"], "vendredi": ["Une eleve. Zero audience. Zero experience.\n\n3 semaines plus tard : premiere vente.\n\nElle a juste suivi le plan de {product}. Pas de hack. Pas de miracle. Un cadre.\n\n{cta}", "Message recu hier : « J'ai fait 3 ventes cette semaine. J'arrive pas a y croire. »\n\nElle avait commence il y a un mois. Avec 150 abonnes.\n\nAvant elle pensait qu'il fallait des milliers de followers. {product} lui a montre que non.\n\n{cta}", "Une eleve m'a envoye un screen de sa premiere vente a 23h.\n\nSon message : « Je croyais que c'etait une erreur. »\n\nElle avait peur de se lancer. Elle a suivi le plan de {product}. Et ca a marche.\n\n{cta}", "Pas une eleve. Pas deux. Des dizaines qui ont les memes resultats.\n\nPremieres ventes en moins d'un mois. Depuis chez elles.\n\nLe point commun : elles ont suivi un cadre. Celui de {product}.\n\n{cta}", "« J'ai fait ma premiere vente en dormant. »\n\nC'est le message d'une eleve ce matin.\n\nAvant elle bossait 10h par jour pour un salaire. Maintenant elle gagne de l'argent meme la nuit.\n\nLe systeme est dans {product}.\n\n{cta}", "Une eleve avait 200 abonnes.\nElle pensait que c'etait pas assez.\n\nElle a suivi le plan. Elle a vendu.\n\nT'as pas besoin de plus d'abonnes. T'as besoin de la bonne methode.\n\nElle est dans {product}.\n\n{cta}", "Message d'une eleve : « Mon copain m'a demande comment j'ai fait. »\n\nElle a ri. Elle lui a dit : j'ai suivi un plan.\n\nAvant elle doutait. Maintenant elle a des preuves.\n\n{product} c'est ca. Des resultats, pas des promesses.\n\n{cta}", "Une maman. Seule. Au RSA.\n\nElle a commence {product} sans y croire vraiment.\n\nPremiere vente en 12 jours.\n\nSon message : « C'est la premiere fois que je gagne de l'argent par moi-meme. »\n\n{cta}", "Une eleve m'a dit : « J'ai paye mes courses avec mes ventes ce mois-ci. »\n\nC'est pas des millions. C'est concret.\n\nAvant elle comptait chaque euro. Maintenant elle respire.\n\nElle a suivi le plan de {product}.\n\n{cta}", "Trois ventes en une semaine. Pour une debutante.\n\nElle m'a envoye un vocal. Elle pleurait.\n\nPas de tristesse. De soulagement.\n\nElle a dit : je savais pas que c'etait possible pour moi.\n\nC'est {product} qui lui a montre.\n\n{cta}"], "samedi": ["Samedi matin. Les enfants jouent. Je suis en pyjama.\n\nMon ordi est ferme. Mon business tourne.\n\nAvant le week-end je le passais a stresser pour lundi.\n\nMaintenant le week-end c'est vraiment du repos.\n\n{product} m'a appris a construire ca.\n\n{cta}", "J'ai pas de bureau. Pas d'horaires fixes. Pas de patron.\n\nJe bosse de mon canape. Ou du cafe du coin. Ou de nulle part certains jours.\n\nAvant je revais de ca. Maintenant c'est mon quotidien.\n\nC'est ce qu'on construit dans {product}.\n\n{cta}", "Aujourd'hui j'ai travaille 2 heures.\nLe reste du temps j'ai vecu.\n\nAvant je bossais 8h minimum. Pour un salaire qui suffisait a peine.\n\nLe shift c'est pas de bosser plus. C'est de bosser mieux.\n\nC'est ce qu'on apprend dans {product}.\n\n{cta}", "Les gens voient les resultats.\nIls voient pas les coulisses.\n\nLes doutes du debut. Les premieres stories ou personne reagit. Le syndrome de l'imposteur.\n\nTout ca c'est normal. Et tout ca ca passe.\n\nDans {product} t'es pas seule pour traverser ca.\n\n{cta}", "Ma vie a pas change en un jour.\nElle a change en quelques semaines.\n\nUn premier post. Une premiere interaction. Une premiere vente.\n\nEt puis une deuxieme. Et une routine.\n\nC'est ca le vrai parcours. Et il est dans {product}.\n\n{cta}", "J'ai choisi de bosser depuis chez moi.\n\nPas parce que c'est facile. Parce que c'est ce que je voulais.\n\nEtre la quand mes enfants rentrent. Decider de mes horaires. Gagner ma vie a ma facon.\n\nUne eleve construit exactement la meme chose avec {product}.\n\n{cta}", "Derriere chaque vente y a eu un doute.\n\nUn moment ou je me suis dit « ca marchera jamais ».\n\nEt j'ai continue quand meme.\n\nC'est ca la difference. Pas le talent. La perseverance.\n\n{product} t'aide a tenir.\n\n{cta}", "J'aurais pu continuer comme avant.\nAttendre. Esperer. Scroller.\n\nMais j'ai decide de faire autrement.\n\nEt aujourd'hui ma vie est differente.\n\nSi t'attends le bon moment, il existe pas. Le bon moment c'est maintenant.\n\n{product} est la pour t'accompagner.\n\n{cta}", "Je gagne pas des millions.\nMais je gagne ma liberte.\n\nJe choisis mes horaires. Je suis la pour mes enfants. Je respire.\n\nAvant j'avais un salaire et zero liberte. Maintenant j'ai les deux.\n\nUne eleve construit ca avec {product}.\n\n{cta}", "Hier une amie m'a dit : « T'as change. »\n\nElle a raison. J'ai change.\n\nPas parce que j'ai eu de la chance. Parce que j'ai decide de faire les choses differemment.\n\nAvant j'attendais. Maintenant j'agis.\n\n{product} c'est ce qui a tout declenche.\n\n{cta}"], "dimanche": ["Demain c'est lundi.\n\nTu peux recommencer comme d'habitude.\nOu tu peux decider que cette semaine sera differente.\n\nPas avec de la motivation. Avec un plan.\n\n{product} c'est ce plan. Concret. Clair. Qui marche.\n\n{cta}", "T'as deux options.\n\nContinuer a scroller en te disant « un jour je ferai quelque chose ».\n\nOu commencer maintenant.\n\n{product} c'est le premier pas. Et il est plus simple que tu crois.\n\n{cta}", "Si t'es encore la a lire mes stories, c'est que quelque chose resonne.\n\nEcoute-toi.\n\nT'as pas besoin d'etre prete. T'as besoin de commencer.\n\n{product} t'accompagne de A a Z.\n\n{cta}", "Ce soir pose-toi une question.\n\nDans 6 mois tu veux etre au meme endroit ?\n\nSi la reponse est non, alors fais quelque chose. Maintenant.\n\n{product} c'est le cadre qu'il te faut.\n\n{cta}", "T'attends quoi exactement ?\n\nPlus d'argent ? Tu l'auras pas en attendant.\nPlus de temps ? Il passera quand meme.\nPlus de confiance ? Elle vient en faisant.\n\nLa seule chose qui change quelque chose c'est de commencer.\n\n{product} est la.\n\n{cta}", "{product} c'est pas une formation de plus.\n\nC'est un cadre. Un plan. Un accompagnement.\n\nDes femmes comme toi qui avancent ensemble.\n\nSi tu veux changer quelque chose, c'est le moment.\n\n{cta}", "Tu veux un revenu en plus.\nTu veux etre la pour tes enfants.\nTu veux respirer.\n\nC'est pas un reve. C'est un plan.\n\nEt ce plan il est dans {product}.\n\n{cta}", "Arrete de te dire que c'est pas pour toi.\n\nC'est pour toi si tu decides que c'est pour toi.\n\nLes eleves de {product} etaient toutes a ta place avant.\n\nAujourd'hui elles vendent. Depuis chez elles.\n\n{cta}", "Tu lis ces stories depuis des jours.\nTu te reconnais dans ce que je dis.\n\nMais tu fais rien.\n\nJe te juge pas. J'etais pareille.\n\nLa difference entre celles qui changent et celles qui restent : un premier pas.\n\n{product} c'est ce premier pas.\n\n{cta}", "Une decision.\n\nC'est tout ce qui separe ta vie d'aujourd'hui de celle que tu veux.\n\nPas du talent. Pas de la chance. Une decision.\n\nLes eleves de {product} l'ont prise. Et tout a change.\n\nA toi.\n\n{cta}"]};

try{
var DAYS=[
{key:"lundi",jour:"Lundi",theme:"Declic et Motivation",color:"#FF595E"},
{key:"mardi",jour:"Mardi",theme:"Education et Valeur",color:"#FFCA3A"},
{key:"mercredi",jour:"Mercredi",theme:"Storytelling",color:"#8AC926"},
{key:"jeudi",jour:"Jeudi",theme:"Blocages et Objections",color:"#1982C4"},
{key:"vendredi",jour:"Vendredi",theme:"Preuve et Resultats",color:"#6A4C93"},
{key:"samedi",jour:"Samedi",theme:"Lifestyle et Coulisses",color:"#FF9F1C"},
{key:"dimanche",jour:"Dimanche",theme:"Offre et CTA",color:"#2EC4B6"}
];



var strategy={};var activeDay="lundi";var pepites=[];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function fill(s,c){return s.replace(/\{product\}/g,c.product||"la formation").replace(/\{cta\}/g,c.cta||"Envoie-moi un message");}
function showToast(m){var t=document.getElementById("save-status");t.textContent=m;t.classList.add("visible");setTimeout(function(){t.classList.remove("visible");},2200);}
function getCfg(){return{product:document.getElementById("f-product").value.trim(),cta:document.getElementById("f-cta").value.trim()};}

function switchTab(id){
  var ta=document.getElementById("story-text");if(ta&&strategy[activeDay])strategy[activeDay].fullDraft=ta.value;
  var btns=document.querySelectorAll(".tab-btn");for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
  var pnls=document.querySelectorAll(".panel");for(var i=0;i<pnls.length;i++)pnls[i].classList.remove("active");
  document.getElementById("tab-"+id).classList.add("active");
  document.getElementById("panel-"+id).classList.add("active");
  if(id==="result")renderResult();if(id==="pepites")renderPepitesList();
}

function handleGenerate(){
  if(typeof S==="undefined"){document.getElementById("err").style.display="block";document.getElementById("err").textContent="Erreur: les stories ne sont pas chargees.";return;}
  var cfg=getCfg();try{localStorage.setItem("sm6_product",cfg.product);localStorage.setItem("sm6_cta",cfg.cta);}catch(e){}
  for(var i=0;i<DAYS.length;i++){var d=DAYS[i];strategy[d.key]={jour:d.jour,theme:d.theme,color:d.color,fullDraft:fill(pick(S[d.key]),cfg),poolSize:S[d.key].length,textColor:"#ffffff",textBg:false,bgImage:null};}
  saveLS();activeDay="lundi";switchTab("result");showToast("Stories creees !");
}

function regenDay(j){var cfg=getCfg();strategy[j].fullDraft=fill(pick(S[j]),cfg);renderResult();showToast("Regenere !");}
function setDay(j){var ta=document.getElementById("story-text");if(ta&&strategy[activeDay])strategy[activeDay].fullDraft=ta.value;activeDay=j;renderResult();}
function saveLS(){var ta=document.getElementById("story-text");if(ta&&strategy[activeDay])strategy[activeDay].fullDraft=ta.value;try{localStorage.setItem("sm6_strategy",JSON.stringify(strategy));localStorage.setItem("sm6_pepites",JSON.stringify(pepites));}catch(e){}}

function renderResult(){
  var p=document.getElementById("panel-result");
  if(!strategy[activeDay]){p.innerHTML="<div style='text-align:center;padding:40px;color:var(--muted)'><p>Configure et genere tes stories.</p><button class='abtn' style='margin-top:12px' onclick=\"switchTab('config')\">Config</button></div>";return;}
  var d=strategy[activeDay];var text=d.fullDraft;var starred=false;
  for(var i=0;i<pepites.length;i++){if(pepites[i].text===text){starred=true;break;}}
  var dayhtml="";for(var i=0;i<DAYS.length;i++){var dy=DAYS[i];var isAct=activeDay===dy.key;dayhtml+="<button class='dtab"+(isAct?" active":"")+"' onclick=\"setDay('"+dy.key+"')\" style='"+(isAct?"border-color:"+dy.color+";color:"+dy.color+";background:"+dy.color+"12":"")+"'>"+dy.jour.slice(0,3)+"</button>";}
  var weekhtml="";for(var i=0;i<DAYS.length;i++){var dy=DAYS[i];if(!strategy[dy.key])continue;var s2=strategy[dy.key];var isAct2=activeDay===dy.key;weekhtml+="<div style='display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;border-top:1px solid #1a1815;"+(isAct2?"background:rgba(255,140,66,.05)":"")+"' onclick=\"setDay('"+dy.key+"');window.scrollTo({top:200,behavior:'smooth'})\">"+"<span style='font-size:12px;font-weight:800;width:28px;color:"+(isAct2?"var(--accent)":"var(--muted)")+"'>"+dy.jour.slice(0,3)+"</span>"+"<span style='font-size:11px;color:var(--muted);flex:1'>"+s2.theme+"</span>"+"<span style='font-size:10px;color:#555'>"+s2.poolSize+"</span></div>";}

  p.innerHTML="<div class='daytabs'>"+dayhtml+"</div>"
  +"<div class='dayinfo'><span class='dayinfo-t' style='color:"+d.color+"'>"+d.jour+" - "+d.theme+"</span><div class='dayinfo-s'>"+d.poolSize+" stories disponibles</div></div>"
  +"<div class='clayout'><div class='phonewrap'><div class='phone' style='background-image:url("+(d.bgImage?"\""+d.bgImage+"\"":"")+")'"+">"
  +"<div class='phone-header'><div class='phone-prof'><div class='phone-av'>K</div><span class='phone-un'>ton_compte</span></div></div>"
  +"<div class='phone-scroll' style='color:"+d.textColor+";"+(d.textBg?"background:rgba(0,0,0,0.55);margin:0 8px;border-radius:8px;padding:10px":"")+"'>"
  +"<p id='phone-mirror' class='phone-ct'>"+esc(text)+"</p></div></div>"
  +"<div class='phone-controls'><div class='control-row'>"
  +"<button class='cbtn' onclick=\"document.getElementById('bgUpload').click()\">Fond</button>"
  +"<input type='file' id='bgUpload' class='file-input' accept='image/*' onchange='handleBgUpload(this)'>"
  +(d.bgImage?"<button class='cbtn' onclick='removeBg()'>X</button>":"")
  +"</div><div class='control-row'>"
  +"<button class='cbtn "+(d.textColor==="#ffffff"?"active":"")+"' onclick=\"setTxt('#ffffff',"+d.textBg+")\">Blanc</button>"
  +"<button class='cbtn "+(d.textColor==="#000000"?"active":"")+"' onclick=\"setTxt('#000000',"+d.textBg+")\">Noir</button>"
  +"<button class='cbtn "+(d.textBg?"active":"")+"' onclick=\"setTxt('"+d.textColor+"',"+(!d.textBg)+")\">Fond txt</button>"
  +"</div></div></div>"
  +"<div class='cpanel'><div class='cbox-header'><div class='cbox-left'>Modifie librement</div><div class='cbox-right'>"
  +"<button class='cb-btn "+(starred?"starred":"")+"' onclick='togglePepite()'>"+(starred?"*":"o")+"</button>"
  +"<button class='cb-btn' id='copy-btn' onclick='copyText()'>Copier</button></div></div>"
  +"<textarea id='story-text' class='editable-box' oninput='updateMirror(this)'>"+esc(text)+"</textarea>"
  +"<div class='action-row'>"
  +"<button class='abtn' onclick=\"regenDay('"+activeDay+"')\" style='color:"+d.color+";border-color:"+d.color+"'>Autre story</button>"
  +"<button class='abtn' onclick=\"saveLS();showToast('Sauve !')\" style='background:var(--success);color:#fff;border-color:var(--success)'>Sauver</button>"
  +"<button class='abtn' onclick='exportPDF()' style='background:#6A4C93;color:#fff;border-color:#6A4C93'>PDF semaine</button>"
  +"</div></div></div>"
  +"<div style='margin-top:24px;background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden'>"
  +"<div style='padding:14px 16px 8px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent)'>PLANNING SEMAINE</div>"+weekhtml+"</div>";
}

function updateMirror(ta){var m=document.getElementById("phone-mirror");if(m)m.innerText=ta.value;if(strategy[activeDay])strategy[activeDay].fullDraft=ta.value;}
function handleBgUpload(input){if(input.files&&input.files[0]){var r=new FileReader();r.onload=function(e){strategy[activeDay].bgImage=e.target.result;renderResult();};r.readAsDataURL(input.files[0]);}}
function removeBg(){strategy[activeDay].bgImage=null;renderResult();}
function setTxt(c,bg){strategy[activeDay].textColor=c;strategy[activeDay].textBg=bg;renderResult();}
function copyText(){var t=document.getElementById("story-text").value;var b=document.getElementById("copy-btn");navigator.clipboard.writeText(t).then(function(){b.innerText="OK!";b.classList.add("copied");setTimeout(function(){b.innerText="Copier";b.classList.remove("copied");},1500);});}
function updatePepitesCount(){document.getElementById("pepites-count").innerText=pepites.length;}
function togglePepite(){var t=document.getElementById("story-text").value;var idx=-1;for(var i=0;i<pepites.length;i++){if(pepites[i].text===t){idx=i;break;}}if(idx>-1)pepites.splice(idx,1);else pepites.unshift({text:t});updatePepitesCount();saveLS();renderResult();}
function renderPepitesList(){var l=document.getElementById("pepites-list");if(!pepites.length){l.innerHTML="<div style='text-align:center;color:var(--muted);padding:30px'>Tes pepites apparaitront ici.</div>";return;}var h="";for(var i=0;i<pepites.length;i++){h+="<div class='pepite-item'><p class='pepite-text'>"+esc(pepites[i].text)+"</p><div class='pepite-actions'><button class='cb-btn' onclick='copyPepite("+i+")'>Copier</button> <button class='cb-btn' onclick='delPepite("+i+")'>X</button></div></div>";}l.innerHTML=h;}
function copyPepite(i){navigator.clipboard.writeText(pepites[i].text).then(function(){showToast("Copie !");});}
function delPepite(i){pepites.splice(i,1);updatePepitesCount();saveLS();renderPepitesList();}

function exportPDF(){
  if(!strategy.lundi){alert("Genere d'abord tes stories");return;}
  saveLS();
  var pw=document.getElementById("print-week");
  var h="<h2 style='text-align:center;margin-bottom:20px'>Ma Semaine de Stories</h2>";
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i];if(!strategy[d.key])continue;var s=strategy[d.key];
    h+="<div class='print-day' style='border-left:4px solid "+d.color+"'>"
    +"<h3 style='color:"+d.color+"'>"+s.jour+" - "+s.theme+"</h3>"
    +"<pre>"+esc(s.fullDraft)+"</pre></div>";
  }
  pw.innerHTML=h;
  setTimeout(function(){window.print();},200);
}

try{
  var saved=localStorage.getItem("sm6_strategy");if(saved)strategy=JSON.parse(saved);
  var savedP=localStorage.getItem("sm6_pepites");if(savedP){pepites=JSON.parse(savedP);updatePepitesCount();}
  var savedProd=localStorage.getItem("sm6_product");if(savedProd)document.getElementById("f-product").value=savedProd;
  var savedCta=localStorage.getItem("sm6_cta");if(savedCta)document.getElementById("f-cta").value=savedCta;
}catch(e){}

}catch(err){
  document.getElementById("err").style.display="block";
  document.getElementById("err").textContent="Erreur JS: "+err.message;
  console.error(err);
}
</script>
</body>
</html>
