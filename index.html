<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Stories Haute Conversion</title>
  <style>
    :root {
      --bg: #0c0c10;
      --panel-bg: #14141d;
      --card-bg: #1a1a26;
      --accent: #FF8C42;
      --text: #f5f0e8;
      --text-muted: #8a8aa3;
      --border: #2a2a3a;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 30px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .tab-btn {
      background: var(--panel-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .panel {
      display: none;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
    }
    .panel.active {
      display: block;
    }
    
    /* CONFIGURATION STYLES */
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: var(--text);
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    .grid-fw {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .fwcard {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      position: relative;
      transition: 0.2s;
    }
    .fwcard:hover {
      border-color: var(--text-muted);
    }
    .fwcard.sel {
      border-width: 2px;
    }
    .chk {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 1px solid var(--border);
    }
    .fws {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      box-sizing: border-box;
      font-size: 1rem;
    }
    .tone-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }
    .tonechip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .tonechip.act {
      background: var(--text);
      color: var(--bg);
    }
    .btn-large {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-large:disabled {
      background: #555;
      cursor: not-allowed;
    }
    
    /* RESULTATS STYLES */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .fwbadge {
      display: flex;
      align-items: center;
      padding: 15px;
      margin-bottom: 20px;
    }
    .bn { font-weight: bold; font-size: 1.2rem; }
    .daytabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .dtab {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .dayinfo {
      margin-bottom: 20px;
    }
    .dayinfo-t { font-weight: bold; font-size: 1.1rem; }
    .clayout {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .phonewrap {
      flex: 1;
      min-width: 280px;
      max-width: 320px;
    }
    .phone {
      background: #111;
      border: 12px solid #222;
      border-radius: 36px;
      height: 520px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }
    .phone-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
    }
    .phone-bar {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .phone-sl {
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .phone-ct {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-line;
      overflow-y: auto;
    }
    .cpanel {
      flex: 2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .sbrow {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .sbadge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .cbox {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-height: 150px;
      white-space: pre-line;
      margin-bottom: 20px;
    }
    .arow {
      display: flex;
      gap: 10px;
    }
    .abtn {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .abtn.ac {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    
    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      z-index: 1000;
    }
    #toast.show { display: block; }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 Générateur de Stories Vendeuses</h1>

  <div class="tabs">
    <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">⚙️ Configuration</button>
    <button class="tab-btn" id="tab-result" onclick="switchTab('result')">📱 Mes Stories</button>
  </div>

  <div class="panel active" id="panel-config">
    <div class="section-title">1. Choisis ta méthode (Framework)</div>
    <div class="grid-fw" id="fwgrid"></div>
    <div id="fwinfo-box"></div>

    <div class="section-title" style="margin-top:25px;">2. Détails de ton offre</div>
    <div class="form-group">
      <label>Nom de ton produit ou service</label>
      <input type="text" id="f-product" placeholder="Ex: Masterclass Instagram, Coaching Scale..." value="mon programme">
    </div>
    <div class="form-group">
      <label>Ton appel à l'action (CTA)</label>
      <input type="text" id="f-cta" placeholder="Ex: Écris 'GO' en DM, Clique sur le lien..." value="Lien dans ma bio">
    </div>

    <div class="form-group">
      <label>Cible / Audience</label>
      <select id="f-audience"></select>
      <div id="f-audience-custom-wrap" style="display:none; margin-top:10px;">
        <input type="text" id="f-audience-custom" placeholder="Précise ton audience personnalisée...">
      </div>
    </div>

    <div class="form-group">
      <label>Problème principal résolu</label>
      <select id="f-problem"></select>
      <div id="f-problem-custom-wrap" style="display:none; margin-top:10px;">
        <input type="text" id="f-problem-custom" placeholder="Précise le problème personnalisé...">
      </div>
    </div>

    <div class="section-title">3. Tonalité de communication</div>
    <div class="tone-grid" id="tonegrid"></div>
    <div id="tonedesc" style="color:var(--text-muted); margin-bottom:25px; font-size:0.9rem;"></div>

    <button class="btn-large" id="btn-gen" disabled onclick="handleGenerate()">🎯 GÉNÉRER MA SEMAINE DE STORIES</button>
  </div>

  <div class="panel" id="panel-result"></div>
</div>

<div id="toast"></div>

<script>
const FRAMEWORKS=[
  {
    id:"charniere_4",
    name:"Charnière 4 Slides",
    icon:"🌉",
    color:"#E8A838",
    steps:["Moment de vie","Charnière","Offre / Témoignage","Lien"],
    power:"La Spontanée (Crée un pont invisible entre ta vie et ton offre).",
    when:"Idéal pour les jours où tu veux vendre de manière très naturelle, sans avoir l'air de forcer."
  },
  {
    id:"aida",
    name:"AIDA",
    icon:"🧲",
    color:"#E05263",
    steps:["Attention","Intérêt","Désir","Action"],
    power:"La Captivante (Le grand classique pour capter l'attention et donner envie).",
    when:"Parfait pour présenter un nouveau produit ou une offre phare de ta semaine."
  },
  {
    id:"pas",
    name:"PAS",
    icon:"💊",
    color:"#3CBBB1",
    steps:["Problème","Agitation","Solution"],
    power:"La Résolutive (Appuie là où ça fait mal pour proposer le remède).",
    when:"À utiliser quand ton audience procrastine ou n'a pas conscience de l'urgence de son problème."
  },
  {
    id:"ppn",
    name:"Preuve → Projection",
    icon:"🔮",
    color:"#9B5DE5",
    steps:["Preuve","Projection","Normalisation"],
    power:"La Rassurante (Montre des résultats concrets pour lever les peurs).",
    when:"Le top quand tu as un super témoignage client ou un chiffre fort à partager."
  },
  {
    id:"avant_apres",
    name:"Avant / Après",
    icon:"🔄",
    color:"#FF6B6B",
    steps:["Le Passé","Le Déclic","Le Présent","L'Appel"],
    power:"La Transformatrice (Le choc visuel et émotionnel du changement).",
    when:"Idéal pour vendre un accompagnement ou un programme de transformation."
  },
  {
    id:"story_5",
    name:"5 Étapes Vente",
    icon:"🎯",
    color:"#06D6A0",
    steps:["Accroche","Problème","Solution","Preuve","CTA"],
    power:"La Complète (Le tunnel de vente condensé en quelques slides).",
    when:"La méthode forte à sortir pour un jour de gros lancement ou une offre limitée."
  }
];

const DAY_THEMES=[
  {jour:"Lundi",theme:"Mindset & Motivation",emoji:"🔥",angle:"Réveiller l'ambition en début de semaine"},
  {jour:"Mardi",theme:"Éducation & Valeur",emoji:"📚",angle:"Enseigner quelque chose d'utile et concret"},
  {jour:"Mercredi",theme:"Storytelling & Vécu",emoji:"🎬",angle:"Raconter un moment vrai, une expérience"},
  {jour:"Jeudi",theme:"Objections & Croyances",emoji:"🧱",angle:"Casser une croyance limitante"},
  {jour:"Vendredi",theme:"Preuve & Résultats",emoji:"🏆",angle:"Montrer des résultats concrets"},
  {jour:"Samedi",theme:"Coulisses & Lifestyle",emoji:"☀️",angle:"Montrer ta vie, ton cadre, ton quotidien"},
  {jour:"Dimanche",theme:"Offre & Urgence",emoji:"🚀",angle:"Vente directe avec rareté"},
];

const AUDIENCES=["Salariés qui veulent se lancer à côté","Freelances qui veulent scaler","Mamans qui veulent un revenu depuis la maison","Étudiants qui veulent un side hustle","Personnes en reconversion professionnelle","Entrepreneurs débutants","Diaspora francophone","Coachs et consultants","Créateurs de contenu","Autre (personnalisé)"];
const PROBLEMS=["Coincé(e) dans un job qui ne correspond plus","Dépendant(e) d'un seul revenu","Pas assez de temps pour soi et sa famille","Ne sait pas par où commencer en ligne","A déjà essayé sans résultat","Manque de confiance pour se lancer","Trop de distractions, pas de système","Peur de l'échec ou du jugement","Autre (personnalisé)"];

const TONES=[
  {id:"amical",label:"👋 Amical",desc:"Comme si tu parlais à une amie"},
  {id:"motivant",label:"🔥 Motivant",desc:"Énergie et enthousiasme"},
  {id:"direct",label:"💥 Direct",desc:"Cash, sans détour"},
  {id:"inspirant",label:"✨ Inspirant",desc:"Doux et aspirationnel"},
  {id:"provocateur",label:"🎤 Provocateur",desc:"Secouer les croyances"},
];

const TONE_MOD={
  amical:{pre:["Hé,","Écoute,","Entre nous,","Tu sais quoi ?","Allez,"],suf:["💛","😊","🤗","❤️","✨"]},
  motivant:{pre:["LET'S GO !","C'est TON moment.","Tu es CAPABLE.","Réveille-toi !","MAINTENANT."],suf:["🔥","💪","⚡","🚀","🎯"]},
  direct:{pre:["Stop.","La vérité :","Soyons clairs.","Je vais être cash.","Point."],suf:["","Point final.","C'est comme ça.","Voilà.",""]},
  inspirant:{pre:["Imagine un instant...","Et si c'était possible ?","Il y a une autre voie...","Respire.","Ferme les yeux une seconde."],suf:["✨","🌟","💫","🦋","🌙"]},
  provocateur:{pre:["Ça va piquer.","Tu veux la vérité ?","Personne ne te dira ça.","Wake up.","Regarde-toi."],suf:["😏","💣","🎤","⚡","🔥"]},
};

const DB={
  moments_vie:["Ce matin, café en terrasse. Le soleil est à peine levé.","Balade ce matin. Pas de réveil, pas de rush, pas de patron.","Je regarde mon téléphone. Notification : vente pendant que je dormais.","Assis dans un café. Mon laptop est fermé. Et c'est un choix.","Aujourd'hui j'ai décidé de ne pas travailler. Et c'est OK."],
  charnieres:["Parce que ce business, je le gère d'où je veux.","C'est ça que j'ai construit. Et ça n'a rien de magique.","Ce genre de matin — je les choisis maintenant.","J'ai construit quelque chose qui tourne même quand je ne bosse pas."],
  accroches:["STOP. Avant de scroller…","Tu lis ces stories depuis ton canapé ou depuis ton bureau ?","Si t'es au même point qu'il y a 6 mois, lis ça.","La vérité que personne ne te dit sur l'argent en ligne."],
  problemes:["Tu te sens coincé(e) dans un quotidien qui ne te ressemble plus.","Tu dépends d'un seul revenu. Et ça te stresse.","Tu scrolles des « méthodes » mais rien ne change concrètement."],
  agitations:["Et chaque mois qui passe, c'est un mois de perdu.","Le pire ? C'est que tu le sais. Et tu ne fais rien.","Imagine dans 5 ans. Même job. Même salaire. Même frustration."],
  solutions:["C'est le système étape par étape pour construire ta liberté.","J'ai créé {product} pour ceux qui veulent un PLAN, pas des promesses.","{product} : la méthode pour générer des revenus depuis n'importe où."],
  preuves:["Des ventes à 3h du matin. Pendant que je dors.","+{n} personnes ont déjà rejoint le programme.","[Prénom] a fait ses premières ventes en 3 semaines."],
  projections:["Imagine te réveiller demain sans alarme. Et que ce soit normal.","Dans 90 jours, tu pourrais recevoir ta première vente automatique.","Visualise : ton téléphone sonne. C'est une notification de paiement."],
  normalisations:["C'est pas réservé aux génies. C'est pour ceux qui décident.","Des centaines de personnes l'ont fait. Avec moins d'expérience que toi.","La seule différence entre toi et eux ? Ils ont commencé."],
  ctas:["👉 Lien dans ma bio.","👉 Écris-moi en DM.","👉 Clique sur le lien. C'est maintenant."],
  temoignages:["« J'étais sceptique. 3 semaines après, ma première vente. »","« Grâce à la méthode, j'ai quitté mon CDI en 4 mois. »"],
  objections:["« J'ai pas le temps. » → Tu as le temps de scroller. Tu as le temps de commencer.","« C'est trop tard. » → Il n'est jamais trop tard quand on a la bonne méthode."],
  urgences:["⏰ Les inscriptions ferment bientôt.","🔥 Plus que quelques places.","⚠️ Le prix augmente bientôt."],
  transformations:{
    douleur:["Il y a un an, je comptais chaque euro à la fin du mois. Stress permanent.","Avant, le dimanche soir rimait avec boule au ventre. Routine métro-boulot-dodo."],
    declic:["Et puis j'ai dit stop. J'ai arrêté d'attendre et j'ai mis en place un système.","Le jour où j'ai compris que le digital n'était pas réservé aux experts, j'ai sauté le pas."],
    victoire:["Aujourd'hui, je vis mes journées selon mes propres règles. Sans patron.","Maintenant, mon téléphone travaille pour moi, pas l'inverse."]
  }
};

const pick=a=>a[Math.floor(Math.random()*a.length)];
const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};

function fill(s, c) {
  const n = String(Math.floor(Math.random() * 300) + 50);
  const montant = String(Math.floor(Math.random() * 3000) + 500);
  return s
    .replace(/\{product\}/g, c.productName || 'mon programme')
    .replace(/\{cta\}/g, c.cta || 'Lien en bio')
    .replace(/\{audience\}/g, c.audience || 'mon audience')
    .replace(/\{problem\}/g, c.problem || 'les blocages')
    .replace(/\{n\}/g, n)
    .replace(/\{montant\}/g, montant);
}

function applyTone(t,id){
  const m=TONE_MOD[id];if(!m)return t;
  const l=t.split('\n').filter(x=>x.trim());
  if(l.length&&Math.random()>.35)l[0]=pick(m.pre)+' '+l[0];
  if(m.suf&&Math.random()>.4){const s=pick(m.suf);if(s)l[l.length-1]+=' '+s}
  return l.join('\n\n')
}

function getCfg(){
  let audValue = document.getElementById('f-audience').value;
  if(audValue === 'Autre (personnalisé)') audValue = document.getElementById('f-audience-custom').value.trim();
  let probValue = document.getElementById('f-problem').value;
  if(probValue === 'Autre (personnalisé)') probValue = document.getElementById('f-problem-custom').value.trim();

  return {
    productName: document.getElementById('f-product').value.trim(),
    cta: document.getElementById('f-cta').value.trim(),
    audience: audValue,
    problem: probValue,
    tone: currentTone
  }
}

function genSlides(fwId,cfg){
  const f = s => fill(s, cfg), t = s => applyTone(s, cfg.tone);
  const dynamicProblem = cfg.problem ? `Je sais que tu te sens ${cfg.problem.toLowerCase()}.` : pick(DB.problemes);
  const dynamicIntro = cfg.audience ? `Si tu fais partie des ${cfg.audience.toLowerCase()} : reste ici.` : pick(DB.accroches);

  return({
    charniere_4:()=>[t(f(pick(DB.moments_vie))),t(f(pick(DB.charnieres))),t(f(Math.random()>.5?pick(DB.temoignages):pick(DB.solutions))),t(f(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas)))],
    aida:()=>[t(f(dynamicIntro)),t(f(dynamicProblem+'\n\n'+pick(DB.agitations))),t(f(pick(DB.solutions)+'\n\n'+pick(DB.projections))),t(f(pick(DB.urgences)+'\n\n'+(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas))))],
    pas:()=>[t(f(dynamicIntro+'\n\n'+dynamicProblem)),t(f(pick(DB.agitations)+'\n\n'+pick(DB.objections))),t(f(pick(DB.solutions)+'\n\n'+(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas))))],
    ppn:()=>[t(f(pick(DB.preuves)+'\n\n'+pick(DB.temoignages))),t(f(pick(DB.projections)+'\n\n'+pick(DB.charnieres))),t(f(pick(DB.normalisations)+'\n\n'+(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas))))],
    avant_apres:()=>[t(f(pick(DB.transformations.douleur))),t(f(pick(DB.transformations.declic))),t(f(pick(DB.transformations.victoire))),t(f(pick(DB.solutions)+'\n\n'+(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas))))],
    story_5:()=>[t(f(dynamicIntro)),t(f(dynamicProblem+'\n\n'+pick(DB.agitations))),t(f(pick(DB.solutions))),t(f(pick(DB.preuves)+'\n\n'+pick(DB.temoignages))),t(f(pick(DB.urgences)+'\n\n'+(cfg.cta?'👉 '+cfg.cta:pick(DB.ctas))))],
  })[fwId]();
}

let currentFw=null,currentTone='amical',strategy=null,activeDay=0,activeSlide=0;

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

(function init(){
  const grid=document.getElementById('fwgrid');
  FRAMEWORKS.forEach(f=>{
    const c=document.createElement('div');c.className='fwcard';c.dataset.id=f.id;
    c.innerHTML='<div class="chk">✓</div><div><span style="font-size:14px">'+f.icon+'</span> <span class="fwn">'+f.name+'</span></div><div class="fws">'+f.steps.join(' → ')+'</div>';
    c.addEventListener('click',()=>selectFw(f.id));
    grid.appendChild(c);
  });

  const tg=document.getElementById('tonegrid');
  TONES.forEach(t=>{
    const c=document.createElement('div');c.className='tonechip'+(t.id===currentTone?' act':'');c.dataset.id=t.id;c.textContent=t.label;
    c.addEventListener('click',()=>selectTone(t.id));
    tg.appendChild(c);
  });

  const aud=document.getElementById('f-audience');
  AUDIENCES.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;aud.appendChild(o)});
  aud.addEventListener('change',()=>{document.getElementById('f-audience-custom-wrap').style.display=aud.value==='Autre (personnalisé)'?'block':'none'});

  const prob=document.getElementById('f-problem');
  PROBLEMS.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;prob.appendChild(o)});
  prob.addEventListener('change',()=>{document.getElementById('f-problem-custom-wrap').style.display=prob.value==='Autre (personnalisé)'?'block':'none'});
})();

function selectFw(id){
  currentFw=id;
  document.querySelectorAll('.fwcard').forEach(c=>{
    const s=c.dataset.id===id,fw=FRAMEWORKS.find(f=>f.id===c.dataset.id);
    c.classList.toggle('sel',s);
    c.style.borderColor=s?fw.color+'60':'';c.style.background=s?fw.color+'0a':'';
    const chk=c.querySelector('.chk');chk.style.background=s?fw.color:'';chk.style.borderColor=s?fw.color:'';chk.style.color=s?'var(--bg)':'transparent';
    c.querySelector('.fwn').style.color=s?fw.color:'';
  });
  const fw=FRAMEWORKS.find(f=>f.id===id);
  
  // Affichage ultra guidé sans jargon
  document.getElementById('fwinfo-box').innerHTML=`
    <div style="border: 1px solid #2a2a3a; padding: 15px; border-radius: 8px; margin-top: 10px; background: #1a1a26;">
      <div style="margin-bottom: 8px;">${fw.icon} <strong>Méthode ${fw.name}</strong></div>
      <div style="font-size: 0.9rem; margin-bottom: 5px;"><span style="color: var(--text-muted);">Son super-pouvoir :</span> ${fw.power}</div>
      <div style="font-size: 0.9rem;"><span style="color: var(--text-muted);">Quand l'utiliser :</span> ${fw.when}</div>
    </div>
  `;
  document.getElementById('btn-gen').disabled=false;
}

function selectTone(id){
  currentTone=id;
  document.querySelectorAll('.tonechip').forEach(c=>c.classList.toggle('act',c.dataset.id===id));
}

function switchTab(tab){
  document.getElementById('tab-config').classList.toggle('active',tab==='config');
  document.getElementById('tab-result').classList.toggle('active',tab==='result');
  document.getElementById('panel-config').classList.toggle('active',tab==='config');
  document.getElementById('panel-result').classList.toggle('active',tab==='result');
  if(tab==='result')renderResult();
}

function handleGenerate(){
  if(!currentFw)return;
  const cfg=getCfg();
  strategy=DAY_THEMES.map(dt=>({...dt,slides:genSlides(currentFw,cfg)}));
  activeDay=0;activeSlide=0;
  switchTab('result');
  showToast('✨ Stratégie générée !');
}

function regenDay(i){if(!strategy)return;strategy[i].slides=genSlides(currentFw,getCfg());activeSlide=0;renderResult();showToast('🔄 Jour régénéré !')}

function copyDay(i){
  if(!strategy)return;const d=strategy[i],fw=FRAMEWORKS.find(f=>f.id===currentFw);
  const t=d.slides.map((s,j)=>'── '+(fw.steps[j]||'Slide '+(j+1))+' ──\n'+s).join('\n\n');
  navigator.clipboard.writeText('📅 '+d.jour+' — '+d.theme+'\n\n'+t).then(()=>showToast('📋 Copié !'));
}

function copyFullWeek() {
  if(!strategy) return;
  const fw=FRAMEWORKS.find(f=>f.id===currentFw);
  let text = `🗓️ STRATÉGIE DE CONTENU SEMAINE - ${fw.name.toUpperCase()}\n\n`;
  strategy.forEach(d => {
    text += `==========================================\n`;
    text += `📅 ${d.jour.toUpperCase()} - ${d.theme}\n`;
    text += `==========================================\n\n`;
    d.slides.forEach((s, j) => {
      text += `[Slide ${j+1} : ${fw.steps[j] || 'Suite'}]\n${s}\n\n`;
    });
    text += `\n`;
  });
  navigator.clipboard.writeText(text).then(() => showToast('🚀 Semaine complète copiée !'));
}

function generatePDF() {
  if(!strategy) return;
  const fw=FRAMEWORKS.find(f=>f.id===currentFw);
  const printWindow = window.open('', '_blank');
  
  let htmlContent = `
    <html>
    <head>
      <title>Stratégie Hebdomadaire - ${fw.name}</title>
      <style>
        body { font-family: 'Helvetica', sans-serif; color: #333; padding: 30px; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        .day-block { page-break-inside: avoid; margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fcfcfc; }
        .day-title { font-size: 1.3em; font-weight: bold; color: #111; margin-bottom: 10px; border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; }
        .day-theme { font-size: 0.9em; font-style: italic; color: #666; margin-bottom: 15px; }
        .slide-block { margin-top: 12px; }
        .slide-label { font-weight: bold; color: ${fw.color}; font-size: 0.95em; }
        .slide-text { margin: 5px 0 15px 15px; font-size: 0.9em; white-space: pre-line; line-height: 1.4; color: #2c3e50; }
        @media print { body { padding: 0; } .day-block { border: 1px solid #aaa; } }
      </style>
    </head>
    <body>
      <h1>🗓️ Stratégie de Stories - Méthode ${fw.name}</h1>
  `;

  strategy.forEach(d => {
    htmlContent += `
      <div class="day-block">
        <div class="day-title">${d.emoji} ${d.jour} — ${d.theme}</div>
        <div class="day-theme">🎯 Angle : ${d.angle}</div>
    `;
    d.slides.forEach((s, j) => {
      htmlContent += `
        <div class="slide-block">
          <div class="slide-label">Slide ${j+1} : ${fw.steps[j] || 'Suite'}</div>
          <div class="slide-text">${s}</div>
        </div>
      `;
    });
    htmlContent += `</div>`;
  });

  htmlContent += `</body></html>`;
  
  printWindow.document.write(htmlContent);
  printWindow.document.close();
  
  setTimeout(() => {
    printWindow.print();
    printWindow.close();
  }, 500);
}

function setDay(d){activeDay=d;activeSlide=0;renderResult()}
function setSlide(s){activeSlide=s;renderResult()}

function renderResult(){
  const p=document.getElementById('panel-result');
  if(!strategy||!currentFw){p.innerHTML='<div class="empty"><p>Configure ton produit pour générer ta stratégie.</p></div>';return}
  const fw=FRAMEWORKS.find(f=>f.id===currentFw),ac=fw.color,day=strategy[activeDay],slide=day.slides[activeSlide]||'';
  p.innerHTML=
    '<div class="fwbadge" style="background:'+ac+'0c;border:1px solid '+ac+'20;border-radius:10px"><div><div class="bn" style="color:'+ac+'">'+fw.icon+' '+fw.name+'</div></div></div>'+
    '<div class="daytabs">'+DAY_THEMES.map((dt,i)=>'<button class="dtab'+(activeDay===i?' act':'')+'" onclick="setDay('+i+')" style="'+(activeDay===i?'border-color:'+ac+'40;background:'+ac+'12;color:'+ac:'')+'">'+dt.emoji+' '+dt.jour.slice(0,3)+'</button>').join('')+'</div>'+
    '<div class="dayinfo"><div class="dayinfo-top"><span class="dayinfo-t">'+day.emoji+' '+day.jour+'</span> — <span class="dayinfo-th" style="color:'+ac+'">'+day.theme.toUpperCase()+'</span></div></div>'+
    '<div class="clayout"><div class="phonewrap"><div class="phone"><div class="phone-bars">'+day.slides.map(function(_,i){return'<div class="phone-bar" onclick="setSlide('+i+')" style="background:'+(i<=activeSlide?ac:'#2a2a30')+'"></div>'}).join('')+'</div><div class="phone-sl" style="color:'+ac+'">'+(fw.steps[activeSlide]||'')+'</div><div class="phone-ct">'+esc(slide)+'</div></div></div>'+
    '<div class="cpanel"><div class="sbrow"><span class="sbadge" style="color:'+ac+';background:'+ac+'18;border:1px solid '+ac+'30">'+(fw.steps[activeSlide]||'')+'</span><span class="scount">Slide '+(activeSlide+1)+'/'+day.slides.length+'</span></div>'+
    '<div class="cbox"><div class="cbox-t">'+esc(slide)+'</div></div>'+
    '<div class="arow"><button class="abtn" onclick="regenDay('+activeDay+')">🔄 Régénérer</button><button class="abtn ac" onclick="copyDay('+activeDay+')">📋 Copier le jour</button></div>'+
    '<div style="margin-top: 15px; display: flex; gap: 10px;">'+
      '<button class="abtn" style="flex: 1; background: #3cbbb1; color: white;" onclick="copyFullWeek()">🚀 Copier la semaine</button>'+
      '<button class="abtn" style="flex: 1; background: #E05263; color: white;" onclick="generatePDF()">📄 PDF Semaine</button>'+
    '</div></div></div>';
}
</script>

</body>
</html>
