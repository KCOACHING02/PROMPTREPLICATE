<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur Éditorial - Mode Infini</title>
  <style>
    :root {
      --bg: #0c0c10;
      --panel-bg: #14141d;
      --card-bg: #1a1a26;
      --accent: #FF8C42;
      --text: #f5f0e8;
      --text-muted: #8a8aa3;
      --border: #2a2a3a;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    h1 { text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    .tab-btn { background: var(--panel-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .panel { display: none; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
    .panel.active { display: block; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input, select { width: 100%; padding: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-sizing: border-box; font-size: 1rem; }
    .btn-large { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    .daytabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; }
    .dtab { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .dayinfo { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
    .dayinfo-t { font-weight: bold; font-size: 1.2rem; }
    .clayout { display: flex; gap: 30px; flex-wrap: wrap; }
    .phonewrap { flex: 1; min-width: 280px; max-width: 320px; }
    .phone { background: #111; border: 12px solid #222; border-radius: 36px; height: 520px; padding: 20px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
    .phone-bars { display: flex; gap: 4px; margin-bottom: 15px; }
    .phone-bar { height: 3px; flex: 1; border-radius: 2px; cursor: pointer; }
    .phone-sl { font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
    .phone-ct { font-size: 0.95rem; line-height: 1.5; white-space: pre-line; overflow-y: auto; }
    .cpanel { flex: 2; min-width: 300px; display: flex; flex-direction: column; justify-content: space-between; }
    .cbox { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border); min-height: 150px; white-space: pre-line; margin-bottom: 20px; }
    .arow { display: flex; gap: 10px; }
    .abtn { flex: 1; padding: 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; cursor: pointer; }
    .abtn.ac { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; }
    #toast.show { display: block; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎯 Générateur Éditorial Haute Fréquence</h1>
  <div class="subtitle">Des millions de combinaisons grâce au moteur combinatoire.</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">⚙️ Paramètres</button>
    <button class="tab-btn" id="tab-result" onclick="switchTab('result')">📱 Mes Stories</button>
  </div>

  <div class="panel active" id="panel-config">
    <div class="form-group">
      <label>Quel style d'écriture veux-tu aujourd'hui ?</label>
      <select id="f-style">
        <option value="whatsapp">💬 Style WhatsApp (Spontané & Brut)</option>
        <option value="punchy">⚡ Style Punchy (Incisif & Direct)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nom de ton produit ou service</label>
      <input type="text" id="f-product" placeholder="Ex: Masterclass Instagram..." value="mon programme">
    </div>
    <div class="form-group">
      <label>Ton appel à l'action (CTA)</label>
      <input type="text" id="f-cta" placeholder="Ex: Écris 'GO' en DM..." value="Écris-moi 'GO' en DM">
    </div>
    <button class="btn-large" onclick="handleGenerate()">🚀 CRÉER MA SEMAINE DE STORIES</button>
  </div>

  <div class="panel" id="panel-result"></div>
</div>

<div id="toast"></div>

        B: ["sans téléphone, pour planifier ta tâche du jour.", "pour tout. Ne réinvente jamais la roue.", "en mode avion. Tu vas halluciner sur ta productivité.", "la règle des 80/20. Focus sur ce qui paye.", "Choisis UN seul canal et deviens-y excellente.", "à faible valeur pour te concentrer sur le reste.", "vends un résultat concret. Ça change tout.", "et recycle-le sous 5 formats différents.", "c'est de résoudre un problème DOULOUREUX.", "Ne garde que le strict nécessaire."]
      },
      s3: {
        A: ["Rien qu'en faisant ça, ", "C'est tout bête, ", "Tu vas voir ton niveau de stress baisser ", "Tu n'imagines pas à quel point ", "Fais le test aujourd'hui. ", "C'est la différence ", "Moins de fatigue, plus de résultats. ", "C'est comme ça qu'on passe ", "C'est bête comme chou, ", "Tu vas gagner au moins 1h par jour "],

      },
      s4: {
        A: ["C'est le genre de pépites qu'on voit dans {product}. ", "Si tu veux le plan complet : ", "Dis-moi ce que tu en penses : ", "Si tu veux que je te donne d'autres astuces : ", "Je t'explique le reste en privé : ", "Tu veux que je t'envoie mon guide ? ", "Envoie-moi un petit mot : ", "On passe au niveau supérieur ? ", "Dis-moi si tu connaissais déjà : ", "Prête à mettre ça en place ? "],
        B: ["Curieuse ? {cta}.", "étape par étape ! {cta}.", "envoie-moi un DM ! {cta}.", "fais-moi signe. {cta}.", "viens me parler. {cta}.", "c'est gratuit ! {cta}.", "si ça t'a aidé ! {cta}.", "Le lien est là. {cta}.", "envoie-moi un message. {cta}.", "C'est parti ! {cta}."]
      }
    }
    // Note : Pour l'exemple et la légèreté du prompt, on garde Lundi et Mardi complets.
    // Le principe mathématique garantit 100 phrases par slide (10x10) soit 100 millions de stories possibles par jour.
  },
  punchy: {
    lundi: {
      theme: "Style Punchy — Action immédiate",
      color: "#FF595E",
      s1: {
        A: ["Nouveau lundi, zéro excuse. ", "On attaque. ", "Stop au stress d'avant-rush. ", "Alerte lundi : ", "On attaque le lundi. ", "C'est parti pour 5 jours ", "Nouveau lundi, nouvelles opportunités. ", "Hé ! Ne regarde pas ton calendrier ", "Lundi matin. ", "On y retourne. "],
        B: ["Tu as prévu de subir ta semaine ou de la dominer ?", "C'est le moment de poser les bases d'une semaine de feu.", "On respire un grand coup et on agit.", "stop au stress avant même d'avoir ouvert ton premier mail.", "C'est le moment de poser les bases d'une semaine de dingue.", "pour te rapprocher de tes objectifs. Prête ?", "Tu as prévu quoi aujourd'hui ?", "avec angoisse. On va dompter cette semaine.", "S'il te plaît, promets-moi de ne pas subir ta semaine.", "Vas-tu juste être occupée ou vraiment productive ?"]
      },
      s2: {

      s3: {
        A: ["La vraie solution ? ", "Avec {product}, on va nettoyer ", "Il existe une méthode ", "La vraie solution, ", "Imagine une semaine ", "C'est exactement pour ça que j'ai conçu {product}. ", "Le secret, c'est d'automatiser ", "Tu n'as pas besoin de plus de discipline, ", "On arrête les usines à gaz. ", "La liberté n'est pas un concept flou, "],

      },
      s4: {
        A: ["On commence dès aujourd'hui ? ", "Ne repousse pas à lundi prochain : ", "C'est le moment parfait pour switcher : ", "Si tu veux qu'on pose les bases : ", "Prends 2 minutes ", "Dis-moi en un mot ", "Prête à changer de rythme ? ", "On regarde ça ensemble ", "Fais le premier pas ", "Envoie-moi "],
        B: ["{cta}.", "il faut agir ! {cta}.", "lance-toi ! {cta}.", "écris-moi. {cta}.", "pour m'en parler. {cta}.", "ce qui te bloque aujourd'hui. {cta}.", "Je t'attends. {cta}.", "cet après-midi ? {cta}.", "pour ta liberté. {cta}.", "ta plus grosse frustration du jour. {cta}."]

};

const pick = a => a[Math.floor(Math.random() * a.length)];
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML};

function fill(s, c) {
  return s
    .replace(/\{product\}/g, c.productName || 'mon programme')
    .replace(/\{cta\}/g, c.cta || 'Écris-moi en DM');
}

let strategy = null;
let activeDay = "lundi";
let activeSlide = 0;

function switchTab(tab) {
  document.getElementById('tab-config').classList.toggle('active', tab === 'config');
  document.getElementById('tab-result').classList.toggle('active', tab === 'result');
  document.getElementById('panel-config').classList.toggle('active', tab === 'config');
  document.getElementById('panel-result').classList.toggle('active', tab === 'result');
  if (tab === 'result') renderResult();
}

function handleGenerate() {
  const selectedStyle = document.getElementById('f-style').value;
  const cfg = { productName: document.getElementById('f-product').value.trim(), cta: document.getElementById('f-cta').value.trim() };
  
  strategy = {};
  // On génère Lundi et Mardi pour l'exemple
  const joursDisponibles = Object.keys(BIBLE[selectedStyle]);
  
  joursDisponibles.forEach(j => {
    const data = BIBLE[selectedStyle][j];
    strategy[j] = {
      theme: data.theme,
      color: data.color,
      slides: [
        fill(pick(data.s1.A) + pick(data.s1.B), cfg),
        fill(pick(data.s2.A) + pick(data.s2.B), cfg),
        fill(pick(data.s3.A) + pick(data.s3.B), cfg),
        fill(pick(data.s4.A) + pick(data.s4.B), cfg)
      ]
    };
  });

  activeDay = "lundi";
  activeSlide = 0;
  switchTab('result');
}

function regenDay(j) {
  if (!strategy) return;
  const selectedStyle = document.getElementById('f-style').value;
  const cfg = { productName: document.getElementById('f-product').value.trim(), cta: document.getElementById('f-cta').value.trim() };
  
  const data = BIBLE[selectedStyle][j];
  strategy[j].slides = [
    fill(pick(data.s1.A) + pick(data.s1.B), cfg),
    fill(pick(data.s2.A) + pick(data.s2.B), cfg),
    fill(pick(data.s3.A) + pick(data.s3.B), cfg),
    fill(pick(data.s4.A) + pick(data.s4.B), cfg)
  ];
  activeSlide = 0;
  renderResult();
}

function setDay(j) { activeDay = j; activeSlide = 0; renderResult(); }
function setSlide(s) { activeSlide = s; renderResult(); }

function renderResult() {
  const p = document.getElementById('panel-result');
  if (!strategy) return;
  
  const jours = Object.keys(strategy);
  const d = strategy[activeDay];
  const slideText = d.slides[activeSlide] || '';
  const ac = d.color;
  
  p.innerHTML = `
    <div class="daytabs">
      ${jours.map(j => `
        <button class="dtab" onclick="setDay('${j}')" style="${activeDay === j ? `border-color:${ac}; background:${ac}15; color:${ac};` : ''}">
          ${j.charAt(0).toUpperCase() + j.slice(1,3)}
        </button>
      `).join('')}
    </div>
    <div class="dayinfo"><span class="dayinfo-t" style="color:${ac}">${d.theme}</span></div>
    <div class="clayout">
      <div class="phonewrap">
        <div class="phone">
          <div class="phone-bars">
            ${d.slides.map((_, i) => `
              <div class="phone-bar" onclick="setSlide(${i})" style="background:${i <= activeSlide ? ac : '#2a2a30'}"></div>
            `).join('')}
          </div>
          <div class="phone-sl" style="color:${ac}">Slide ${activeSlide + 1}</div>
          <div class="phone-ct">${esc(slideText)}</div>
        </div>
      </div>
      <div class="cpanel">
        <div>
          <div class="cbox">${esc(slideText)}</div>
        </div>
        <div class="arow">
          <button class="abtn" onclick="regenDay('${activeDay}')">🔄 Recalculer (100+ phrases possibles)</button>
        </div>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
