<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Stories - Moteur de Scénarios Cohérents</title>
    <style>
        :root {
            --bg-color: #fcfbfa;
            --text-color: #1c1c1c;
            --accent-color: #b5835a;
            --card-bg: #ffffff;
            --border-color: #edeae4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        button {
            background-color: var(--text-color);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #333;
        }
        .story-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .slide {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f5f2eb;
        }
        .slide:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .slide-number {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }
        .slide-content {
            font-size: 1.2rem;
            white-space: pre-line;
        }
        .theme-tag {
            display: inline-block;
            background-color: #f5f2eb;
            color: #555;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Générateur de Stories — Version Scénarios</h1>
        <p style="color: #666; text-align: center;">Histoires complètes, logiques et humaines de A à Z.</p>
    </header>

    <div class="controls">
        <button onclick="generateStory()">Générer une Histoire Complète</button>
    </div>

    <div id="storyOutput" class="story-container">
        <p style="text-align: center; color: #999;">Clique sur le bouton pour générer ta story cohérente.</p>
    </div>
</div>

<script>
    // BIBLE DES SCÉNARIOS COHÉRENTS
    const baseHistoires = [
        {
            theme: "L'ANGOISSE DES COURSES (Cible : Fins de mois difficiles)",
            slides: [
                ["Je sors tout juste des courses. J'ai pris ce qui me faisait envie sans faire de calculs mentaux.", "Je savoure. C'est tout bête, mais c'est précieux."],
                ["Parce que je sais ce que c'est de regarder son compte avec la boule au ventre en passant à la caisse.\n\nAvant, je finissais mes mois dans le rouge. Maintenant, je respire enfin librement.", "Tu penses peut-être que ce n'est pas pour toi. Que c'est réservé aux autres."],
                ["Une de mes clientes m'a dit hier qu'elle respirait enfin elle aussi.\n\nÉcris-moi 'BULLE' en DM pour échanger sur ta situation.", "Tape 'INFOS' et on regarde ça ensemble."]
            ]
        },
        {
            theme: "LE RÉVEIL SANS ALARME (Cible : Salariée épuisée)",
            slides: [
                ["Ce matin, pas de réveil qui hurle. Juste mes yeux qui s'ouvrent quand ils en ont envie.", "Le silence du petit matin. Avant que tout le monde ne se réveille."],
                ["Avant, je subissais mes journées et je stressais dès le dimanche soir. Maintenant, le lundi est un jour comme un autre.", "Tu te dis sûrement que tu n'as pas l'énergie pour lancer un projet à côté de ton CDI."],
                ["C'est le déclic qu'a eu Sophie le mois dernier. Regarde son retour.\n\nDis-moi 'DÉCLIC' en DM pour qu'on en discute.", "Envoie 'PRÊTE' et je t'explique les étapes."]
            ]
        },
        {
            theme: "LES ÉCLATS DE RIRE (Cible : Maman au foyer)",
            slides: [
                ["Mes enfants rigolent aux éclats dans la pièce d'à côté. Je savoure chaque éclat de voix.", "Être là pour eux. C'est devenu ma priorité absolue."],
                ["Avant, je passais à côté de mes enfants pour enrichir un patron. Maintenant, je travaille à leurs côtés.", "Tu as peur de ne pas avoir assez de temps dans tes journées de maman. Je comprends."],
                ["C'est accessible à n'importe quelle maman motivée. Regarde le message de Julie.\n\nEnvoie 'MAMAN' en DM et on en parle.", "Dis-moi 'PRÊTE' en message privé."]
            ]
        },
        {
            theme: "LA BALADE À 14H (Cible : Besoin de reconversion)",
            slides: [
                ["Je marche à bon rythme. Mon corps bouge. Et ma tête se vide enfin.", "Prendre l'air en plein milieu de l'après-midi. C'est ça le luxe."],
                ["Avant, je devais demander la permission pour m'absenter. Maintenant, je suis ma seule boss.", "Tu te dis que tu n'as aucun talent particulier à monétiser. C'est faux."],
                ["C'est exactement ce que mes élèves appliquent. Et ça marche.\n\nEnvoie-moi 'GO' et on en parle simplement.", "Tape 'ENSEMBLE' et voyons ce qu'on peut faire."]
            ]
        },
        {
            theme: "LE MESSAGE DE LA CLIENTE (Cible : Peur d'échouer)",
            slides: [
                ["Je viens de lire le message d'une cliente. Elle me remercie d'avoir changé son quotidien.", "Ça me touche tellement à chaque fois."],
                ["Avant, le mot 'vendre' me terrifiait. Maintenant, c'est juste aider des personnes qui en ont besoin.", "Tu as peur de te lancer pour rien. De perdre ton temps et d'échouer."],
                ["Mais la méthode est là, il ne manque plus que toi.\n\nEnvoie 'ACTION' et je t'envoie la vidéo explicative.", "Écris-moi 'VRAI' et je t'explique le principe."]
            ]
        }
    ];

    function generateStory() {
        // 1. Choix d'un scénario complet au hasard
        const histoire = baseHistoires[Math.floor(Math.random() * baseHistoires.length)];
        
        // 2. Pour chaque slide de ce scénario, on pioche une variante au hasard
        const s1 = histoire.slides[0][Math.floor(Math.random() * histoire.slides[0].length)];
        const s2 = histoire.slides[1][Math.floor(Math.random() * histoire.slides[1].length)];
        const s3 = histoire.slides[2][Math.floor(Math.random() * histoire.slides[2].length)];

        const output = `
            <div class="theme-tag">Thématique : ${histoire.theme}</div>
            <div class="slide">
                <span class="slide-number">Slide 1 — L'accroche / Le moment</span>
                <div class="slide-content">${s1}</div>
            </div>
            <div class="slide">
                <span class="slide-number">Slide 2 — Le problème / La charnière</span>
                <div class="slide-content">${s2}</div>
            </div>
            <div class="slide">
                <span class="slide-number">Slide 3 — La preuve / L'action</span>
                <div class="slide-content">${s3}</div>
            </div>
        `;

        document.getElementById('storyOutput').innerHTML = output;
    }
</script>

</body>
</html>
