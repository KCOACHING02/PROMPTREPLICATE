<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Stories Mono-Slide Pro</title>
  
  <style>
    :root {
      --bg: #0c0c10;
      --panel-bg: #14141d;
      --card-bg: #1a1a26;
      --accent: #FF8C42;
      --text: #f5f0e8;
      --text-muted: #8a8aa3;
      --border: #2a2a3a;
      --success: #10B981;
      --star: #FFD700;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    h1 { text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
    
    /* Onglets Principaux */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    .tab-btn { background: var(--panel-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .tab-btn:hover { background: var(--card-bg); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* Panneaux */
    .panel { display: none; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
    .panel.active { display: block; }

    /* Formulaire Config */
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input[type="text"] { width: 100%; padding: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-sizing: border-box; font-size: 1rem; }
    .btn-large { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-large:hover { opacity: 0.9; }

    /* Résultats - Onglets Jours */
    .daytabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .dtab { background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; }
    .dtab:hover { color: var(--text); background: var(--panel-bg); }
    .dtab.active { background: rgba(255,140,66,0.1); color: var(--accent); border-color: var(--accent); }

    .dayinfo { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
    .dayinfo-t { font-weight: bold; font-size: 1.1rem; }

    /* Layout Simulateur + Contrôles */
    .clayout { display: flex; gap: 30px; flex-wrap: wrap; }
    
    /* ZONE TÉLÉPHONE (Simulateur) */
    .phonewrap { flex: 1; min-width: 300px; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .phone { 
      background: #111; 
      border: 12px solid #222; 
      border-radius: 36px; 
      width: 100%;
      height: 570px; 
      position: relative; 
      box-sizing: border-box; 
      overflow: hidden; 
      background-size: cover;
      background-position: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    /* Conteneur de texte déplaçable */
    .phone-text-container {
      position: absolute;
      left: 15px;
      right: 15px;
      top: 50%; 
      transform: translateY(-50%);
      cursor: grab;
      user-select: none; 
      text-align: center;
      padding: 10px;
      border-radius: 8px;
    }
    .phone-text-container:active { cursor: grabbing; }
    .phone-ct { 
      font-size: 1.1rem; 
      line-height: 1.5; 
      white-space: pre-line; 
      margin: 0;
    }
    
    /* Contrôles sous le téléphone */
    .phone-controls { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .control-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .cbtn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .cbtn:hover { background: var(--panel-bg); }
    .cbtn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .file-input { display: none; }

    /* ZONE PANNEAU DE CONTRÔLE (Actions) */
    .cpanel { flex: 2; min-width: 300px; display: flex; flex-direction: column; }
    
    /* Zone de texte éditable par l'utilisateur */
    .editable-box {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid var(--border);
      min-height: 150px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      position: relative;
      line-height: 1.6;
      color: var(--text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      font-family: inherit;
    }
    .editable-box:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;}
    .abtn { flex: 1; min-width: 160px; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .abtn:hover { background: var(--panel-bg); }

    .cbox-header { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 5px; }
    .cb-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .cb-btn:hover { background: rgba(255,255,255,0.1); }
    .cb-btn.copied { background: var(--success); color: white; border-color: var(--success); }
    .cb-btn.starred { background: rgba(255,215,0,0.1); color: var(--star); border-color: var(--star); }

    /* PANNEAU PÉPITES */
    #pepites-list { display: flex; flex-direction: column; gap: 15px; }
    .pepite-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; transition: 0.2s; }
    .pepite-item:hover { border-color: rgba(255,255,255,0.1); }
    .pepite-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .pepite-text { font-size: 1rem; line-height: 1.6; white-space: pre-line; color: var(--text); }
    .pepite-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }

    /* Alerte de sauvegarde */
    .save-alert { text-align: center; color: var(--success); font-size: 0.85rem; margin-top: -15px; margin-bottom: 15px; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
    .save-alert.visible { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎯 Studio Stories Mono-Slide</h1>
  <div class="subtitle">Hooks Interchangeables • Simulateur Visuel • Banque de Pépites</div>
  <div id="save-status" class="save-alert">✓ Données synchronisées</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-config" onclick="switchTab('config')">⚙️ Configuration</button>
    <button class="tab-btn" id="tab-result" onclick="switchTab('result')">📱 Studio Création</button>
    <button class="tab-btn" id="tab-pepites" onclick="switchTab('pepites')">⭐ Mes Pépites (<span id="pepites-count">0</span>)</button>
  </div>

  <div class="panel active" id="panel-config">
    <div class="form-group">
      <label>Nom de ton produit ou service</label>
      <input type="text" id="f-product" value="mon programme" oninput="saveInputs()">
    </div>
    <div class="form-group">
      <label>Ton appel à l'action (CTA)</label>
      <input type="text" id="f-cta" value="écris-moi 'GO' en DM" oninput="saveInputs()">
    </div>
    <button class="btn-large" onclick="handleGenerate()">🚀 RÉGÉNÉRER MA SEMAINE</button>
  </div>

  <div class="panel" id="panel-result"></div>

  <div class="panel" id="panel-pepites">
    <div id="pepites-list"></div>
  </div>
</div>

<script>
const HOOKS = [
  "Arrête de scroller 2 secondes ! 🛑 \n\n", "Alerte gros ras-le-bol. 😤 \n\n", "Regarde bien cette slide, elle est pour toi. 👀 \n\n", 
  "Est-ce que tu t'es déjà demandé pourquoi certains réussissent si vite ? 🤔 \n\n", "Oublie tout ce qu'on t'a dit sur la vente. 🤫 \n\n", 
  "Avis aux entrepreneures déterminées : 📣 \n\n", "Lis bien ce qui va suivre si tu veux passer un cap. 🚀 \n\n", 
  "Stop au syndrome de l'imposteur ! 🧠 \n\n"
];

const BIBLE = {
  lundi: { theme: "LUNDI — Formule AIDA (Attention, Intérêt, Désir, Action)", color: "#FF595E", B: ["Tu mérites un business fluide. C'est exactement ce qu'on fait dans {product}. Prête à changer ? Alors {cta} !", "Si tu veux doubler tes résultats sans travailler plus, {product} est fait pour toi. Envie de voir comment ? Simple : {cta}."] },
  mardi: { theme: "MARDI — Formule PAS (Problème, Agitation, Solution)", color: "#FFCA3A", B: ["C'est parce qu'il te manque une structure. C'est ce qu'on règle ensemble dans {product}. Marre de galérer ? {cta}.", "Le problème n'est pas ton offre, c'est ton process. Avec {product}, on remet tout à plat. Pour en discuter : {cta}."] },
  mercredi: { theme: "MERCREDI — Formule FOMO (Urgence & Rareté)", color: "#8AC926", B: ["Ne regrette pas demain de ne pas avoir sauté le pas aujourd'hui. {product} t'attend. Pour sécuriser ta place : {cta}.", "C'est le moment de prendre une vraie décision pour ton avenir. Embarque dans {product} dès maintenant ! {cta}."] },
  jeudi: { theme: "JEUDI — Preuve Sociale", color: "#1982C4", B: ["Elles ont toutes commencé au même point que toi avant d'intégrer {product}. Tu attends quoi ? {cta}.", "La méthode fonctionne pour tout le monde, pourquoi pas pour toi ? Rejoins {product} ! Pour postuler : {cta}."] },
  vendredi: { theme: "VENDREDI — Le Contraste", color: "#6A4C93", B: ["C'est exactement la transformation qu'on opère à l'intérieur de {product}. Tu veux la tienne ? {cta}.", "Ce n'est pas de la magie, c'est de la pure stratégie appliquée dans {product}. Envie de voir le plan ? {cta}."] },
  samedi: { theme: "SAMEDI — Le Storytelling", color: "#FF9F1C", B: ["Mais j'ai trouvé la clé. Elle est dans {product}. Ne fais pas les mêmes erreurs que moi : {cta}.", "C'est de cet échec qu'est né {product}. Épargne-toi ces mois de souffrance : {cta}."] },
  dimanche: { theme: "DIMANCHE — La Clarté", color: "#2EC4B6", B: ["La réponse est non. Dans {product}, on s'adapte à ton niveau. Tu as encore des doutes ? Viens me les poser : {cta}.", "On reprend tout à zéro ensemble. C'est le but de {product}. Si tu veux la vérité : {cta}."] }
};

let strategy = {};
let activeDay = "lundi";
let pepites = [];

const pick = a => a[Math.floor(Math.random() * a.length)];
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML};

function fill(s, prod, cta) {
  return s.replace(/\{product\}/g, prod).replace(/\{cta\}/g, cta);
}

// Génération initiale immédiate
function initStrategy() {
  const prod = "mon programme";
  const cta = "écris-moi 'GO' en DM";
  
  Object.keys(BIBLE).forEach(j => {
    const data = BIBLE[j];
    strategy[j] = {
      theme: data.theme, color: data.color, hook: pick(HOOKS), body: pick(data.B),
      yPos: 50, textColor: '#ffffff', textBg: false, fullDraft: "" 
    };
    strategy[j].fullDraft = strategy[j].hook + fill(strategy[j].body, prod, cta);
  });
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.getElementById(`panel-${tabId}`).classList.add('active');
  if (tabId === 'result') renderResult();
  if (tabId === 'pepites') renderPepitesList();
}

function handleGenerate() {
  const prod = document.getElementById('f-product').value.trim() || "mon programme";
  const cta = document.getElementById('f-cta').value.trim() || "écris-moi 'GO' en DM";
  
  Object.keys(BIBLE).forEach(j => {
    const data = BIBLE[j];
    strategy[j].fullDraft = strategy[j].hook + fill(strategy[j].body, prod, cta);
  });
  
  saveToLocalStorage();
  switchTab('result');
}

function setDay(j) { 
  if (document.getElementById('story-text')) {
    strategy[activeDay].fullDraft = document.getElementById('story-text').value;
  }
  activeDay = j; 
  renderResult(); 
}

function saveInputs() {
  localStorage.setItem('studio_productName', document.getElementById('f-product').value);
  localStorage.setItem('studio_cta', document.getElementById('f-cta').value);
}

function saveToLocalStorage() {
  if (document.getElementById('story-text')) strategy[activeDay].fullDraft = document.getElementById('story-text').value;
  localStorage.setItem('studio_strategy', JSON.stringify(strategy));
  localStorage.setItem('studio_pepites', JSON.stringify(pepites));
  saveInputs();
  showSaveStatus();
}

function showSaveStatus() {
  const s = document.getElementById('save-status');
  s.classList.add('visible');
  setTimeout(() => s.classList.remove('visible'), 2000);
}

// --- RENDER DU STUDIO ---
function renderResult() {
  const p = document.getElementById('panel-result');
  const d = strategy[activeDay];
  const fullText = d.fullDraft;
  const isStarred = pepites.some(p => p.text === fullText);

  p.innerHTML = `
    <div class="daytabs">
      ${Object.keys(strategy).map(j => `<button class="dtab ${activeDay === j ? 'active' : ''}" onclick="setDay('${j}')">${j.charAt(0).toUpperCase() + j.slice(1)}</button>`).join('')}
    </div>
    
    <div class="dayinfo"><span class="dayinfo-t" style="color:${d.color}">${d.theme}</span></div>
    
    <div class="clayout">
      <div class="phonewrap">
        <div id="phone-sim" class="phone" style="background-image: url('${d.bgImage || ''}');">
          <div id="phone-text-container" class="phone-text-container" style="top: ${d.yPos}%; color: ${d.textColor}; background-color: ${d.textBg ? 'rgba(0,0,0,0.6)' : 'transparent'};" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            <p id="phone-mirror-text" class="phone-ct">${esc(fullText)}</p>
          </div>
        </div>
        
        <div class="phone-controls">
          <div class="control-row">
            <button class="cbtn" onclick="document.getElementById('bgUpload').click()">🖼️ Fond</button>
            <input type="file" id="bgUpload" class="file-input" accept="image/*" onchange="handleBgUpload(this)">
            ${d.bgImage ? `<button class="cbtn" onclick="removeBg()">🗑️</button>` : ''}
          </div>
          <div class="control-row">
            <button class="cbtn ${d.textColor === '#ffffff' ? 'active' : ''}" onclick="setTextStyle('#ffffff', ${d.textBg})">⚪ Blanc</button>
            <button class="cbtn ${d.textColor === '#000000' ? 'active' : ''}" onclick="setTextStyle('#000000', ${d.textBg})">⚫ Noir</button>
            <button class="cbtn ${d.textBg ? 'active' : ''}" onclick="setTextStyle('${d.textColor}', !${d.textBg})">🅰️ Surligner</button>
          </div>
        </div>
      </div>
      
      <div class="cpanel">
        <div class="cbox-header">
          <button class="cb-btn ${isStarred ? 'starred' : ''}" onclick="togglePepite()">${isStarred ? '⭐' : '☆'}</button>
          <button class="cb-btn" id="copy-btn" onclick="copyText()">📋 Copier</button>
        </div>
        
        <textarea id="story-text" class="editable-box" oninput="updateMirrorText(this)">${esc(fullText)}</textarea>
        
        <div class="action-row">
          <button class="abtn" onclick="regenHookOnly('${activeDay}')" style="color:${d.color};">🪝 Changer Hook</button>
          <button class="abtn" onclick="saveToLocalStorage()" style="background-color:var(--success); color:white;">💾 Sauvegarder</button>
        </div>
      </div>
    </div>
  `;
}

function updateMirrorText(textarea) {
  document.getElementById('phone-mirror-text').innerText = textarea.value;
  strategy[activeDay].fullDraft = textarea.value;
}

// Glisser-déposer sur le téléphone
let isDragging = false, startY;
function startDrag(e) {
  isDragging = true;
  const container = document.getElementById('phone-text-container');
  startY = (e.pageY || e.touches[0].pageY) - container.offsetTop;
  document.addEventListener('mousemove', drag);
  document.addEventListener('mouseup', stopDrag);
  document.addEventListener('touchmove', drag, { passive: false });
  document.addEventListener('touchend', stopDrag);
  e.preventDefault();
}
function drag(e) {
  if (!isDragging) return;
  const sim = document.getElementById('phone-sim'), container = document.getElementById('phone-text-container');
  let newY = (e.pageY || e.touches[0].pageY) - startY;
  const padding = 20, minY = padding + container.offsetHeight / 2, maxY = sim.offsetHeight - padding - container.offsetHeight / 2;
  newY = Math.max(minY, Math.min(newY, maxY));
  const yPercent = (newY / sim.offsetHeight) * 100;
  container.style.top = yPercent + '%';
  strategy[activeDay].yPos = yPercent;
  if(e.type === 'touchmove') e.preventDefault();
}
function stopDrag() {
  if(isDragging) { isDragging = false; document.removeEventListener('mousemove', drag); document.removeEventListener('mouseup', stopDrag); document.removeEventListener('touchmove', drag); document.removeEventListener('touchend', stopDrag); }
}

function handleBgUpload(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) { strategy[activeDay].bgImage = e.target.result; renderResult(); };
    reader.readAsDataURL(input.files[0]);
  }
}
function removeBg() { strategy[activeDay].bgImage = null; renderResult(); }
function setTextStyle(color, hasBg) { strategy[activeDay].textColor = color; strategy[activeDay].textBg = hasBg; renderResult(); }

function regenHookOnly(j) { 
  const prod = document.getElementById('f-product').value || "mon programme";
  const cta = document.getElementById('f-cta').value || "écris-moi 'GO' en DM";
  strategy[j].hook = pick(HOOKS); 
  strategy[j].fullDraft = strategy[j].hook + fill(strategy[j].body, prod, cta);
  renderResult(); 
}

function copyText() {
  const text = document.getElementById('story-text').value;
  const btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(text).then(() => {
    btn.innerText = "✓ Copié !"; btn.classList.add('copied');
    setTimeout(() => { btn.innerText = "📋 Copier"; btn.classList.remove('copied'); }, 1500);
  });
}

// --- PÉPITES ---
function updatePepitesCount() { document.getElementById('pepites-count').innerText = pepites.length; }
function togglePepite() {
  const fullText = document.getElementById('story-text').value;
  const index = pepites.findIndex(p => p.text === fullText);
  if (index > -1) { pepites.splice(index, 1); } else {
    pepites.unshift({ text: fullText });
  }
  updatePepitesCount(); renderResult();
}
function renderPepitesList() {
  const list = document.getElementById('pepites-list');
  if (pepites.length === 0) { list.innerHTML = `<div style="text-align:center;color:var(--text-muted)">☆ Tes stories favorites s'afficheront ici.</div>`; return; }
  list.innerHTML = pepites.map((p, index) => `
    <div class="pepite-item">
      <p class="pepite-text">${esc(p.text)}</p>
      <div class="pepite-actions">
        <button class="cb-btn" onclick="deletePepite(${index})">🗑️ Supprimer</button>
      </div>
    </div>
  `).join('');
}
function deletePepite(index) { pepites.splice(index, 1); updatePepitesCount(); renderPepitesList(); }

// Lancement au chargement
window.onload = function() {
  initStrategy();
  if (localStorage.getItem('studio_strategy')) {
    strategy = JSON.parse(localStorage.getItem('studio_strategy'));
  }
  if (localStorage.getItem('studio_pepites')) {
    pepites = JSON.parse(localStorage.getItem('studio_pepites'));
    updatePepitesCount();
  }
  if (localStorage.getItem('studio_productName')) document.getElementById('f-product').value = localStorage.getItem('studio_productName');
  if (localStorage.getItem('studio_cta')) document.getElementById('f-cta').value = localStorage.getItem('studio_cta');
  
  switchTab('result'); // Lance directement l'onglet résultat
};
</script>

</body>
</html>
