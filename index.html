<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur Éditorial Haute Conversion</title>
  <style>
    :root {
      --bg: #0c0c10;
      --panel-bg: #14141d;
      --card-bg: #1a1a26;
      --accent: #FF8C42;
      --text: #f5f0e8;
      --text-muted: #8a8aa3;
      --border: #2a2a3a;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 5px;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .tab-btn {
      background: var(--panel-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .panel {
      display: none;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
    }
    .panel.active {
      display: block;
    }
    
    /* CONFIGURATION STYLES */
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: var(--text);
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      box-sizing: border-box;
      font-size: 1rem;
    }
    .btn-large {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }
    .btn-large:hover { opacity: 0.9; }
    
    /* RESULTATS STYLES */
    .daytabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .dtab {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .dayinfo {
      margin-bottom: 20px;
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 8px;
    }
    .dayinfo-t { font-weight: bold; font-size: 1.2rem; }
    .dayinfo-desc { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }
    
    .clayout {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .phonewrap {
      flex: 1;
      min-width: 280px;
      max-width: 320px;
    }
    .phone {
      background: #111;
      border: 12px solid #222;
      border-radius: 36px;
      height: 520px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }
    .phone-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
    }
    .phone-bar {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .phone-sl {
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .phone-ct {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-line;
      overflow-y: auto;
    }
    
    .cpanel {
      flex: 2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .cbox {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-height: 150px;
      white-space: pre-line;
      margin-bottom: 20px;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .arow {
      display: flex;
      gap: 10px;
    }
    .abtn {
      flex: 1;
      padding: 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .abtn.ac {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      z-index: 1000;
    }
    #toast.show { display: block; }
  </style>
</head>

    </div>

    <div class="form-group">
      <label>Nom de ton produit ou service</label>

    </div>
    
    <div class="form-group">
      <label>Ton appel à l'action (CTA)</label>
      <input type="text" id="f-cta" placeholder="Ex: Écris 'GO' en DM, Clique sur le lien..." value="Écris-moi 'GO' en DM">
    </div>

    <button class="btn-large" onclick="handleGenerate()">🚀 CRÉER MA SEMAINE DE STORIES</button>
  </div>

  <div class="panel" id="panel-result"></div>
</div>

<div id="toast"></div>

const pick = a => a[Math.floor(Math.random() * a.length)];
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML};

function fill(s, c) {
  return s
    .replace(/\{product\}/g, c.productName || 'mon programme')
    .replace(/\{cta\}/g, c.cta || 'Écris-moi en DM');
}

let strategy = null;
let activeDay = "lundi";
let activeSlide = 0;

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function switchTab(tab) {
  document.getElementById('tab-config').classList.toggle('active', tab === 'config');
  document.getElementById('tab-result').classList.toggle('active', tab === 'result');
  document.getElementById('panel-config').classList.toggle('active', tab === 'config');
  document.getElementById('panel-result').classList.toggle('active', tab === 'result');
  if (tab === 'result') renderResult();
}

function handleGenerate() {
  const selectedStyle = document.getElementById('f-style').value;
  const productName = document.getElementById('f-product').value.trim();
  const cta = document.getElementById('f-cta').value.trim();
  const cfg = { productName, cta };

  strategy = {};
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  
  jours.forEach(j => {
    const data = BIBLE[selectedStyle][j];
    strategy[j] = {
      theme: data.theme,
      color: data.color,
      slides: [
        fill(pick(data.s1), cfg),
        fill(pick(data.s2), cfg),
        fill(pick(data.s3), cfg),
        fill(pick(data.s4), cfg)
      ]
    };
  });

  activeDay = "lundi";
  activeSlide = 0;
  switchTab('result');
  showToast('✨ Semaine générée avec succès !');
}

function regenDay(j) {
  if (!strategy) return;
  const selectedStyle = document.getElementById('f-style').value;
  const productName = document.getElementById('f-product').value.trim();
  const cta = document.getElementById('f-cta').value.trim();
  const cfg = { productName, cta };
  
  const data = BIBLE[selectedStyle][j];
  strategy[j].slides = [
    fill(pick(data.s1), cfg),
    fill(pick(data.s2), cfg),
    fill(pick(data.s3), cfg),
    fill(pick(data.s4), cfg)
  ];
  activeSlide = 0;
  renderResult();
  showToast('🔄 Stories du jour renouvelées !');
}

function copyDay(j) {
  if (!strategy) return;
  const d = strategy[j];
  const text = d.slides.map((s, i) => `Slide ${i+1} :\n${s}`).join('\n\n');
  navigator.clipboard.writeText(`📅 ${j.toUpperCase()} - ${d.theme}\n\n${text}`)
    .then(() => showToast('📋 Copié dans le presse-papier !'));
}

function copyFullWeek() {
  if (!strategy) return;
  let fullText = "🗓️ PLANNING ÉDITORIAL DE LA SEMAINE\n\n";
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  
  jours.forEach(j => {
    const d = strategy[j];
    fullText += `==========================================\n`;
    fullText += `📅 ${j.toUpperCase()} - ${d.theme}\n`;
    fullText += `==========================================\n\n`;
    d.slides.forEach((s, i) => {
      fullText += `[Slide ${i+1}]\n${s}\n\n`;
    });
    fullText += `\n`;
  });
  
  navigator.clipboard.writeText(fullText)
    .then(() => showToast('🚀 Semaine complète copiée !'));
}

function generatePDF() {
  if (!strategy) return;
  const printWindow = window.open('', '_blank');
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  
  let htmlContent = `
    <html>
    <head>
      <title>Planning Éditorial Hebdomadaire</title>
      <style>
        body { font-family: 'Helvetica', sans-serif; color: #333; padding: 30px; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        .day-block { page-break-inside: avoid; margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fcfcfc; }
        .day-title { font-size: 1.3em; font-weight: bold; color: #111; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; }
        .slide-block { margin-top: 12px; }
        .slide-label { font-weight: bold; font-size: 0.95em; }
        .slide-text { margin: 5px 0 15px 15px; font-size: 0.9em; white-space: pre-line; line-height: 1.4; color: #2c3e50; }
        @media print { body { padding: 0; } }
      </style>
    </head>
    <body>
      <h1>🗓️ Mon Planning Éditorial de la Semaine</h1>
  `;

  jours.forEach(j => {
    const d = strategy[j];
    htmlContent += `
      <div class="day-block">
        <div class="day-title">${j.toUpperCase()} — ${d.theme}</div>
    `;
    d.slides.forEach((s, i) => {
      htmlContent += `
        <div class="slide-block">
          <div class="slide-label" style="color:${d.color}">Slide ${i+1}</div>
          <div class="slide-text">${s}</div>
        </div>
      `;
    });
    htmlContent += `</div>`;
  });

  htmlContent += `</body></html>`;
  
  printWindow.document.write(htmlContent);
  printWindow.document.close();
  
  setTimeout(() => {
    printWindow.print();
    printWindow.close();
  }, 500);
}

function setDay(j) { activeDay = j; activeSlide = 0; renderResult(); }
function setSlide(s) { activeSlide = s; renderResult(); }

function renderResult() {
  const p = document.getElementById('panel-result');

  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];

  const ac = d.color;
  
  p.innerHTML = `
    <div class="daytabs">
      ${jours.map(j => `
        <button class="dtab" onclick="setDay('${j}')" style="${activeDay === j ? `border-color:${ac}; background:${ac}15; color:${ac};` : ''}">
          ${j.charAt(0).toUpperCase() + j.slice(1,3)}
        </button>
      `).join('')}
    </div>
    
    <div class="dayinfo">
      <span class="dayinfo-t" style="color:${ac}">${d.theme}</span>
    </div>
    
    <div class="clayout">
      <div class="phonewrap">
        <div class="phone">
          <div class="phone-bars">
            ${d.slides.map((_, i) => `
              <div class="phone-bar" onclick="setSlide(${i})" style="background:${i <= activeSlide ? ac : '#2a2a30'}"></div>
            `).join('')}
          </div>
          <div class="phone-sl" style="color:${ac}">Slide ${activeSlide + 1}</div>
          <div class="phone-ct">${esc(slideText)}</div>
        </div>
      </div>
      
      <div class="cpanel">
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
            <span style="color:${ac}">Slide ${activeSlide + 1}</span>
            <span style="color:var(--text-muted)">Aperçu de la story</span>
          </div>
          <div class="cbox">${esc(slideText)}</div>
        </div>
        
        <div>
          <div class="arow">
            <button class="abtn" onclick="regenDay('${activeDay}')">🔄 Changer les phrases</button>
            <button class="abtn ac" style="background:${ac}; color:#000; border-color:${ac}" onclick="copyDay('${activeDay}')">📋 Copier le jour</button>
          </div>
          
          <div style="margin-top: 10px; display: flex; gap: 10px;">
            <button class="abtn" style="flex: 1; background: #3cbbb1; color: white;" onclick="copyFullWeek()">🚀 Copier la semaine</button>
            <button class="abtn" style="flex: 1; background: #E05263; color: white;" onclick="generatePDF()">📄 PDF Semaine</button>
          </div>
        </div>
      </div>
    </div>
  `;
}
