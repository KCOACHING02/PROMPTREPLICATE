      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {

      width: 100%;
    }
    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 5px;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .tab-btn {
      background: var(--panel-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .panel {
      display: none;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
    }
    .panel.active {
      display: block;
    }
    
    /* CONFIGURATION STYLES */
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: var(--text);
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input, select {

      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);

      font-size: 1rem;

      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }
    .btn-large:hover {
      opacity: 0.9;
    }

    .daytabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .dtab {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;

      padding: 15px;
      border-radius: 8px;
    }
    .dayinfo-t { font-weight: bold; font-size: 1.2rem; }
    .dayinfo-th { font-size: 0.9rem; font-weight: bold; }
    .dayinfo-desc { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .phonewrap {
      flex: 1;
      min-width: 280px;
      max-width: 320px;
    }
    .phone {
      background: #111;
      border: 12px solid #222;
      border-radius: 36px;
      height: 520px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }
    .phone-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
    }
    .phone-bar {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .phone-sl {
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .phone-ct {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-line;
      overflow-y: auto;
    }
    
    .cpanel {
      flex: 2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .cbox {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-height: 150px;
      white-space: pre-line;
      margin-bottom: 20px;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .arow {

      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      z-index: 1000;
    }

</head>

const pick = a => a[Math.floor(Math.random() * a.length)];
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML};

// Remplissage des variables
function fill(s, c) {
  return s
    .replace(/\{product\}/g, c.productName || 'mon programme')
    .replace(/\{cta\}/g, c.cta || 'Écris-moi en DM');
}

let strategy = null;
let activeDay = "lundi";
let activeSlide = 0;

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function switchTab(tab) {
  document.getElementById('tab-config').classList.toggle('active', tab === 'config');
  document.getElementById('tab-result').classList.toggle('active', tab === 'result');
  document.getElementById('panel-config').classList.toggle('active', tab === 'config');
  document.getElementById('panel-result').classList.toggle('active', tab === 'result');
  if (tab === 'result') renderResult();
}

// MOTEUR COMBINATOIRE
function handleGenerate() {
  const productName = document.getElementById('f-product').value.trim();
  const cta = document.getElementById('f-cta').value.trim();
  const cfg = { productName, cta };

  strategy = {};
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  
  jours.forEach(j => {
    const data = BIBLE[j];
    // Tirage aléatoire indépendant pour chaque slide = combinatoire massive
    strategy[j] = {
      theme: data.theme,
      angle: data.angle,
      cialdini: data.cialdini,
      color: data.color,
      steps: data.steps,
      slides: [
        fill(pick(data.s1), cfg),
        fill(pick(data.s2), cfg),
        fill(pick(data.s3), cfg),
        fill(pick(data.s4), cfg)
      ]
    };
  });

  activeDay = "lundi";
  activeSlide = 0;
  switchTab('result');
  showToast('✨ Semaine générée avec succès !');
}

function regenDay(j) {
  if (!strategy) return;
  const productName = document.getElementById('f-product').value.trim();
  const cta = document.getElementById('f-cta').value.trim();
  const cfg = { productName, cta };
  
  const data = BIBLE[j];
  strategy[j].slides = [
    fill(pick(data.s1), cfg),
    fill(pick(data.s2), cfg),
    fill(pick(data.s3), cfg),
    fill(pick(data.s4), cfg)
  ];
  activeSlide = 0;
  renderResult();
  showToast('🔄 Stories du jour renouvelées !');
}

function copyDay(j) {
  if (!strategy) return;
  const d = strategy[j];
  const text = d.slides.map((s, i) => `Slide ${i+1} [${d.steps[i]}] :\n${s}`).join('\n\n');
  navigator.clipboard.writeText(`📅 ${j.toUpperCase()} - ${d.theme}\nLevier : ${d.cialdini}\n\n${text}`)
    .then(() => showToast('📋 Copié dans le presse-papier !'));
}

function copyFullWeek() {
  if (!strategy) return;
  let fullText = "🗓️ PLANNING ÉDITORIAL DE LA SEMAINE\n\n";
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  
  jours.forEach(j => {
    const d = strategy[j];
    fullText += `==========================================\n`;
    fullText += `📅 ${j.toUpperCase()} - ${d.theme}\n`;
    fullText += `🧠 Levier Cialdini : ${d.cialdini}\n`;
    fullText += `==========================================\n\n`;
    d.slides.forEach((s, i) => {
      fullText += `[Slide ${i+1} : ${d.steps[i]}]\n${s}\n\n`;
    });
    fullText += `\n`;
  });
  
  navigator.clipboard.writeText(fullText)
    .then(() => showToast('🚀 Semaine complète copiée !'));
}

function setDay(j) { activeDay = j; activeSlide = 0; renderResult(); }
function setSlide(s) { activeSlide = s; renderResult(); }

function renderResult() {
  const p = document.getElementById('panel-result');
  if (!strategy) {
    p.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-muted);"><p>Renseigne les infos de ton offre pour générer ton planning.</p></div>';
    return;
  }
  
  const jours = ["lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];
  const d = strategy[activeDay];
  const slideText = d.slides[activeSlide] || '';
  const ac = d.color;
  
  p.innerHTML = `
    <div class="daytabs">
      ${jours.map(j => `
        <button class="dtab" onclick="setDay('${j}')" style="${activeDay === j ? `border-color:${ac}; background:${ac}15; color:${ac};` : ''}">
          ${j.charAt(0).toUpperCase() + j.slice(1,3)}
        </button>
      `).join('')}
    </div>
    
    <div class="dayinfo">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="dayinfo-t" style="color:${ac}">${activeDay.toUpperCase()} — ${d.theme}</span>
        <span class="dayinfo-th" style="color:var(--text-muted)">🧠 ${d.cialdini}</span>
      </div>
      <div class="dayinfo-desc">🎯 ${d.angle}</div>
    </div>
    
    <div class="clayout">
      <div class="phonewrap">
        <div class="phone">
          <div class="phone-bars">
            ${d.slides.map((_, i) => `
              <div class="phone-bar" onclick="setSlide(${i})" style="background:${i <= activeSlide ? ac : '#2a2a30'}"></div>
            `).join('')}
          </div>
          <div class="phone-sl" style="color:${ac}">${d.steps[activeSlide] || ''}</div>
          <div class="phone-ct">${esc(slideText)}</div>
        </div>
      </div>
      
      <div class="cpanel">
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
            <span style="color:${ac}">${d.steps[activeSlide] || ''}</span>
            <span style="color:var(--text-muted)">Slide ${activeSlide + 1} / ${d.slides.length}</span>
          </div>
          <div class="cbox">${esc(slideText)}</div>
        </div>
        
        <div>
          <div class="arow">
            <button class="abtn" onclick="regenDay('${activeDay}')">🔄 Changer les phrases</button>
            <button class="abtn ac" style="background:${ac}; color:#000; border-color:${ac}" onclick="copyDay('${activeDay}')">📋 Copier le jour</button>
          </div>
          <button class="btn-large" style="background:var(--card-bg); color:var(--text); border:1px solid var(--border); margin-top:10px;" onclick="copyFullWeek()">🚀 Copier la semaine complète</button>
        </div>
      </div>
    </div>
  `;
}
