<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories Machine - Générateur</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a0e;
            --text-color: #e4e0db;
            --font-main: 'Outfit', sans-serif;
            --font-serif: 'Crimson Pro', serif;
            --border-color: #1e1a16;
            --gold: #E8A838;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(160deg, #12100e 0%, #1a1510 50%, #0e0c0a 100%);
            border-bottom: 1px solid #2a2520;
            padding: 30px 20px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, #E8A83808 0%, transparent 70%);
        }
        .header-title {
            font-size: 28px;
            font-weight: 900;
            margin: 6px 0 0;
            letter-spacing: -1px;
            font-family: var(--font-serif);
            color: #f5f0e8;
        }
        .header-subtitle {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--gold);
            font-family: var(--font-serif);
            text-transform: uppercase;
        }
        .header-p {
            font-size: 12px;
            color: #8a8070;
            margin: 8px 0 0;
            font-weight: 500;
        }
        .nav-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-btn {
            flex: 1;
            padding: 13px 0;
            background: transparent;
            color: #5a5045;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        .nav-btn.active {
            background: #14120f;
            color: #f5f0e8;
            border-bottom-color: var(--gold);
        }
        .container {
            padding: 20px 16px;
            max-width: 560px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 12px;
            font-family: var(--font-serif);
        }
        .grid-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .method-btn {
            padding: 12px 10px;
            text-align: left;
            background: #12100e;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e4e0db;
        }
        .method-btn.active {
            background: rgba(232, 168, 56, 0.08);
            border-color: rgba(232, 168, 56, 0.3);
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--gold);
            margin-bottom: 5px;
            font-family: var(--font-serif);
        }
        .form-input, .form-textarea {
            width: 100%;
            background: #12100e;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            color: #e4e0db;
            font-size: 13px;
            font-family: var(--font-main);
            outline: none;
            box-sizing: border-box;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--gold);
        }
        .btn-generate {
            width: 100%;
            margin-top: 20px;
            padding: 16px 0;
            background: linear-gradient(135deg, var(--gold), #e8a838aa);
            color: #0a0a0e;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font-main);
            letter-spacing: 0.3px;
            transition: all 0.3s;
        }
        
        /* PHONE PREVIEW CSS */
        .phone-container {
            width: 232px;
            min-width: 232px;
            flex-shrink: 0;
            margin: 0 auto;
        }
        .phone {
            width: 100%;
            height: 412px;
            border-radius: 30px;
            border: 2.5px solid #1e1e24;
            padding: 40px 14px 20px;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .phone-notch {
            position: absolute;
            top: 11px; left: 50%;
            transform: translateX(-50%);
            width: 48px; height: 5px;
            background: #252528;
            border-radius: 10px;
        }
        .progress-bars {
            display: flex;
            gap: 3px;
            margin-bottom: 14px;
        }
        .bar {
            flex: 1; height: 2.5px;
            border-radius: 2px;
            cursor: pointer;
            background: #2a2a30;
            transition: background 0.3s;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; alignItems: center; justifyContent: center;
            font-size: 11px; font-weight: 900; color: #fff;
        }
        .content-box {
            color: #e8e8e8;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow: auto;
            max-height: 240px;
        }
        
        /* UTILS */
        .badge {
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 16px;
        }
        .day-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 6px;
        }
        .day-btn {
            padding: 7px 13px;
            flex-shrink: 0;
            background: #12100e;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            color: #5a5045;
            font-size: 12px;
            font-weight: 700;
        }
        .day-btn.active {
            color: var(--gold);
            background: rgba(232, 168, 56, 0.12);
            border-color: rgba(232, 168, 56, 0.25);
        }
        .combos-box {
            margin-top: 20px;
            padding: 14px 16px;
            background: #14120f;
            border-radius: 12px;
            border: 1px solid #1e1a16;
            text-align: center;
        }
    </style>
</head>
<body x-data="storiesApp()">

    <div class="header">
        <div class="header-bg"></div>
        <div style="position: relative;">
            <div class="header-subtitle">STORIES MACHINE</div>
            <h1 class="header-title">Générateur de Stories</h1>
            <p class="header-p" x-text="getTotalCombos() + '+ combinaisons uniques • 6 méthodes • 7 jours'"></p>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn" :class="view === 'config' ? 'active' : ''" @click="view = 'config'">⚙️ Configuration</button>
        <button class="nav-btn" :class="view === 'result' ? 'active' : ''" @click="view = 'result'">📋 Stratégie</button>
    </div>

    <div class="container" x-show="view === 'config'">
        <div style="margin-bottom: 24px;">
            <div class="section-title">MÉTHODE DE VENTE</div>
            <div class="grid-methods">
                <template x-for="f in frameworks" :key="f.id">
                    <button class="method-btn" :class="selectedFw === f.id ? 'active' : ''" @click="selectedFw = f.id">
                        <div style="font-size: 15px; margin-bottom: 4px;">
                            <span x-text="f.icon"></span> 
                            <span style="font-size: 13px; font-weight: 700;" :style="{color: selectedFw === f.id ? f.color : '#8a8070'}" x-text="f.name"></span>
                        </div>
                        <div style="font-size: 10px; color: #6a6055; line-height: 1.4;" x-text="f.steps.join(' → ')"></div>
                    </button>
                </template>
            </div>
            
            <div x-show="getCurrentFw()" style="margin-top: 10px; padding: 10px 14px; border-radius: 10px;" :style="{background: getCurrentFw().color + '0a', border: '1px solid ' + getCurrentFw().color + '20'}">
                <p style="font-size: 12px; color: #a09585; margin: 0; line-height: 1.5;">
                    <span x-text="getCurrentFw().icon"></span> <strong :style="{color: getCurrentFw().color}" x-text="getCurrentFw().name"></strong> — <span x-text="getCurrentFw().description"></span>
                </p>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 14px;">
            <div class="form-group">
                <label class="form-label">FORMATION</label>
                <input class="form-input" x-model="cfg.productName" placeholder="Ex: Code Liberté">
            </div>
            <div class="form-group">
                <label class="form-label">AUDIENCE CIBLE</label>
                <textarea class="form-textarea" x-model="cfg.targetAudience" rows="2" placeholder="Qui sont tes clients idéaux ?"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">PROBLÈME PRINCIPAL</label>
                <textarea class="form-textarea" x-model="cfg.mainProblem" rows="2" placeholder="Leur douleur #1"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">PROMESSE UNIQUE</label>
                <textarea class="form-textarea" x-model="cfg.uniquePromise" rows="2" placeholder="Ce qui te différencie"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">TON HISTOIRE (CHARNIÈRE)</label>
                <textarea class="form-textarea" x-model="cfg.personalStory" rows="2" placeholder="Ton parcours en 1-2 phrases"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">CALL TO ACTION</label>
                <input class="form-input" x-model="cfg.cta" placeholder="Ex: DM « LIBERTÉ »">
            </div>
            <div class="form-group">
                <label class="form-label">TA VILLE ACTUELLE</label>
                <input class="form-input" x-model="cfg.ville" placeholder="Pour personnaliser les moments de vie">
            </div>
        </div>

        <div class="combos-box">
            <div style="font-size: 10px; letter-spacing: 2px; color: #6a6055; font-family: var(--font-serif); margin-bottom: 4px;">COMBINAISONS POSSIBLES AVEC CETTE MÉTHODE</div>
            <div style="font-size: 26px; font-weight: 900; color: var(--gold); font-family: var(--font-serif);" x-text="getFwCombos()"></div>
        </div>

        <button class="btn-generate" @click="generate" :style="{background: 'linear-gradient(135deg, ' + getCurrentFw().color + ', ' + getCurrentFw().color + 'aa)'}">
            <span x-text="getCurrentFw().icon"></span> GÉNÉRER 7 JOURS DE STORIES
        </button>
    </div>

    <div class="container" x-show="view === 'result'">
        <div x-show="!strategy" style="text-align: center; padding: 60px 20px; color: #5a5045;">
            <div style="font-size: 44px; margin-bottom: 14px;">🌉</div>
            <p style="font-size: 14px; line-height: 1.6;">Choisis ta méthode, configure ton produit, et génère ta stratégie.</p>
            <button @click="view = 'config'" style="margin-top: 14px; padding: 10px 28px; background: var(--gold); color: #0a0a0e; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 13px;">
                Configurer
            </button>
        </div>

        <div x-show="strategy">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 8px 12px; border-radius: 10px;" :style="{background: getCurrentFw().color + '0c', border: '1px solid ' + getCurrentFw().color + '20'}">
                <span style="font-size: 18px;" x-text="getCurrentFw().icon"></span>
                <div>
                    <div style="font-size: 13px; font-weight: 800;" :style="{color: getCurrentFw().color}" x-text="getCurrentFw().name"></div>
                    <div style="font-size: 10px; color: #6a6055;" x-text="getCurrentFw().steps.join(' → ')"></div>
                </div>
            </div>

            <div class="day-tabs">
                <template x-for="(dt, idx) in dayThemes" :key="idx">
                    <button class="day-btn" :class="activeDay === idx ? 'active' : ''" @click="activeDay = idx; activeSlide = 0;">
                        <span x-text="dt.emoji + ' ' + dt.jour.slice(0, 3)"></span>
                    </button>
                </template>
            </div>

            <div style="background: #14120f; border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;" x-show="getCurrentDay()">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 16px; font-weight: 900; font-family: var(--font-serif); color: #f5f0e8;" x-text="getCurrentDay().emoji + ' ' + getCurrentDay().jour"></span>
                    <span style="font-size: 9px; font-weight: 700; letter-spacing: 2px; font-family: var(--font-serif);" :style="{color: getCurrentFw().color}" x-text="getCurrentDay().theme.toUpperCase()"></span>
                </div>
                <p style="font-size: 11px; color: #6a6055; margin: 4px 0 0;" x-text="'📐 ' + getCurrentDay().angle"></p>
            </div>

            <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;" x-show="getCurrentDay()">
                <div class="phone-container">
                    <div class="phone" :style="{background: 'linear-gradient(170deg, ' + getCurrentFw().color + '12 0%, #0c0c10 35%, ' + getCurrentFw().color + '06 100%)'}">
                        <div class="phone-notch"></div>
                        <div class="progress-bars">
                            <template x-for="(_, i) in getCurrentDay().slides" :key="i">
                                <div class="bar" @click="activeSlide = i" :style="{background: i <= activeSlide ? getCurrentFw().color : '#2a2a30'}"></div>
                            </template>
                        </div>
                        <div class="profile">
                            <div class="avatar" :style="{background: 'linear-gradient(135deg, ' + getCurrentFw().color + ', ' + getCurrentFw().color + '66)'}">BV</div>
                            <span style="color: #ddd; font-size: 11.5px; font-weight: 600;">brille.vibre</span>
                        </div>
                        <div style="font-size: 9px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; font-family: var(--font-serif); text-transform: uppercase;" :style="{color: getCurrentFw().color}" x-text="getCurrentFw().steps[activeSlide]"></div>
                        <div class="content-box" x-text="getCurrentDay().slides[activeSlide]"></div>
                    </div>
                </div>

                <div style="flex: 1; min-width: 240px;" x-show="getCurrentDay()">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                        <span class="badge" :style="{color: getCurrentFw().color, background: getCurrentFw().color + '18', border: '1px solid ' + getCurrentFw().color + '30'}" x-text="getCurrentFw().steps[activeSlide]"></span>
                        <span style="font-size: 11px; color: #5a5045;" x-text="'Slide ' + (activeSlide + 1) + '/' + getCurrentDay().slides.length"></span>
                    </div>

                    <div style="background: #14120f; border-radius: 12px; padding: 14px; border: 1px solid var(--border-color); margin-bottom: 12px;">
                        <div class="section-title" style="font-size: 9px; margin-bottom: 8px;" x-text="'CONTENU SLIDE'"></div>
                        <div style="font-size: 13px; color: #c8c0b5; line-height: 1.65; white-space: pre-wrap;" x-text="getCurrentDay().slides[activeSlide]"></div>
                    </div>

                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <button @click="regenCurrentDay" style="flex: 1; padding: 10px 0; background: #1a1815; color: #a09585; border: 1px solid #2a2520; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700;">
                            🔄 Régénérer jour
                        </button>
                        <button @click="copyCurrentDay" style="flex: 1; padding: 10px 0; background: getCurrentFw().color + '18', color: getCurrentFw().color; border: 1px solid ' + getCurrentFw().color + '30'; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700;">
                            <span x-text="copied ? '✅ Copié !' : '📋 Copier tout'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function storiesApp() {
            return {
                view: 'config',
                selectedFw: 'charniere_4',
                activeDay: 0,
                activeSlide: 0,
                copied: false,
                strategy: null,
                
                cfg: {
                    productName: "Code Liberté",
                    targetAudience: "Francophones et diaspora voulant l'indépendance financière",
                    mainProblem: "Coincés dans le salariat, dépendants d'un seul revenu",
                    uniquePromise: "Un système étape par étape pour créer des revenus digitaux depuis n'importe où",
                    cta: "DM « LIBERTÉ »",
                    personalStory: "Ex-DG d'entreprise, j'ai quitté le corporate pour construire ma liberté",
                    ville: "Casablanca",
                },

                frameworks: [
                    { id: "charniere_4", name: "Charnière 4 Slides", icon: "🌉", color: "#E8A838", steps: ["Moment de vie", "Charnière", "Offre / Témoignage", "Lien"], description: "Le pont entre ta vie et ton offre. La méthode la plus naturelle." },
                    { id: "aida", name: "AIDA", icon: "🧲", color: "#E05263", steps: ["Attention", "Intérêt", "Désir", "Action"], description: "Attention → Intérêt → Désir → Action. Le classique du copywriting." },
                    { id: "pas", name: "PAS", icon: "💊", color: "#3CBBB1", steps: ["Problème", "Agitation", "Solution"], description: "Problème → Agitation → Solution. Court, percutant, efficace." },
                    { id: "ppn", name: "Preuve → Projection → Normalisation", icon: "🔮", color: "#9B5DE5", steps: ["Preuve", "Projection", "Normalisation"], description: "Montre le résultat, projette ton audience, normalise le passage à l’action." },
                    { id: "charniere_3", name: "Charnière 3 Slides", icon: "⚡", color: "#FF8C42", steps: ["Moment + Charnière", "Offre", "CTA"], description: "Version express de la charnière. Rapide et impactant." },
                    { id: "story_5", name: "5 Étapes Vente", icon: "🎯", color: "#06D6A0", steps: ["Accroche", "Problème", "Solution", "Preuve", "CTA"], description: "Le tunnel de vente complet en 5 stories." }
                ],

                dayThemes: [
                    { jour: "Lundi", theme: "Mindset & Motivation", emoji: "🔥", angle: "Réveiller l’ambition en début de semaine" },
                    { jour: "Mardi", theme: "Éducation & Valeur", emoji: "📚", angle: "Enseigner quelque chose d’utile et concret" },
                    { jour: "Mercredi", theme: "Storytelling & Vécu", emoji: "🎬", angle: "Raconter un moment vrai de ton parcours" },
                    { jour: "Jeudi", theme: "Objections & Croyances", emoji: "🧱", angle: "Casser une croyance limitante" },
                    { jour: "Vendredi", theme: "Preuve & Résultats", emoji: "🏆", angle: "Montrer des résultats concrets" },
                    { jour: "Samedi", theme: "Coulisses & Lifestyle", emoji: "☀️", angle: "Montrer ta vie, ton cadre, ton quotidien" },
                    { jour: "Dimanche", theme: "Offre & Urgence", emoji: "🚀", angle: "Vente directe avec rareté" }
                ],

                db: {
                    moments_vie: [
                        "Ce matin, café sur la terrasse. Le soleil est à peine levé.",
                        "Balade avec mon fils ce matin. Pas de réveil, pas de rush.",
                        "Je regarde mon téléphone. Notification : vente à 3h du matin.",
                        "Assis dans un café à {ville}. Mon laptop est fermé.",
                        "Aujourd'hui j'ai décidé de ne pas travailler. Et c'est un choix.",
                        "Message reçu d'un ancien collègue : « T'as de la chance. »",
                        "Je me suis réveillé sans alarme. Pour la 247ème fois consécutive.",
                        "Terrasse, thé à la menthe, vue sur la mer. Un mardi normal.",
                        "Mon fils m'a demandé : « Papa, pourquoi tu pars pas au bureau ? »",
                        "En plein milieu d'un resto, j'ai reçu 3 notifications de vente.",
                        "Aéroport. Billet one-way. Pas besoin de poser des congés.",
                        "Ce matin j'ai médité 20 minutes. Puis j'ai ouvert mon dashboard.",
                        "Week-end à la montagne. Mon business tourne sans moi.",
                        "Je suis en terrasse à Casablanca. Mon écran affiche +2 ventes.",
                        "Petit déjeuner avec ma famille. C'est un mercredi matin, 10h.",
                        "J'ai refusé une réunion. Pas parce que je suis occupé. Parce que je choisis.",
                        "Plage à 11h un jeudi. Les enfants jouent. Je check mes stats.",
                        "Un ami m'a dit : « Toi t'as trouvé la formule. » Non. Je l'ai construite.",
                        "Road trip imprévu. 4 jours. Zéro impact sur mon chiffre.",
                        "Ce soir, dîner en famille. Demain ? Pareil si je veux.",
                        "Marché du matin. Fruits frais. Aucune urgence nulle part.",
                        "J'ai passé 2h à lire aujourd'hui. Pas le week-end. Un lundi.",
                        "Notification Stripe à 6h47. Quelqu'un a acheté pendant que je dormais.",
                        "Je suis en train d'écrire ces stories depuis un hamac.",
                        "Mon ancienne vie : métro 7h15. Ma vie maintenant : thé à la menthe 9h."
                    ],
                    charnieres: [
                        "Parce que ce business, je le gère d'où je veux.",
                        "C'est ça que j'ai construit. Et ça n'a rien de magique.",
                        "Ce genre de matin — je les choisis maintenant.",
                        "J'ai construit quelque chose qui tourne même quand je ne travaille pas.",
                        "La liberté c'est pas un concept. C'est mon mardi matin.",
                        "J'ai pas eu de la chance. J'ai appris un système.",
                        "Ce mode de vie, il se construit. Étape par étape.",
                        "Avant j'échangeais mon temps contre un salaire. Plus maintenant.",
                        "Mon business fonctionne pendant que je vis. Pas l'inverse.",
                        "C'est le résultat d'une décision prise il y a quelques mois.",
                        "J'ai remplacé la sécurité du salariat par la liberté du digital.",
                        "Ce que tu vois là, c'est pas de la chance. C'est un système.",
                        "Chaque matin comme celui-ci me rappelle pourquoi j'ai commencé.",
                        "Le jour où j'ai compris que je pouvais vendre en dormant, tout a changé.",
                        "Mon agenda ? C'est moi qui le remplis. Personne d'autre.",
                        "J'ai quitté le costume-cravate pour construire ma propre liberté.",
                        "Ce laptop, c'est mon bureau. Partout dans le monde.",
                        "La vraie richesse c'est de choisir comment tu passes tes journées.",
                        "Il y a un an, ce matin aurait été impossible.",
                        "Ce business m'a rendu un truc que le salariat m'avait pris : du temps.",
                        "Le système que j'ai mis en place fait le travail. Moi je vis.",
                        "Ce que tu vois c'est pas un rêve. C'est un plan exécuté.",

                getCurrentFw() {
                    return this.frameworks.find(f => f.id === this.selectedFw);
                },

                getCurrentDay() {
                    return this.strategy ? this.strategy[this.activeDay] : null;
                },

                pick(arr) {
                    return arr[Math.floor(Math.random() * arr.length)];
                },

                fillProduct(str) {
                    return str.replace(/{product}/g, this.cfg.productName)
                              .replace(/{cta}/g, this.cfg.cta)
                              .replace(/{ville}/g, this.cfg.ville || "Casablanca")
                              .replace(/{n}/g, String(Math.floor(Math.random() * 200) + 50))
                              .replace(/{montant}/g, String(Math.floor(Math.random() * 3000) + 500));
                },

                getFwCombos() {
                    let total = 0;
                    const d = this.db;
                    switch(this.selectedFw) {
                        case 'charniere_4': total = d.moments_vie.length * d.charnieres.length * (d.temoignages.length + d.solutions.length) * d.ctas.length; break;
                        case 'aida': total = d.accroches.length * d.problemes.length * d.agitations.length * d.solutions.length * d.projections.length * d.urgences.length * d.ctas.length; break;
                        case 'pas': total = d.accroches.length * d.problemes.length * d.agitations.length * d.agitations.length * d.solutions.length * d.ctas.length; break;
                        case 'ppn': total = d.preuves.length * d.temoignages.length * d.projections.length * d.charnieres.length * d.normalisations.length * d.ctas.length; break;
                        case 'charniere_3': total = d.moments_vie.length * d.charnieres.length * d.solutions.length * d.urgences.length * d.ctas.length; break;
                        case 'story_5': total = d.accroches.length * d.problemes.length * d.agitations.length * d.solutions.length * d.preuves.length * d.temoignages.length * d.urgences.length * d.ctas.length; break;
                    }
                    return total.toLocaleString("fr-FR");
                },

                getTotalCombos() {
                    const d = this.db;
                    const c1 = d.moments_vie.length * d.charnieres.length * (d.temoignages.length + d.solutions.length) * d.ctas.length;
                    const c2 = d.accroches.length * d.problemes.length * d.agitations.length * d.solutions.length * d.projections.length * d.urgences.length * d.ctas.length;
                    const c3 = d.accroches.length * d.problemes.length * d.agitations.length * d.agitations.length * d.solutions.length * d.ctas.length;
                    const c4 = d.preuves.length * d.temoignages.length * d.projections.length * d.charnieres.length * d.normalisations.length * d.ctas.length;
                    const c5 = d.moments_vie.length * d.charnieres.length * d.solutions.length * d.urgences.length * d.ctas.length;
                    const c6 = d.accroches.length * d.problemes.length * d.agitations.length * d.solutions.length * d.preuves.length * d.temoignages.length * d.urgences.length * d.ctas.length;
                    return (c1 + c2 + c3 + c4 + c5 + c6).toLocaleString("fr-FR");
                },

                generateByFramework(fwId, dayTheme) {
                    const f = (str) => this.fillProduct(str);
                    const p = (arr) => this.pick(arr);
                    const d = this.db;

                    const gen = {
                        charniere_4: () => [
                            f(p(d.moments_vie)),
                            f(p(d.charnieres)),
                            f(Math.random() > 0.5 ? p(d.temoignages) : p(d.solutions)),
                            f(p(d.ctas)),
                        ],
                        aida: () => [
                            f(p(d.accroches)),
                            f(p(d.problemes) + "\n\n" + p(d.agitations)),
                            f(p(d.solutions) + "\n\n" + p(d.projections)),
                            f(p(d.urgences) + "\n\n" + p(d.ctas)),
                        ],
                        pas: () => [
                            f(p(d.accroches) + "\n\n" + p(d.problemes)),
                            f(p(d.agitations) + "\n\n" + (dayTheme.theme === "Objections & Croyances" ? p(d.objections_casses) : p(d.agitations))),
                            f(p(d.solutions) + "\n\n" + p(d.ctas)),
                        ],
                        ppn: () => [
                            f(p(d.preuves) + "\n\n" + p(d.temoignages)),
                            f(p(d.projections) + "\n\n" + p(d.charnieres)),
                            f(p(d.normalisations) + "\n\n" + p(d.ctas)),
                        ],
                        charniere_3: () => [
                            f(p(d.moments_vie) + "\n\n" + p(d.charnieres)),
                            f(p(d.solutions)),
                            f(p(d.urgences) + "\n\n" + p(d.ctas)),
                        ],
                        story_5: () => [
                            f(p(d.accroches)),
                            f(p(d.problemes) + "\n\n" + p(d.agitations)),
                            f(p(d.solutions)),
                            f(p(d.preuves) + "\n\n" + p(d.temoignages)),
                            f(p(d.urgences) + "\n\n" + p(d.ctas)),
                        ],
                    };
                    return gen[fwId]();
                },

                generate() {
                    const strat = this.dayThemes.map((dt) => ({
                        ...dt,
                        slides: this.generateByFramework(this.selectedFw, dt),
                    }));
                    this.strategy = strat;
                    this.view = 'result';
                    this.activeDay = 0;
                    this.activeSlide = 0;
                },

                regenCurrentDay() {
                    if (!this.strategy) return;
                    const dayIdx = this.activeDay;
                    this.strategy[dayIdx].slides = this.generateByFramework(this.selectedFw, this.dayThemes[dayIdx]);
                    this.activeSlide = 0;
                },

                copyCurrentDay() {
                    if (!this.strategy) return;
                    const day = this.strategy[this.activeDay];
                    const fw = this.getCurrentFw();
                    const text = day.slides.map((s, i) => `── ${fw.steps[i]} ──\n${s}`).join("\n\n");
                    
                    navigator.clipboard.writeText(`📅 ${day.jour} — ${day.theme}\n🔧 ${fw.name}\n\n${text}`);
                    this.copied = true;
                    setTimeout(() => this.copied = false, 2000);
                }
            }
